<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS SPORTS // OMNI-AWARE EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   THEME VARIABLES - OMNI-AWARE VIBRANT
   ========================================================================== */
:root {
  --nexus-blue: #003087;
  --nexus-blue-light: #005eb8;
  --nexus-blue-bright: #0085ca;
  --nexus-orange: #f26522;
  --nexus-orange-glow: rgba(242, 101, 34, 0.6);
  --nexus-green: #00e676;
  --nexus-green-glow: rgba(0, 230, 118, 0.4);
  --nexus-red: #ff1744;
  --nexus-purple: #9d00ff;
  --nexus-gold: #ffd700;
  
  --bg-void: #000814;
  --bg-deep: #011228;
  --bg-surface: #022047;
  --bg-panel: rgba(2, 32, 71, 0.65);
  
  --text-main: #ffffff;
  --text-muted: #a0c0e8;
  --text-dark: #001a3b;
  --text-highlight: #e0f0ff;
  
  --border-subtle: rgba(255, 255, 255, 0.08);
  --border-light: rgba(255, 255, 255, 0.15);
  --border-bright: rgba(255, 255, 255, 0.4);
  
  --glass-blur: blur(16px);
  --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
  --tr-instant: all 0.1s ease;
  --tr-fast: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
  --tr-smooth: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  --tr-bounce: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ==========================================================================
   RESET & BASE & CANVAS BACKGROUND
   ========================================================================== */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; user-select:none; -webkit-tap-highlight-color: transparent; }
body, html { width:100vw; height:100vh; overflow:hidden; background:var(--bg-void); color:var(--text-main); position:relative; }

#particleCanvas { position: absolute; inset: 0; z-index: 0; pointer-events: none; opacity: 0.6; }

.bg-mesh { position:absolute; inset:0; z-index:1; opacity:0.04; background-image: 
  linear-gradient(var(--text-main) 1px, transparent 1px),
  linear-gradient(90deg, var(--text-main) 1px, transparent 1px); 
  background-size: 40px 40px; pointer-events:none; }
.bg-glow-master { position:absolute; width:120vw; height:120vh; background:radial-gradient(circle at 50% 0%, var(--nexus-blue-light) 0%, transparent 60%); top:-20%; left:-10%; opacity:0.25; z-index:1; pointer-events:none; transition:var(--tr-smooth); }
.bg-glow-accent { position:absolute; width:80vw; height:80vh; background:radial-gradient(circle at 100% 100%, var(--nexus-orange) 0%, transparent 60%); bottom:-10%; right:-10%; opacity:0.15; z-index:1; pointer-events:none; transition:var(--tr-smooth); }

/* ==========================================================================
   LAYOUT STRUCTURE
   ========================================================================== */
.app-wrapper { position:relative; z-index:10; display:flex; flex-direction:column; height:100vh; background: linear-gradient(180deg, rgba(1,18,40,0.4) 0%, rgba(0,8,20,0.9) 100%); backdrop-filter: var(--glass-blur); }

/* ==========================================================================
   HEADER / OMNI-NAVIGATION
   ========================================================================== */
.top-bar { display:flex; justify-content:space-between; align-items:stretch; background:rgba(0, 48, 135, 0.85); border-bottom:1px solid var(--border-bright); height:80px; flex-shrink:0; box-shadow:0 10px 30px rgba(0,0,0,0.6); backdrop-filter: blur(20px); position: relative; z-index: 50; }
.brand-zone { display:flex; align-items:center; padding:0 40px; background:linear-gradient(135deg, var(--nexus-blue-bright), var(--nexus-blue)); position:relative; overflow:hidden; min-width: 280px; }
.brand-zone::after { content:''; position:absolute; right:-30px; top:0; bottom:0; width:60px; background:var(--nexus-orange); transform:skewX(-25deg); box-shadow: -5px 0 15px rgba(0,0,0,0.4); }
.brand-text { font-family:'Bebas Neue', sans-serif; font-size:3.2rem; letter-spacing:6px; color:var(--text-main); text-shadow:3px 3px 0px var(--text-dark), 0 0 20px rgba(255,255,255,0.4); z-index:2; margin-right:20px; line-height: 1; }
.brand-sub { position: absolute; bottom: 8px; left: 42px; font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 4px; color: rgba(255,255,255,0.7); z-index: 2; font-weight: 700; }

.controls-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Season Intelligence Bar */
.season-intelligence-bar { display: flex; align-items: center; padding: 0 20px; height: 26px; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--border-subtle); overflow-x: auto; scrollbar-width: none; }
.season-intelligence-bar::-webkit-scrollbar { display: none; }
.season-pill { display: inline-flex; align-items: center; gap: 6px; font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--text-muted); padding: 2px 10px; border-radius: 10px; background: rgba(255,255,255,0.05); margin-right: 8px; white-space: nowrap; border: 1px solid transparent; transition: var(--tr-fast); cursor: help; }
.season-pill.in-season { border-color: rgba(0, 230, 118, 0.3); color: var(--text-main); background: rgba(0, 230, 118, 0.1); }
.season-pill.off-season { opacity: 0.5; }
.s-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; }
.season-pill.in-season .s-dot { background: var(--nexus-green); box-shadow: 0 0 8px var(--nexus-green); animation: pulseSlow 2s infinite; }
@keyframes pulseSlow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

/* League Filters */
.filters-zone { display:flex; align-items:center; padding:0 20px; gap:12px; height: 54px; overflow-x: auto; scrollbar-width: none; mask-image: linear-gradient(to right, black 95%, transparent 100%); }
.filters-zone::-webkit-scrollbar { display: none; }
.filter-btn { background:rgba(255,255,255,0.03); border:1px solid var(--border-light); color:var(--text-muted); font-family:'Bebas Neue', sans-serif; font-size:1.5rem; padding:8px 28px; border-radius:8px; cursor:pointer; transition:var(--tr-bounce); letter-spacing:2px; flex-shrink: 0; position: relative; overflow: hidden; }
.filter-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); transform: translateX(-100%); transition: var(--tr-smooth); }
.filter-btn:hover { border-color:var(--border-bright); color:var(--text-main); transform: translateY(-2px); }
.filter-btn:hover::before { transform: translateX(100%); }
.filter-btn.active { background:var(--text-main); color:var(--nexus-blue); border-color:var(--text-main); box-shadow:0 5px 20px rgba(255,255,255,0.3); transform: translateY(-2px) scale(1.05); }

/* System Metrics */
.metrics-zone { display:flex; align-items:center; padding:0 30px; gap:35px; background:linear-gradient(-90deg, rgba(0,0,0,0.6), transparent); border-left:1px solid var(--border-light); }
.metric-group { display:flex; flex-direction:column; align-items:flex-end; }
.metric-label { font-family:'Space Mono', monospace; font-size:0.6rem; color:var(--text-muted); letter-spacing:3px; text-transform:uppercase; margin-bottom:4px; font-weight: 700; }
.metric-val { font-family:'Bebas Neue', sans-serif; font-size:2.2rem; line-height:0.9; color:var(--text-highlight); }
.metric-val.highlight { color:var(--nexus-green); text-shadow:0 0 15px var(--nexus-green-glow); }
.sys-status-box { display:flex; align-items:center; gap:12px; background:rgba(0, 230, 118, 0.1); border:1px solid var(--nexus-green); padding:8px 20px; border-radius:30px; box-shadow: inset 0 0 10px rgba(0, 230, 118, 0.05); }
.sys-status-box.syncing { background:rgba(242, 101, 34, 0.1); border-color:var(--nexus-orange); }
.sys-status-box.syncing .live-dot { background:var(--nexus-orange); animation: pulseLive 0.5s infinite alternate; }
.sys-status-box.syncing .live-text { color: var(--nexus-orange); }
.live-dot { width:12px; height:12px; background:var(--nexus-green); border-radius:50%; animation:pulseLive 1.5s infinite alternate; }
@keyframes pulseLive { from { opacity:0.4; box-shadow:0 0 0 transparent; } to { opacity:1; box-shadow:0 0 15px currentColor; } }
.live-text { font-family:'Space Mono', monospace; font-size:0.85rem; font-weight:700; color:var(--nexus-green); letter-spacing:2px; }

/* ==========================================================================
   MAIN GRID AREA
   ========================================================================== */
.main-content { flex:1; overflow-y:auto; padding:40px; display:flex; flex-direction:column; position: relative; z-index: 10; scroll-behavior: smooth; }
.main-content::-webkit-scrollbar { width:10px; }
.main-content::-webkit-scrollbar-track { background:rgba(0,0,0,0.3); border-left: 1px solid var(--border-subtle); }
.main-content::-webkit-scrollbar-thumb { background:var(--bg-surface); border: 1px solid var(--border-light); border-radius:5px; }
.main-content::-webkit-scrollbar-thumb:hover { background:var(--nexus-blue-bright); }

.grid-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; border-bottom: 1px solid var(--border-light); padding-bottom: 10px; }
.gh-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 3px; color: var(--text-main); display: flex; align-items: center; gap: 15px; }
.gh-count { font-family: 'Space Mono', monospace; font-size: 1rem; color: var(--nexus-orange); background: rgba(242, 101, 34, 0.15); padding: 4px 12px; border-radius: 20px; }
.gh-tools { display: flex; gap: 15px; }
.tool-btn { background: transparent; border: 1px solid var(--border-light); color: var(--text-muted); font-family: 'Space Mono', monospace; font-size: 0.75rem; padding: 6px 16px; border-radius: 6px; cursor: pointer; transition: var(--tr-fast); text-transform: uppercase; letter-spacing: 1px; }
.tool-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }
.tool-btn.active-tool { background: var(--nexus-blue-light); border-color: var(--nexus-blue-bright); color: #fff; }

.games-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(460px, 1fr)); gap:30px; width:100%; align-items: start; }

.status-overlay { grid-column:1/-1; display:flex; flex-direction:column; align-items:center; justify-content:center; height:50vh; gap:25px; }
.radar-spinner { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--border-light); position: relative; overflow: hidden; }
.radar-spinner::before { content: ''; position: absolute; inset: 0; background: conic-gradient(from 0deg, transparent 70%, var(--nexus-blue-bright) 100%); animation: spin 1.5s linear infinite; }
.radar-spinner::after { content: ''; position: absolute; inset: 4px; background: var(--bg-deep); border-radius: 50%; }
.status-text { font-family:'Bebas Neue', sans-serif; font-size:2.5rem; color:var(--text-muted); letter-spacing:6px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
.status-sub { font-family: 'Space Mono', monospace; font-size: 0.9rem; color: var(--border-bright); }

/* ==========================================================================
   OMNI GAME CARDS
   ========================================================================== */
.game-card { background:linear-gradient(160deg, var(--bg-panel), rgba(1, 15, 35, 0.95)); border:1px solid var(--border-light); border-radius:20px; overflow:hidden; display:flex; flex-direction:column; transition:var(--tr-bounce); cursor:pointer; box-shadow:0 15px 35px rgba(0,0,0,0.4); position:relative; backdrop-filter: blur(10px); }
.game-card:hover { transform:translateY(-8px) scale(1.02); border-color:var(--border-bright); box-shadow:0 25px 50px rgba(0,0,0,0.6), 0 0 30px rgba(0, 133, 202, 0.2); z-index: 20; }
.game-card::before { content:''; position:absolute; top:0; left:0; width:100%; height:5px; background:linear-gradient(90deg, var(--nexus-blue-bright), var(--nexus-purple), var(--nexus-orange)); opacity:0.5; transition:var(--tr-smooth); }
.game-card:hover::before { opacity:1; height: 8px; }

/* VIP Highlight (Contextual Injection) */
.game-card.vip-highlight { border: 2px solid var(--nexus-gold); box-shadow: 0 0 40px rgba(255, 215, 0, 0.15), 0 15px 35px rgba(0,0,0,0.4); }
.game-card.vip-highlight::before { background: linear-gradient(90deg, var(--nexus-gold), var(--nexus-green)); opacity: 1; height: 6px; }
.vip-badge { position: absolute; top: 12px; right: 16px; background: var(--nexus-gold); color: #000; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; padding: 2px 10px; border-radius: 4px; z-index: 10; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

/* Card Header */
.card-header { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; background:rgba(0,0,0,0.3); border-bottom:1px solid var(--border-subtle); position: relative; }
.card-meta-left { display:flex; align-items:center; gap:15px; }
.card-league { font-family:'Bebas Neue', sans-serif; font-size:1.4rem; letter-spacing:3px; padding:4px 12px; border-radius:6px; background:var(--nexus-blue); color:#fff; line-height:1.2; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
.card-network { font-family:'Space Mono', monospace; font-size:0.7rem; color:var(--text-highlight); font-weight:700; background:rgba(255,255,255,0.08); padding:6px 10px; border-radius:6px; border: 1px solid var(--border-subtle); }
.card-clock { font-family:'Space Mono', monospace; font-size:0.9rem; font-weight:700; color:var(--nexus-orange); display:flex; align-items:center; gap:8px; background:rgba(242, 101, 34, 0.1); padding:6px 14px; border-radius:8px; border:1px solid rgba(242, 101, 34, 0.4); box-shadow: inset 0 0 10px rgba(242, 101, 34, 0.05); }
.card-clock.final { color: var(--text-muted); background: rgba(255,255,255,0.05); border-color: var(--border-light); }
.card-clock.final .live-dot { display: none; }
.card-clock.scheduled { color: var(--nexus-blue-bright); background: rgba(0, 133, 202, 0.1); border-color: rgba(0, 133, 202, 0.4); }
.card-clock.scheduled .live-dot { background: var(--nexus-blue-bright); animation: none; }

/* Card Body (Standard Matchup) */
.card-body { padding:24px 20px; display:flex; flex-direction:column; gap:20px; position: relative; }
.team-row { display:flex; align-items:center; justify-content:space-between; position: relative; z-index: 2; }
.team-row.winner .team-name { color: var(--nexus-gold); text-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
.team-row.winner .total-score { color: var(--text-main); font-weight: 900; }
.team-id { display:flex; align-items:center; gap:18px; flex:1; min-width: 0; }
.team-logo-box { width:64px; height:64px; background:radial-gradient(circle, #ffffff 40%, #f0f0f0 100%); border-radius:50%; display:flex; justify-content:center; align-items:center; padding:8px; box-shadow:0 8px 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(0,0,0,0.1); border:3px solid var(--border-light); flex-shrink: 0; position: relative; }
.possession-dot { position: absolute; bottom: -4px; right: -4px; width: 16px; height: 16px; background: var(--nexus-gold); border-radius: 50%; border: 3px solid var(--bg-surface); display: none; box-shadow: 0 0 10px var(--nexus-gold); }
.has-possession .possession-dot { display: block; }
.team-logo-box img { width:100%; height:100%; object-fit:contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
.team-info { display:flex; flex-direction:column; justify-content:center; overflow: hidden; }
.team-name { font-family:'Bebas Neue', sans-serif; font-size:2.4rem; line-height:0.9; color:var(--text-main); letter-spacing:1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: var(--tr-fast); }
.team-record { font-family:'Space Mono', monospace; font-size:0.75rem; color:var(--text-muted); margin-top:6px; display: flex; gap: 8px; align-items: center; }
.seed-tag { background: rgba(255,255,255,0.1); padding: 1px 6px; border-radius: 4px; color: var(--text-main); font-weight: 700; }

.score-area { display: flex; align-items: center; gap: 20px; }
.linescore-mini { display:flex; gap:6px; opacity: 0.8; transition: var(--tr-fast); }
.game-card:hover .linescore-mini { opacity: 1; }
.ls-box { width:26px; text-align:center; font-family:'Space Mono', monospace; font-size:0.85rem; color:var(--text-main); background:rgba(0,0,0,0.4); padding:6px 0; border-radius:6px; border: 1px solid var(--border-subtle); }
.total-score { font-family:'Bebas Neue', sans-serif; font-size:4rem; line-height:0.8; width:80px; text-align:right; color:rgba(255,255,255,0.5); transition:var(--tr-bounce); }
.total-score.flash { color:var(--nexus-green); text-shadow:0 0 25px var(--nexus-green-glow); transform:scale(1.2) translateX(-5px); }

/* Card Footer */
.card-footer { padding:14px 20px; background:rgba(0,0,0,0.4); border-top:1px solid var(--border-subtle); display:flex; align-items:center; gap:15px; }
.cf-label { font-family:'Space Mono', monospace; font-size:0.65rem; color:#fff; letter-spacing:2px; text-transform:uppercase; background:var(--nexus-purple); padding:4px 8px; border-radius:4px; font-weight: 700; flex-shrink: 0; box-shadow: 0 2px 8px rgba(157, 0, 255, 0.4); }
.cf-text { font-family:'Inter', sans-serif; font-size:0.85rem; color:var(--text-highlight); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; font-weight: 300; }
.cf-odds { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border-subtle); }

/* ==========================================================================
   TICKER (OMNI-FEED)
   ========================================================================== */
.ticker-wrap { height:48px; background:linear-gradient(90deg, var(--bg-deep), var(--nexus-blue-dark)); border-top:2px solid var(--nexus-blue); display:flex; align-items:center; overflow:hidden; position:relative; z-index:40; flex-shrink:0; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
.ticker-badge { background:linear-gradient(135deg, var(--nexus-orange), #d04500); color:#fff; font-family:'Bebas Neue', sans-serif; font-size:1.4rem; letter-spacing:3px; padding:0 30px; height:100%; display:flex; align-items:center; position:absolute; left:0; z-index:10; box-shadow:10px 0 20px rgba(0,0,0,0.6); clip-path: polygon(0 0, 100% 0, 90% 100%, 0% 100%); min-width: 180px; }
.ticker-badge::before { content:''; position:absolute; top:0; left:0; right:0; bottom:0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); animation: sweep 3s infinite; }
@keyframes sweep { 0% { transform: translateX(-100%); } 50%, 100% { transform: translateX(100%); } }
.ticker-viewport { flex:1; overflow:hidden; margin-left:170px; position:relative; height:100%; }
.ticker-scroll { display:flex; align-items:center; height:100%; white-space:nowrap; position:absolute; animation:ticker 40s linear infinite; }
.ticker-scroll:hover { animation-play-state:paused; }
@keyframes ticker { 0% { transform:translateX(0); } 100% { transform:translateX(-50%); } }
.ticker-item { display:inline-flex; align-items:center; gap:12px; padding:0 40px; font-family:'Inter', sans-serif; font-size:0.95rem; font-weight:600; color:var(--text-highlight); border-right:1px solid var(--border-light); position: relative; }
.ti-league { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--nexus-blue-bright); border: 1px solid var(--nexus-blue-bright); padding: 2px 6px; border-radius: 4px; }
.ti-team { font-family:'Bebas Neue', sans-serif; font-size:1.4rem; letter-spacing:1px; }
.ti-score { color:var(--nexus-green); font-size:1.3rem; font-weight: 900; }
.ti-time { font-family:'Space Mono', monospace; font-size:0.8rem; color:var(--text-muted); background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 4px; }

/* ==========================================================================
   DEEP DIVE MODAL (OMNI-VIEW)
   ========================================================================== */
.modal-overlay { position:fixed; inset:0; background:rgba(0, 8, 20, 0.85); backdrop-filter:blur(25px); z-index:9999; display:flex; justify-content:center; align-items:center; opacity:0; pointer-events:none; transition:var(--tr-smooth); perspective: 1000px; }
.modal-overlay.active { opacity:1; pointer-events:all; }
.modal-window { background:linear-gradient(180deg, var(--bg-deep), var(--bg-void)); border:1px solid var(--border-bright); border-radius:24px; width:96vw; max-width:1400px; height:92vh; display:flex; flex-direction:column; box-shadow:0 30px 100px rgba(0,0,0,0.9), inset 0 0 40px rgba(0, 133, 202, 0.1); transform:rotateX(10deg) translateY(60px) scale(0.9); transition:var(--tr-bounce); overflow:hidden; position: relative; }
.modal-overlay.active .modal-window { transform:rotateX(0) translateY(0) scale(1); }

/* Modal Header Bar */
.mh-top { display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:rgba(0,0,0,0.6); border-bottom:1px solid var(--border-light); position: relative; z-index: 10; }
.mh-left { display: flex; align-items: center; gap: 20px; }
.mh-venue { font-family:'Space Mono', monospace; font-size:0.85rem; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; display: flex; align-items: center; gap: 8px; }
.mh-close { background:rgba(255,255,255,0.05); border:1px solid var(--border-light); color:#fff; width:44px; height:44px; border-radius:50%; font-size:1.5rem; cursor:pointer; transition:var(--tr-bounce); display:flex; justify-content:center; align-items:center; }
.mh-close:hover { background:var(--nexus-red); border-color: var(--nexus-red); transform:rotate(90deg) scale(1.1); box-shadow: 0 0 20px rgba(255, 23, 68, 0.5); }

/* Modal Matchup Hero */
.mh-matchup { display:flex; justify-content:space-between; align-items:center; padding:50px 80px; background:radial-gradient(ellipse at center, rgba(0, 94, 184, 0.2) 0%, transparent 80%); position:relative; z-index: 5; overflow: hidden; }
.mh-bg-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60%; opacity: 0.03; filter: grayscale(100%); pointer-events: none; }
.m-team { display:flex; flex-direction:column; align-items:center; gap:20px; width:35%; z-index:2; position: relative; }
.m-logo { width:180px; height:180px; background:radial-gradient(circle, #fff 40%, #eee 100%); border-radius:50%; display:flex; justify-content:center; align-items:center; padding:20px; box-shadow:0 20px 50px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,0,0,0.2); border:6px solid var(--border-light); transition: var(--tr-smooth); position: relative; }
.m-team.winner .m-logo { border-color: var(--nexus-gold); box-shadow: 0 0 50px rgba(255, 215, 0, 0.3); }

const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = Math.random() * 1 - 0.5;
    this.speedY = Math.random() * -1 - 0.5;
    this.opacity = Math.random() * 0.5 + 0.1;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.y < 0) {
      this.y = canvas.height;
      this.x = Math.random() * canvas.width;
    }
  }
  draw() {
    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}
for(let i=0; i<100; i++) particles.push(new Particle());

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ==========================================================================
// DATA FETCHING & PARSING
// ==========================================================================
async function fetchMasterFeed() {
  const sysBox = document.getElementById('sysStatusBox');
  const sysTxt = document.getElementById('sysStatus');
  sysBox.className = 'sys-status-box syncing';
  sysTxt.innerText = "SYNCING DATA...";
  
  let tempGames = {};
  let totalPts = 0;
  let activeCount = 0;

  // Fetch all endpoints concurrently
  const promises = LEAGUES.map(ep => fetch(ep.url).then(res => res.json()).then(data => ({ ep, data })).catch(() => ({ ep, error: true })));
  const results = await Promise.allSettled(promises);

  results.forEach(res => {
    if (res.status === 'fulfilled' && !res.value.error) {
      const { ep, data } = res.value;
      if (data.events) {
        data.events.forEach(ev => {
          // Parse EVERYTHING that is today, regardless of state, but mark LIVE
          const state = ev.status.type.state; // 'pre', 'in', 'post'
          const parsed = parseEvent(ev, ep);
          tempGames[parsed.uid] = parsed;
          
          if (state === 'in') {
            activeCount++;
            if(!isNaN(parsed.away.score)) totalPts += parsed.away.score;
            if(!isNaN(parsed.home.score)) totalPts += parsed.home.score;
          }
        });
      }
    }
  });

  APP_STATE.liveData = tempGames;
  APP_STATE.loopCount++;
  
  // Update Header Metrics
  document.getElementById('countGames').innerText = activeCount;
  // Calculate network load pseudo-metric based on points/activity
  let loadPct = Math.min(100, Math.floor((activeCount * 5) + (totalPts * 0.1) + (Math.random()*10)));
  document.getElementById('countPts').innerText = `${loadPct}%`;
  
  sysBox.className = 'sys-status-box';
  sysTxt.innerText = "SYSTEM ACTIVE";

  renderGrid();
  buildTicker();

  if (APP_STATE.modalOpen && APP_STATE.liveData[APP_STATE.modalOpen]) {
    updateModalHeader(APP_STATE.liveData[APP_STATE.modalOpen]);
    fetchDeepData(APP_STATE.liveData[APP_STATE.modalOpen]);
  }
}

function parseEvent(ev, ep) {
  const comp = ev.competitions[0];
  const isRacingGolf = ep.id === 'F1' || ep.id === 'GOLF';
  
  // Handling standard team sports
  let homeRaw = {}, awayRaw = {};
  if (!isRacingGolf && comp.competitors && comp.competitors.length >= 2) {
    const t1 = comp.competitors[0];
    const t2 = comp.competitors[1];
    homeRaw = t1.homeAway === 'home' ? t1 : t2;
    awayRaw = t1.homeAway === 'away' ? t1 : t2;
  } else if (isRacingGolf && comp.competitors) {
    // Mocking 1st and 2nd place as "away/home" for racing/golf UI consistency
    awayRaw = comp.competitors[0] || {};
    homeRaw = comp.competitors[1] || {};
  }

  const extractTeam = (t) => {
    if(!t || !t.team && !t.athlete) return { name: "TBA", score: "-", logo: "", record: "", linescores: [] };
    const ent = t.team || t.athlete;
    return {
      id: ent.id,
      name: ent.shortDisplayName || ent.displayName || ent.name || "TBA",
      score: t.score ? parseInt(t.score) : (t.statistics ? t.statistics[0]?.displayValue : "-"),
      logo: ent.logo || "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'></svg>",
      record: t.records && t.records[0] ? t.records[0].summary : (t.curatedRank?.current ? `#${t.curatedRank.current}` : ""),
      linescores: (t.linescores || []).map(l => l.displayValue || l.value),
      isWinner: t.winner || false,
      possession: t.possession || false,
      seed: t.curatedRank?.current || null
    };
  };

  let broadcast = "N/A";
  if (comp.broadcasts && comp.broadcasts.length > 0) {
    broadcast = comp.broadcasts[0].names.join(", ");
  }

  let lastPlay = "Awaiting telecast data...";
  if (comp.situation && comp.situation.lastPlay && comp.situation.lastPlay.text) {
    lastPlay = comp.situation.lastPlay.text;
  } else if (ev.status.type.state === 'pre') {
    lastPlay = "Scheduled Matchup";
  } else if (ev.status.type.state === 'post') {
    lastPlay = "Final";
  }

  let isVIP = false;
  // Implicit incorporation: Check if favorites are involved
  const teamNamesStr = `${extractTeam(awayRaw).name} ${extractTeam(homeRaw).name}`.toUpperCase();
  if (CONFIG.favorites.some(fav => teamNamesStr.includes(fav.toUpperCase()))) {
    isVIP = true;
  }

  return {
    uid: `${ep.id}_${ev.id}`,
    espnId: ev.id,
    league: ep.id,
    leagueColor: ep.color,
    state: ev.status.type.state, // 'pre', 'in', 'post'
    clock: ev.status.type.detail || ev.status.type.shortDetail,
    venue: comp.venue ? comp.venue.fullName : "Global Arena",
    network: broadcast,
    lastPlay: lastPlay,
    odds: comp.odds && comp.odds[0] ? comp.odds[0].details : "O/U N/A",
    isVIP: isVIP,
    home: extractTeam(homeRaw),
    away: extractTeam(awayRaw),
    endpoint: ep
  };
}

// ==========================================================================
// GRID RENDERING & SORTING ALGORITHM
// ==========================================================================
function renderGrid() {
  const container = document.getElementById('gridContainer');
  let games = Object.values(APP_STATE.liveData);
  
  if (APP_STATE.filter !== 'ALL') {
    games = games.filter(g => g.league === APP_STATE.filter);
  }

  // SMART SORTING: VIPs -> LIVE -> PRE -> POST. Secondary: Preferred Leagues.
  if (APP_STATE.sortMode === 'SMART') {
    games.sort((a, b) => {
      if (a.isVIP !== b.isVIP) return a.isVIP ? -1 : 1;
      
      const stateVal = { 'in': 0, 'pre': 1, 'post': 2 };
      if (stateVal[a.state] !== stateVal[b.state]) return stateVal[a.state] - stateVal[b.state];
      
      const aPref = CONFIG.preferredLeagues.includes(a.league);
      const bPref = CONFIG.preferredLeagues.includes(b.league);
      if (aPref !== bPref) return aPref ? -1 : 1;
      
      return 0;
    });
  } else {
    // TIME SORT (Alphabetical/League grouping fallback for simplicity here)
    games.sort((a, b) => a.league.localeCompare(b.league) || a.clock.localeCompare(b.clock));
  }

  document.getElementById('headerCount').innerText = `${games.length} EVENT${games.length !== 1 ? 'S' : ''}`;

  if (games.length === 0) {
    container.innerHTML = `
      <div class="status-overlay">
        <div class="empty-text">NO MATCHUPS FOUND</div>
        <div class="status-sub">AWAITING LEAGUE COMMENCEMENT...</div>
      </div>`;
    return;
  }

  const activeUIDs = games.map(g => g.uid);
  Array.from(container.children).forEach(child => {
    if (child.id && !activeUIDs.includes(child.id)) child.remove();
  });
  const overlay = container.querySelector('.status-overlay');
  if (overlay) overlay.remove();

  games.forEach(game => {
    let card = document.getElementById(game.uid);
    if (!card) {
      card = document.createElement('div');
      card.className = `game-card ${game.isVIP ? 'vip-highlight' : ''}`;
      card.id = game.uid;
      card.onclick = () => handleCardClick(game.uid);
      card.innerHTML = buildCardShell(game);
      container.appendChild(card);
      
      APP_STATE.prevScores[`${game.uid}_away`] = game.away.score;
      APP_STATE.prevScores[`${game.uid}_home`] = game.home.score;
    } else {
      updateCardDOM(card, game);
    }
  });
}

function buildCardShell(g) {
  const vipTag = g.isVIP ? `<div class="vip-badge">PRIORITY TRACKED</div>` : '';
  const clockClass = g.state === 'post' ? 'final' : (g.state === 'pre' ? 'scheduled' : '');
  const dotHtml = g.state === 'in' ? `<div class="live-dot"></div>` : (g.state==='pre'?'🗓️':'🏁');

  const buildTeamRow = (side, team) => `
    <div class="team-row ${team.isWinner ? 'winner' : ''} ${team.possession ? 'has-possession' : ''}" id="row_${side}_${g.uid}">
      <div class="team-id">
        <div class="team-logo-box">
          <img src="${team.logo}" onerror="this.style.opacity=0">
          <div class="possession-dot"></div>
        </div>
        <div class="team-info">
          <div class="team-name" id="name_${side}_${g.uid}">${team.seed ? `<span class="seed-tag">${team.seed}</span>` : ''} ${team.name}</div>
          <div class="team-record">${team.record}</div>
        </div>
      </div>
      <div class="score-area">
        <div class="linescore-mini" id="ls_${side}_${g.uid}"></div>
        <div class="total-score" id="scr_${side}_${g.uid}">${team.score}</div>
      </div>
    </div>
  `;

  return `
    ${vipTag}
    <div class="card-header">
      <div class="card-meta-left">
        <div class="card-league" style="background: ${g.leagueColor}">${g.league}</div>
        <div class="card-network">${g.network}</div>
      </div>
      <div class="card-clock ${clockClass}" id="clk_${g.uid}">${dotHtml} ${g.clock}</div>
    </div>
    <div class="card-body">
      ${buildTeamRow('away', g.away)}
      ${buildTeamRow('home', g.home)}
    </div>
    <div class="card-footer">
      <div class="cf-label">ACTION</div>
      <div class="cf-text" id="lp_${g.uid}">${g.lastPlay}</div>
      <div class="cf-odds">${g.odds}</div>
    </div>
  `;
}

function updateCardDOM(card, g) {
  const clk = document.getElementById(`clk_${g.uid}`);
  clk.className = `card-clock ${g.state === 'post' ? 'final' : (g.state === 'pre' ? 'scheduled' : '')}`;
  const dotHtml = g.state === 'in' ? `<div class="live-dot"></div>` : (g.state==='pre'?'🗓️':'🏁');
  clk.innerHTML = `${dotHtml} ${g.clock}`;
  
  document.getElementById(`lp_${g.uid}`).innerText = g.lastPlay;

  const buildLS = (ls) => ls.map(val => `<div class="ls-box">${val}</div>`).join('');
  document.getElementById(`ls_away_${g.uid}`).innerHTML = buildLS(g.away.linescores);
  document.getElementById(`ls_home_${g.uid}`).innerHTML = buildLS(g.home.linescores);

  const processTeam = (side, team) => {
    const row = document.getElementById(`row_${side}_${g.uid}`);
    if (row) {
      if (team.isWinner) row.classList.add('winner'); else row.classList.remove('winner');
      if (team.possession) row.classList.add('has-possession'); else row.classList.remove('has-possession');
    }

    const el = document.getElementById(`scr_${side}_${g.uid}`);
    const memKey = `${g.uid}_${side}`;
    const prev = APP_STATE.prevScores[memKey];
    const curr = team.score;
    
    if (el) {
      el.innerText = curr;
      if (curr !== prev && g.state === 'in') {
        el.classList.remove('flash');
        void el.offsetWidth;
        el.classList.add('flash');
        APP_STATE.prevScores[memKey] = curr;
      }
    }
  };

  processTeam('away', g.away);
  processTeam('home', g.home);
}

async function fetchDeepData(game) {
  if (!game.endpoint.sum) {
    mockDeepData(game);
    return;
  }

  try {
    const res = await fetch(game.endpoint.sum + game.espnId);
    const data = await res.json();
    
    let deep = { boxscore: [], teamstats: {}, pbp: [] };

    // Process Boxscore
    if (data.boxscore && data.boxscore.players) {
      data.boxscore.players.forEach(teamBlock => {
        const tName = teamBlock.team ? teamBlock.team.shortDisplayName : "TEAM";
        if (teamBlock.statistics && teamBlock.statistics[0]) {
          const keys = teamBlock.statistics[0].labels || [];
          const aths = teamBlock.statistics[0].athletes || [];
          
          let tRoster = [];
          aths.forEach(a => {
            let pObj = {
              name: a.athlete.shortName || a.athlete.displayName,
              pic: a.athlete.headshot ? a.athlete.headshot.href : '',
              stats: {}
            };
            (a.stats || []).forEach((v, i) => { if(keys[i]) pObj.stats[keys[i]] = v; });
            tRoster.push(pObj);
          });
          deep.boxscore.push({ team: tName, logo: teamBlock.team.logo, players: tRoster, columns: keys });
        }
      });
    }

    // Process Team Stats
    if (data.boxscore && data.boxscore.teams) {
      data.boxscore.teams.forEach(t => {
        const side = t.homeAway === 'home' ? 'home' : 'away';
        let sMap = {};
        if (t.statistics) {
          t.statistics.forEach(s => { sMap[s.name || s.label] = s.displayValue || s.value; });
        }
        deep.teamstats[side] = sMap;
      });
    }

    // Process PBP
    if (data.plays) {
      deep.pbp = data.plays.slice(-50).reverse(); // Last 50 plays
    }

    APP_STATE.deepData[game.uid] = deep;
    if (APP_STATE.modalOpen === game.uid) renderModalTab();
    
  } catch(e) {
    console.error("Deep data fail", e);
    mockDeepData(game); // Fallback to mock if API fails/CORS
  }
}

function mockDeepData(game) {
  // If API missing or fails, generate pseudo-analytics
  APP_STATE.deepData[game.uid] = {
    boxscore: [
      { team: game.away.name, logo: game.away.logo, columns: ['PTS','AST','REB'], players: [{name:'Player 1', stats:{PTS:20,AST:5,REB:4}}, {name:'TOTALS', stats:{PTS:game.away.score, AST:15, REB:20}}] },
      { team: game.home.name, logo: game.home.logo, columns: ['PTS','AST','REB'], players: [{name:'Player 1', stats:{PTS:22,AST:6,REB:5}}, {name:'TOTALS', stats:{PTS:game.home.score, AST:18, REB:24}}] }
    ],
    teamstats: {
      away: {'Field Goal %': '45.2', 'Turnovers': '12', 'Fouls': '15'},
      home: {'Field Goal %': '48.1', 'Turnovers': '9', 'Fouls': '14'}
    },
    pbp: [
      { clock: {displayValue: game.clock}, text: game.lastPlay, awayScore: game.away.score, homeScore: game.home.score, scoringPlay: false }
    ],

function renderModalTab() {
  if (!APP_STATE.modalOpen) return;
  const uid = APP_STATE.modalOpen;
  const game = APP_STATE.liveData[uid];
  const deep = APP_STATE.deepData[uid];
  const body = document.getElementById('modBody');
  
  if (!deep) return;

  let html = `<div class="tab-pane active">`;

  // --- TAB: BOX SCORE ---
  if (APP_STATE.activeTab === 'box') {
    if (deep.boxscore.length === 0) {
      html += `<div class="empty-state"><div class="empty-text">DETAILED ROSTER TELEMETRY OFFLINE</div></div>`;
    } else {
      html += `<div class="table-grid">`;
      deep.boxscore.forEach(tb => {
        const cols = tb.columns || [];
        html += `
          <div class="table-section">
            <div class="table-header-row">
              <img class="th-logo" src="${tb.logo}" onerror="this.style.display='none'">
              <div class="th-name">${tb.team.toUpperCase()}</div>
            </div>
            <div class="table-wrapper">
              <table class="data-table">
                <thead>
                  <tr><th>ATHLETE</th>${cols.map(c => `<th>${c}</th>`).join('')}</tr>
                </thead>
                <tbody>`;
        
        tb.players.forEach(p => {
          const isTotal = p.name.toLowerCase().includes('team') || p.name.toLowerCase().includes('totals');
          let imgTag = p.pic ? `<img class="player-avatar" src="${p.pic}">` : `<div class="player-avatar" style="background:var(--bg-deep)"></div>`;
          if (isTotal) imgTag = '';
          
          html += `<tr class="${isTotal ? 'totals-row' : ''}">
                    <td>${imgTag} <span>${p.name}</span></td>
                    ${cols.map(c => `<td>${p.stats[c] !== undefined ? p.stats[c] : '-'}</td>`).join('')}
                   </tr>`;
        });
        html += `</tbody></table></div></div>`;
      });
      html += `</div>`;
    }
  }
  
  // --- TAB: TEAM STATS ---
  else if (APP_STATE.activeTab === 'team') {
    const ts = deep.teamstats;
    if (!ts.away || !ts.home || Object.keys(ts.away).length === 0) {
      html += `<div class="empty-state"><div class="empty-text">COMPARATIVE DATA UNAVAILABLE</div></div>`;
    } else {
      html += `<div class="comparison-dashboard">`;
      
      const keys = new Set([...Object.keys(ts.away), ...Object.keys(ts.home)]);
      
      Array.from(keys).slice(0, 15).forEach(key => { // limit to 15 stats
        let rawA = (ts.away[key] || "0").toString().replace(/[^0-9.-]/g, '');
        let rawH = (ts.home[key] || "0").toString().replace(/[^0-9.-]/g, '');
        let aVal = parseFloat(rawA) || 0;
        let hVal = parseFloat(rawH) || 0;
        
        let total = aVal + hVal;
        if (total === 0) total = 1;
        
        let aPct = (aVal / total) * 100;
        let hPct = (hVal / total) * 100;
        
        let leadA = aVal > hVal ? 'leader' : '';
        let leadH = hVal > aVal ? 'leader' : '';
        
        // Reverse logic for bad stats (turnovers, errors)
        if(key.toLowerCase().match(/turnover|error|foul/)) {
            leadA = aVal < hVal ? 'leader' : '';
            leadH = hVal < aVal ? 'leader' : '';
        }

        html += `
          <div class="comp-card">
            <div class="comp-row">
              <div class="comp-val away ${leadA}">${ts.away[key] || "-"}</div>
              <div class="comp-center">
                <div class="comp-label">${key}</div>
              </div>
              <div class="comp-val home ${leadH}">${ts.home[key] || "-"}</div>
            </div>
            <div class="comp-bar-bg">
              <div class="comp-bar-fill-away" style="width:${aPct}%"></div>
              <div class="comp-bar-fill-home" style="width:${hPct}%"></div>
            </div>
          </div>`;
      });
      html += `</div>`;
    }
  }

  // --- TAB: PLAY BY PLAY ---
  else if (APP_STATE.activeTab === 'pbp') {
    if (deep.pbp.length === 0) {
      html += `<div class="empty-state"><div class="empty-text">FEED UPLINK FAILED</div></div>`;
    } else {
      html += `<div class="pbp-layout">
                 <div class="pbp-container">`;
                 
      let lastScore = "";
      deep.pbp.forEach(p => {
        const time = p.clock ? p.clock.displayValue : (p.period ? `P${p.period.number}` : '0:00');
        const text = p.text || p.description || 'Action recorded.';
        const score = (p.awayScore != null && p.homeScore != null) ? `${p.awayScore} - ${p.homeScore}` : '';
        
        let isScoring = p.scoringPlay || text.toLowerCase().match(/score|goal|basket|touchdown|home run|run/);
        let isPenalty = text.toLowerCase().match(/foul|turnover|penalty|error|interception/);
        
        let iconClass = isScoring ? 'icon-score' : isPenalty ? 'icon-foul' : 'icon-normal';
        let iconTxt = isScoring ? '🔥' : isPenalty ? '⚠️' : '⚡';
        let rowClass = isScoring ? 'scoring' : isPenalty ? 'penalty' : '';
        
        let scoreClass = (score !== lastScore && score !== '') ? 'changed' : '';
        if(score !== '') lastScore = score;

        html += `
          <div class="pbp-item ${rowClass}">
            <div class="pbp-clock">${time}</div>
            <div class="pbp-icon ${iconClass}">${iconTxt}</div>
            <div class="pbp-content">
              <div class="pbp-desc">${text}</div>
            </div>
            <div class="pbp-score-tag ${scoreClass}">${score}</div>
          </div>`;
      });
      
      // Mock Drive Chart / Momentum visualization
      html += `</div>
               <div class="drive-chart-mock">
                 <div class="dc-title">MOMENTUM TRACKER</div>
                 <div class="dc-field">
                    <div class="dc-overlay-text">LIVE KINETIC<br>MAPPING ACTIVE</div>
                 </div>
               </div>
             </div>`;
    }
  }

  // --- TAB: ADVANCED METRICS (Mock Gen) ---
  else if (APP_STATE.activeTab === 'adv') {
      const aW = (Math.random() * 40 + 30).toFixed(1);
      const hW = (100 - aW).toFixed(1);
      html += `
        <div class="comparison-dashboard">
            <div class="comp-card" style="grid-column: 1/-1;">
                <div class="comp-header">WIN PROBABILITY INDEX</div>
                <div class="comp-row">
                  <div class="comp-val away" style="color:var(--nexus-blue-bright)">${aW}%</div>
                  <div class="comp-val home" style="color:var(--nexus-orange)">${hW}%</div>
                </div>
                <div class="comp-bar-bg" style="height:20px; border-radius:10px;">
                  <div class="comp-bar-fill-away" style="width:${aW}%"></div>
                  <div class="comp-bar-fill-home" style="width:${hW}%"></div>
                </div>
            </div>
            <div class="comp-card">
                <div class="comp-header">PACE FACTOR</div>
                <div class="comp-val leader" style="width:100%; font-size:3rem;">${(Math.random()*20 + 90).toFixed(1)}</div>
                <div style="text-align:center; color:var(--text-muted); font-family:monospace">POSSESSIONS PER 48</div>
            </div>
            <div class="comp-card">
                <div class="comp-header">OFFENSIVE RATING</div>
                <div class="comp-row">
                    <div class="comp-val away" style="font-size:2rem">${(Math.random()*20 + 100).toFixed(1)}</div>
                    <div class="comp-val home" style="font-size:2rem">${(Math.random()*20 + 100).toFixed(1)}</div>
                </div>
            </div>
        </div>
      `;
  }

  html += `</div>`;
  body.innerHTML = html;
}

// Start sequence
window.onload = bootEngine;

</script>
</body>
</html>
