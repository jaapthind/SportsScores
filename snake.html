<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Universal Sports Scoreboard</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

#searchBar{
width:500px;
padding:10px;
font-size:18px;
margin:20px;
}

#tabs{
margin:10px;
}

.tab{
padding:10px 15px;
background:#222;
display:inline-block;
cursor:pointer;
margin:3px;
}

#scoreboard{
margin-top:10px;
font-size:28px;
}

#games{
margin-top:10px;
}

.game{
background:#111;
padding:8px;
margin:5px;
}

#arena{
margin:auto;
width:1000px;
position:relative;
}

canvas{
background:#c68642;
border:5px solid #222;
border-radius:10px;
}

.flash{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

.scoreEffect{
position:absolute;
font-size:60px;
color:yellow;
animation:pop 1s forwards;
}

@keyframes pop{
0%{transform:scale(0.3);opacity:1}
100%{transform:scale(2);opacity:0}
}

</style>
</head>

<body>

<h1>Universal Sports Scoreboard</h1>

<input id="searchBar" placeholder="Search teams (Google style)">

<div id="tabs">

<div class="tab" onclick="loadSport('nba')">NBA</div>
<div class="tab" onclick="loadSport('ncaam')">NCAA M</div>
<div class="tab" onclick="loadSport('ncaaw')">NCAA W</div>
<div class="tab" onclick="loadSport('mlb')">MLB</div>
<div class="tab" onclick="loadSport('soccer')">Soccer</div>

</div>

<div id="games"></div>

<h2>Basketball Animation Engine</h2>

<div id="arena">

<canvas id="court" width="1000" height="500"></canvas>

<div id="flash" class="flash"></div>

</div>

<button onclick="simulatePlay()">Simulate Basketball Play</button>

<script>

//////////////////////////////////////////////////////////
// SPORT DATABASE (placeholder)
//////////////////////////////////////////////////////////

const sportsData={

nba:[
{home:"Lakers",away:"Warriors",score:"102-99"},
{home:"Celtics",away:"Heat",score:"88-85"}
],

ncaam:[
{home:"Duke",away:"UNC",score:"75-73"}
],

ncaaw:[
{home:"Iowa",away:"UConn",score:"66-62"}
],

mlb:[
{home:"Dodgers",away:"Giants",score:"4-2"}
],

soccer:[
{home:"Barcelona",away:"Madrid",score:"2-1"}
]

}

//////////////////////////////////////////////////////////
// LOAD SPORT SCOREBOARD
//////////////////////////////////////////////////////////

function loadSport(sport){

let container=document.getElementById("games")

container.innerHTML=""

sportsData[sport].forEach(g=>{

let div=document.createElement("div")

div.className="game"

div.innerHTML=g.away+" @ "+g.home+" | "+g.score

container.appendChild(div)

})

}

loadSport("nba")

//////////////////////////////////////////////////////////
// GOOGLE STYLE SEARCH
//////////////////////////////////////////////////////////

document.getElementById("searchBar").addEventListener("input",e=>{

let q=e.target.value.toLowerCase()

let results=[]

Object.values(sportsData).forEach(list=>{

list.forEach(g=>{

if(g.home.toLowerCase().includes(q)||g.away.toLowerCase().includes(q))
results.push(g)

})

})

let container=document.getElementById("games")

container.innerHTML=""

results.forEach(g=>{

let div=document.createElement("div")

div.className="game"

div.innerHTML=g.away+" @ "+g.home+" | "+g.score

container.appendChild(div)

})

})

//////////////////////////////////////////////////////////
// CANVAS BASKETBALL ENGINE
//////////////////////////////////////////////////////////

const canvas=document.getElementById("court")
const ctx=canvas.getContext("2d")

let ball={
x:100,
y:400,
vx:0,
vy:0
}

let players=[
{name:"Shooter",x:200,y:350},
{name:"Defender",x:300,y:350}
]

//////////////////////////////////////////////////////////
// DRAW COURT
//////////////////////////////////////////////////////////

function drawCourt(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#c68642"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="white"

ctx.beginPath()
ctx.arc(500,250,80,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.arc(500,70,240,0,Math.PI)
ctx.stroke()

}

//////////////////////////////////////////////////////////
// DRAW PLAYERS
//////////////////////////////////////////////////////////

function drawPlayers(){

players.forEach(p=>{

ctx.fillStyle="blue"

ctx.beginPath()
ctx.arc(p.x,p.y,15,0,Math.PI*2)
ctx.fill()

})

}

//////////////////////////////////////////////////////////
// DRAW BALL
//////////////////////////////////////////////////////////

function drawBall(){

ctx.fillStyle="orange"

ctx.beginPath()
ctx.arc(ball.x,ball.y,10,0,Math.PI*2)
ctx.fill()

}

//////////////////////////////////////////////////////////
// BALL PHYSICS
//////////////////////////////////////////////////////////

function updateBall(){

ball.x+=ball.vx
ball.y+=ball.vy

ball.vy+=0.3

}

//////////////////////////////////////////////////////////
// RENDER LOOP
//////////////////////////////////////////////////////////

function render(){

drawCourt()

drawPlayers()

drawBall()

updateBall()

requestAnimationFrame(render)

}

render()

//////////////////////////////////////////////////////////
// SHOT TYPES
//////////////////////////////////////////////////////////

function dunk(){

ball.vx=(500-ball.x)/15
ball.vy=-4

}

function layup(){

ball.vx=(500-ball.x)/25
ball.vy=-6

}

function jumper(){

ball.vx=(500-ball.x)/30
ball.vy=-8

}

//////////////////////////////////////////////////////////
// CROWD FLASH
//////////////////////////////////////////////////////////

function crowdFlash(){

let f=document.getElementById("flash")

f.style.opacity=0.8

setTimeout(()=>{
f.style.opacity=0
},150)

}

//////////////////////////////////////////////////////////
// SCORE EFFECT
//////////////////////////////////////////////////////////

function scoreExplosion(points){

let e=document.createElement("div")

e.className="scoreEffect"

e.innerText="+"+points

e.style.left="450px"
e.style.top="200px"

document.getElementById("arena").appendChild(e)

setTimeout(()=>e.remove(),1000)

}

//////////////////////////////////////////////////////////
// REPLAY SLOW MOTION
//////////////////////////////////////////////////////////

function replay(){

ball.vx*=0.3
ball.vy*=0.3

setTimeout(()=>{
ball.vx*=3
ball.vy*=3
},1500)

}

//////////////////////////////////////////////////////////
// SIMULATE BASKETBALL PLAY
//////////////////////////////////////////////////////////

function simulatePlay(){

let plays=["dunk","layup","jumper"]

let play=plays[Math.floor(Math.random()*plays.length)]

ball.x=200
ball.y=350

if(play=="dunk") dunk()
if(play=="layup") layup()
if(play=="jumper") jumper()

setTimeout(()=>{

crowdFlash()

scoreExplosion(play=="jumper"?3:2)

replay()

},1200)

}

</script>

</body>
</html>
