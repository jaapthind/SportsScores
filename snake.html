<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS APEX // STADIUM ABSOLUTE</title>
    <style>
        :root {
            --glass: rgba(5, 8, 15, 0.85);
            --border: rgba(255, 255, 255, 0.25);
            --cyan: #00f3ff;
            --gold: #ffcf40;
            --magenta: #ff007f;
            --green: #00ff88;
            --red: #ff3333;
            --font-mono: 'JetBrains Mono', monospace;
            --blur: blur(80px) saturate(250%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'SF Pro Display', sans-serif; user-select: none; }
        body { background: #000; color: #fff; overflow: hidden; height: 100vh; position: relative; }

        /* =======================================================================
           1. THE IMAX SHOT THEATER (REAL ASSETS ONLY)
           ======================================================================= */
        #stadiumTheater {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 10000; pointer-events: none; display: none;
            background: radial-gradient(circle at center, rgba(0,0,0,0.1) 0%, #000 100%);
            backdrop-filter: blur(20px);
        }
        #theaterCanvas { width: 100%; height: 100%; filter: drop-shadow(0 0 30px #000); }

        /* =======================================================================
           2. AMBIENT PHYSICS & BACKGROUND
           ======================================================================= */
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0.5; }
        .orb { position: absolute; border-radius: 50%; filter: blur(200px); opacity: 0.4; z-index: 0; animation: fluid 40s infinite alternate; }
        .orb-1 { width: 1000px; height: 1000px; background: #001f4d; top: -10%; left: -10%; }
        .orb-2 { width: 800px; height: 800px; background: #3d004d; bottom: -10%; right: -10%; }
        @keyframes fluid { 100% { transform: translate(150px, 100px) scale(1.1); } }

        /* =======================================================================
           3. MASTER GRID ARCHITECTURE
           ======================================================================= */
        .nexus-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 100px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 60px; z-index: 1000; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(30px); border-bottom: 2px solid var(--border);
        }
        .sys-info { font-size: 0.8rem; font-weight: 900; color: var(--cyan); letter-spacing: 2px; text-transform: uppercase; }

        .master-grid {
            display: grid; grid-template-columns: 460px 1fr; gap: 35px;
            padding: 135px 35px 35px 35px; height: 100vh; position: relative; z-index: 10;
        }

        .panel {
            background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: 2px solid var(--border); border-top: 2px solid rgba(255,255,255,0.4);
            border-radius: 50px; box-shadow: 0 80px 160px rgba(0,0,0,1);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .panel-head { padding: 40px; border-bottom: 1.5px solid var(--border); background: rgba(0,0,0,0.3); }
        .panel-body { padding: 35px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 35px; }

        /* =======================================================================
           4. GOOGLE HOME COMMAND HUB (12 PRESETS)
           ======================================================================= */
        .input-mega { width: 100%; background: rgba(0,0,0,0.5); border: 3px solid var(--border); color: #fff; padding: 25px; border-radius: 25px; font-size: 1.2rem; outline: none; transition: 0.3s; }
        .input-mega:focus { border-color: var(--cyan); box-shadow: 0 0 30px rgba(0,243,255,0.2); }
        
        .btn-relay { background: var(--cyan); color: #000; padding: 25px; border-radius: 25px; font-weight: 950; text-transform: uppercase; cursor: pointer; border: none; font-size: 1.1rem; }
        .btn-relay:hover { box-shadow: 0 0 50px var(--cyan); transform: translateY(-4px); }

        .soundboard { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .sb-node { background: rgba(255,255,255,0.05); border: 1.5px solid var(--border); color: #888; padding: 18px; border-radius: 20px; font-size: 0.75rem; font-weight: 900; cursor: pointer; text-align: center; }
        .sb-node:hover { background: rgba(0,243,255,0.15); color: var(--cyan); border-color: var(--cyan); }

        /* =======================================================================
           5. SPORTS TELEMETRY GRID
           ======================================================================= */
        .matrix-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 35px; }
        .card {
            background: rgba(255,255,255,0.03); border: 2px solid var(--border); border-radius: 40px;
            padding: 35px; transition: 0.5s; cursor: pointer; position: relative;
        }
        .card:hover { transform: translateY(-12px); border-color: var(--cyan); background: rgba(255,255,255,0.06); }

        .logo-frame { width: 70px; height: 70px; background: #fff; border-radius: 50%; padding: 10px; border: 3px solid transparent; transition: 0.4s; }
        .possession { border-color: var(--cyan); box-shadow: 0 0 35px var(--cyan); }
        .score-val { font-size: 3.5rem; font-weight: 950; font-family: var(--font-mono); }

        .game-footer { margin-top: 25px; padding-top: 25px; border-top: 1.5px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .timer-pro { font-family: var(--font-mono); font-size: 1.4rem; font-weight: 950; color: var(--cyan); }
        .play-desc { font-size: 0.8rem; color: #555; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%; }

        #term { background: rgba(0,0,0,0.6); border-radius: 30px; padding: 30px; font-family: var(--font-mono); font-size: 0.85rem; color: #444; height: 220px; overflow-y: auto; border: 2.5px solid var(--border); }
    </style>
</head>
<body>

    <div id="stadiumTheater"><canvas id="theaterCanvas"></canvas></div>
    <div class="ambient-layer"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
    <canvas id="particleCanvas"></canvas>

    <header class="nexus-header">
        <div style="font-size: 2.2rem; font-weight: 950; letter-spacing: -3px;">NEXUS <span style="color:var(--cyan);">STADIUM v35</span></div>
        <div class="sys-info">JAAP // BERKELEY CITY COLLEGE // BROADCAST SECURE</div>
    </header>

    <div class="master-grid">
        <div class="panel">
            <div class="panel-head">
                <div style="font-size: 1.5rem; font-weight: 950;">Google Home Node</div>
                <div id="clock" style="color:var(--cyan); font-weight:900; margin-top:5px;">00:00:00.000</div>
            </div>
            <div class="panel-body">
                <input type="text" id="msg" class="input-mega" placeholder="Broadcast to Jaap's Room...">
                <button class="btn-relay" onclick="fireRelay()">Execute Broadcast</button>

                <div class="soundboard">
                    <button class="sb-node" onclick="macro('Dinner is ready! Come to the table.')">🍕 Dinner</button>
                    <button class="sb-node" onclick="macro('Attention, bedtime protocol starting.')">🌙 Bedtime</button>
                    <button class="sb-node" onclick="macro('Focus mode enabled. I am studying.')">📚 Study</button>
                    <button class="sb-node" onclick="macro('Wake up! Time for Berkeley class.')">☀️ Wake Up</button>
                    <button class="sb-node" onclick="macro('Jasjeet, check the front door.')">🧔 Dad</button>
                    <button class="sb-node" onclick="macro('Gaganpreet, I need some help.')">👩 Mom</button>
                    <button class="sb-node" onclick="macro('Kulbir, how are you doing?')">👴 Grandpa</button>
                    <button class="sb-node" onclick="macro('Go Seahawks! Touchdown!')">🏈 Seahawks</button>
                    <button class="sb-node" onclick="macro('Security Alert: Door Breach.')">🚨 Alert</button>
                    <button class="sb-node" onclick="macro('The basketball game is starting!')">🏀 Tip Off</button>
                </div>

                <div id="term">> KERNEL v35.0 LOADED...<br>> RELAY: SCRYPTED ACTIVE.</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-head" style="display:flex; justify-content:space-between; align-items:center;">
                <div style="font-size: 1.5rem; font-weight: 950;">Pro-Telemetry Matrix</div>
                <div style="font-size: 0.8rem; color:var(--green); font-weight:900;">● LIVE SATELLITE LINK</div>
            </div>
            <div class="panel-body">
                <div class="matrix-grid" id="matrix"></div>
            </div>
        </div>
    </div>

    <script>
        const SCRYPTED_URL = "https://pets-hdtv-enormous-objects.trycloudflare.com/endpoint/@scrypted/webhook/public/33/fe2475e0d68cf025/turnOn";
        let scoreState = {};
        let localClocks = {};

        async function fireRelay() {
            const val = document.getElementById('msg').value; if(!val) return;
            try { 
                await fetch(SCRYPTED_URL, { method: 'GET', mode: 'no-cors' }); 
                setTimeout(() => fetch(SCRYPTED_URL, { method: 'GET', mode: 'no-cors' }), 450);
                document.getElementById('term').innerHTML += `<br>> Relay Sent: ${val}`; 
            } catch(e){}
            document.getElementById('msg').value = "";
        }
        function macro(m) { document.getElementById('msg').value = m; fireRelay(); }

        const APIS = [
            { id: "NBA", url: "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard" },
            { id: "NCAA", url: "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard" }
        ];

        async function poll() {
            let list = [];
            for (let api of APIS) {
                try {
                    let res = await fetch(api.url); let json = await res.json();
                    json.events.forEach(g => {
                        if(g.status.type.state === 'in') {
                            let c = g.competitions[0];
                            let game = {
                                id: g.id, l: api.id, clock: g.status.displayClock,
                                play: c.situation?.lastPlay?.text || "Synchronizing...",
                                athleteId: c.situation?.lastPlay?.athletes?.[0]?.id || null,
                                pos: c.situation?.possession || null,
                                h: { id: c.competitors[0].id, n: c.competitors[0].team.shortDisplayName, s: parseInt(c.competitors[0].score), i: c.competitors[0].team.logo },
                                a: { id: c.competitors[1].id, n: c.competitors[1].team.shortDisplayName, s: parseInt(c.competitors[1].score), i: c.competitors[1].team.logo }
                            };
                            list.push(game);
                            syncClock(game.id, game.clock);
                        }
                    });
                } catch(e){}
            }
            render(list);
        }

        function render(data) {
            const m = document.getElementById('matrix');
            if(data.length === 0) { m.innerHTML = "AWAITING LIVE DATA..."; return; }
            m.innerHTML = data.map(g => `
                <div class="card">
                    <div style="font-size:0.8rem;font-weight:950;color:#444;margin-bottom:20px;">${g.l} TELEMETRY</div>
                    <div class="team-line" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                        <div style="display:flex;align-items:center;gap:20px;">
                            <div class="logo-frame ${g.pos == g.a.id ? 'possession' : ''}"><img src="${g.a.i}" style="width:100%;height:100%;object-fit:contain;"></div>
                            <strong style="font-size:1.4rem;">${g.a.n}</strong>
                        </div>
                        <div class="score-val">${g.a.s}</div>
                    </div>
                    <div class="team-line" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                        <div style="display:flex;align-items:center;gap:20px;">
                            <div class="logo-frame ${g.pos == g.h.id ? 'possession' : ''}"><img src="${g.h.i}" style="width:100%;height:100%;object-fit:contain;"></div>
                            <strong style="font-size:1.4rem;">${g.h.n}</strong>
                        </div>
                        <div class="score-val">${g.h.s}</div>
                    </div>
                    <div class="game-footer">
                        <div class="timer-pro" id="c_${g.id}">${g.clock}</div>
                        <div class="play-desc">${g.play}</div>
                    </div>
                </div>
            `).join('');

            data.forEach(g => {
                if(scoreState[`${g.id}_a`] < g.a.s) startCinema(g, 'a');
                if(scoreState[`${g.id}_h`] < g.h.s) startCinema(g, 'h');
                scoreState[`${g.id}_a`] = g.a.s; scoreState[`${g.id}_h`] = g.h.s;
            });
        }

        // --- THE CINEMA ENGINE (REAL ASSETS) ---
        const theater = document.getElementById('theaterCanvas');
        const tx = theater.getContext('2d');
        const athlete = new Image();
        const bball = new Image(); bball.src = 'https://i.imgur.com/vHqC6M7.png';
        const hoop = new Image(); hoop.src = 'https://i.imgur.com/vUoO8gV.png'; // High-res Rim Asset
        const court = new Image(); court.src = 'https://i.imgur.com/8Q2Wq4U.jpeg'; // Real Wood Court

        function startCinema(game, side) {
            const stage = document.getElementById('stadiumTheater');
            stage.style.display = 'block';
            theater.width = window.innerWidth; theater.height = window.innerHeight;

            const isDeep = game.play.includes("three") || game.play.includes("foot");
            athlete.src = game.athleteId ? `https://a.espncdn.com/i/headshots/nba/players/full/${game.athleteId}.png` : `https://a.espncdn.com/i/teamlogos/default-team-logo-500.png`;
            
            athlete.onload = () => runIMAX(isDeep);
        }

        function runIMAX(isDeep) {
            let f = 0; const rimX = theater.width * 0.9; const rimY = theater.height * 0.4;
            let startX = isDeep ? 200 : 550;
            let ball = { x: startX + 150, y: theater.height * 0.75, vx: (rimX - 80 - startX)/65, vy: isDeep ? -36 : -22, active: false, r: 0 };

            function loop() {
                tx.clearRect(0,0,theater.width,theater.height);

                // Draw Real Court Background
                tx.drawImage(court, 0, theater.height * 0.8, theater.width, theater.height * 0.2);

                // Draw Real Hoop Asset
                tx.drawImage(hoop, rimX - 180, rimY - 50, 200, 300);

                // Draw Real Athlete
                let jump = (f > 25 && f < 65) ? -90 : 0;
                tx.drawImage(athlete, startX, theater.height * 0.75 + jump - 220, 320, 320);

                if(f === 48) ball.active = true;
                if(ball.active) {
                    ball.x += ball.vx; ball.y += ball.vy; ball.vy += 0.8; ball.r += 0.3;
                    tx.save(); tx.translate(ball.x, ball.y); tx.rotate(ball.r);
                    tx.drawImage(bball, -25, -25, 50, 50); tx.restore();
                }

                f++;
                if(f < 120) requestAnimationFrame(loop);
                else document.getElementById('stadiumTheater').style.display = 'none';
            }
            loop();
        }

        function syncClock(id, raw) {
            if(!raw || !raw.includes(":")) return;
            let p = raw.split(":"); let t = (parseInt(p[0])*60) + parseInt(p[1]);
            if(!localClocks[id] || Math.abs(localClocks[id]-t) > 5) localClocks[id] = t;
        }
        setInterval(() => {
            for(let id in localClocks) {
                if(localClocks[id] > 0) {
                    localClocks[id]--;
                    let m = Math.floor(localClocks[id]/60); let s = String(localClocks[id]%60).padStart(2,'0');
                    let el = document.getElementById(`c_${id}`); if(el && !el.innerText.includes("End")) el.innerText = `${m}:${s}`;
                }
            }
        }, 1000);

        const pC = document.getElementById('particleCanvas'); const pX = pC.getContext('2d');
        let pts = [];
        function initP() {
            pC.width = window.innerWidth; pC.height = window.innerHeight;
            for(let i=0; i<100; i++) pts.push({ x: Math.random()*pC.width, y: Math.random()*pC.height, s: Math.random()*3, vx: Math.random()*0.4-0.2, vy: Math.random()*0.4-0.2 });
        }
        function drawP() {
            pX.clearRect(0,0,pC.width,pC.height); pX.fillStyle = "rgba(0, 243, 255, 0.4)";
            pts.forEach(p => { p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>pC.width) p.vx*=-1; if(p.y<0||p.y>pC.height) p.vy*=-1; pX.beginPath(); pX.arc(p.x, p.y, p.s, 0, Math.PI*2); pX.fill(); });
            requestAnimationFrame(drawP);
        }
        initP(); drawP(); poll(); setInterval(poll, 15000);
        setInterval(() => { const d = new Date(); document.getElementById('clock').innerText = d.toLocaleTimeString('en-US', {hour12:false}) + "." + d.getMilliseconds(); }, 50);
    </script>
</body>
</html>
