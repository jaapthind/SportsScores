<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Virtual Stadium Telemetry Engine</title>

<style>

:root{
--cyan:#00eaff;
--glass:rgba(12,18,28,.85);
--border:rgba(255,255,255,.15);
}

body{
margin:0;
background:#05060a;
color:white;
font-family:system-ui;
overflow:hidden;
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
right:0;
height:80px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
background:#000a;
backdrop-filter:blur(40px);
border-bottom:1px solid var(--border);
}

.clock{
color:var(--cyan);
font-family:monospace;
}

/* DASHBOARD */

.dashboard{
position:absolute;
top:100px;
left:40px;
right:40px;
bottom:40px;
display:grid;
grid-template-columns:400px 1fr;
gap:40px;
}

.panel{
background:var(--glass);
border-radius:30px;
border:1px solid var(--border);
padding:25px;
overflow:auto;
}

.matrix{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;
}

.card{
background:#ffffff08;
border:1px solid var(--border);
border-radius:20px;
padding:20px;
}

.team{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.team img{
width:40px;
height:40px;
}

.score{
font-size:2rem;
font-weight:900;
}

/* SHOT THEATER */

#shotLayer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1000;
display:none;
will-change:transform;
}

canvas{
width:100%;
height:100%;
}

/* GOOGLE RELAY */

input,button{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
}

button{
background:var(--cyan);
font-weight:700;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<div>Virtual Stadium Telemetry</div>
<div id="clock" class="clock"></div>
</header>

<div class="dashboard">

<div class="panel">

<h3>Google Home Relay</h3>

<input id="msg" placeholder="Broadcast command">

<button onclick="relay()">Trigger</button>

</div>

<div class="panel">

<div id="games" class="matrix"></div>

</div>

</div>

<div id="shotLayer">
<canvas id="arena"></canvas>
</div>

<script>

/* CLOCK */

setInterval(()=>{
let d=new Date()
clock.innerText=
d.toLocaleTimeString("en-US",{hour12:false})+
"."+
String(d.getMilliseconds()).padStart(3,"0")
},1)

/* GOOGLE HOME RELAY */

const RELAY="https://pets-hdtv-enormous-objects.trycloudflare.com/endpoint/@scrypted/webhook/public/33/fe2475e0d68cf025/turnOn"

function relay(){
fetch(RELAY,{method:"GET",mode:"no-cors"})
setTimeout(()=>fetch(RELAY,{method:"GET",mode:"no-cors"}),400)
}

/* ESPN TELEMETRY */

const SOURCES=[
"https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard",
"https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard"
]

let scoreCache={}

async function poll(){

let games=[]

for(let url of SOURCES){

try{

let r=await fetch(url)
let j=await r.json()

j.events.forEach(e=>{

let c=e.competitions[0]

games.push({

id:e.id,

play:c.situation?.lastPlay?.text||"",

athlete:c.situation?.lastPlay?.athletes?.[0]?.id||null,

home:{
name:c.competitors[0].team.shortDisplayName,
logo:c.competitors[0].team.logo,
score:+c.competitors[0].score
},

away:{
name:c.competitors[1].team.shortDisplayName,
logo:c.competitors[1].team.logo,
score:+c.competitors[1].score
}

})

})

}catch(e){}

}

render(games)

}

setInterval(poll,12000)
poll()

/* RENDER UI */

function render(games){

gamesDiv.innerHTML=games.map(g=>`

<div class="card">

<div class="team">
<img src="${g.away.logo}">
${g.away.name}
</div>

<div class="score">${g.away.score}</div>

<div class="team">
<img src="${g.home.logo}">
${g.home.name}
</div>

<div class="score">${g.home.score}</div>

<div style="opacity:.6">${g.play}</div>

</div>

`).join("")

games.forEach(g=>{

if(scoreCache[g.id] && g.home.score>scoreCache[g.id].home.score){
shotAnimation(g)
}

if(scoreCache[g.id] && g.away.score>scoreCache[g.id].away.score){
shotAnimation(g)
}

scoreCache[g.id]=g

})

}

/* SHOT TYPE */

function shotType(text){

text=text.toLowerCase()

if(text.includes("dunk")) return "dunk"
if(text.includes("layup")) return "layup"
if(text.includes("three")) return "three"

return "jumper"

}

function shotDistance(text){

let m=text.match(/(\d+)[- ]?ft/i)

if(m) return parseInt(m[1])

return 15

}

/* ARENA ENGINE */

const canvas=document.getElementById("arena")
const ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

let ball=new Image()
ball.src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Basketball.png"

/* SHOT SIMULATION */

async function shotAnimation(game){

shotLayer.style.display="block"

let playerImg=null

if(game.athlete){

playerImg=new Image()

playerImg.src=
`https://a.espncdn.com/i/headshots/nba/players/full/${game.athlete}.png`

}

let type=shotType(game.play)

let dist=shotDistance(game.play)

let g=9.8

let startX=200
let startY=canvas.height-200

let hoopX=canvas.width*.75
let hoopY=canvas.height*.3

let vx=(hoopX-startX)/(90+dist)

let vy=-18-(dist/4)

let ballPos={x:startX,y:startY}

let frame=0

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

/* PLAYER */

if(playerImg){

ctx.drawImage(playerImg,startX-120,startY-200,200,200)

}

/* LAYUP GLIDE */

if(type==="layup"){
startX+=1.2
}

/* BALL PHYSICS */

ballPos.x+=vx
ballPos.y+=vy

vy+=g*.12

ctx.drawImage(ball,ballPos.x,ballPos.y,40,40)

/* HOOP */

ctx.beginPath()
ctx.arc(hoopX,hoopY,40,0,Math.PI*2)
ctx.strokeStyle="#bbb"
ctx.lineWidth=6
ctx.stroke()

frame++

if(frame<200){

requestAnimationFrame(animate)

}else{

shotLayer.style.display="none"

}

}

animate()

}

</script>

</body>
</html>
