<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced NBA Game Visualizer</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

#arena{
position:relative;
width:900px;
height:500px;
margin:auto;
background:#d48c3a;
border:6px solid #222;
border-radius:12px;
overflow:hidden;
}

#courtLines{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
}

.threeArc{
position:absolute;
width:400px;
height:400px;
border:3px solid white;
border-radius:50%;
left:250px;
top:50px;
opacity:0.3;
}

#scoreboard{
font-size:32px;
margin:10px;
}

.teamLogo{
width:70px;
height:70px;
vertical-align:middle;
}

.player{
position:absolute;
width:40px;
height:40px;
background:#ff4444;
border-radius:50%;
transition:all 0.5s linear;
}

.ball{
position:absolute;
width:15px;
height:15px;
background:orange;
border-radius:50%;
}

.flash{
position:absolute;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

.scoreExplosion{
position:absolute;
font-size:60px;
color:yellow;
animation:explode 1s ease-out;
}

@keyframes explode{
0%{transform:scale(0.3);opacity:1;}
100%{transform:scale(2);opacity:0;}
}

.replayOverlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
}

</style>
</head>

<body>

<h1>🏀 Live Game Visualizer</h1>

<div id="scoreboard">
<img id="logoA" class="teamLogo">
<span id="teamA">0</span>

VS

<span id="teamB">0</span>
<img id="logoB" class="teamLogo">
</div>

<div id="arena">

<div id="courtLines">
<div class="threeArc"></div>
</div>

<div id="ball" class="ball"></div>

<div id="flash" class="flash"></div>

<div id="replay" class="replayOverlay"></div>

</div>

<br>

<button onclick="simulatePlay()">Simulate Play</button>

<script>

///////////////////////////
// TEAM DATA
///////////////////////////

const teams={
LAL:{
name:"Lakers",
logo:"https://cdn.nba.com/logos/nba/1610612747/global/L/logo.svg",
players:["LeBron James","Anthony Davis","D'Angelo Russell"]
},
GSW:{
name:"Warriors",
logo:"https://cdn.nba.com/logos/nba/1610612744/global/L/logo.svg",
players:["Stephen Curry","Klay Thompson","Draymond Green"]
}
}

document.getElementById("logoA").src=teams.LAL.logo
document.getElementById("logoB").src=teams.GSW.logo

///////////////////////////
// GAME STATE
///////////////////////////

let score={
LAL:0,
GSW:0
}

let stats={
players:{},
teams:{
LAL:{shots:0,threes:0,dunks:0,layups:0},
GSW:{shots:0,threes:0,dunks:0,layups:0}
}
}

///////////////////////////
// PLAYER INIT
///////////////////////////

function initPlayers(){

teams.LAL.players.forEach(p=>{
stats.players[p]={pts:0,shots:0,threes:0}
})

teams.GSW.players.forEach(p=>{
stats.players[p]={pts:0,shots:0,threes:0}
})

}

initPlayers()

///////////////////////////
// PARSE PLAY DESCRIPTION
///////////////////////////

function parsePlay(text){

let result={}

teams.LAL.players.concat(teams.GSW.players).forEach(p=>{
if(text.includes(p)) result.player=p
})

if(text.includes("3PT")) result.points=3
else result.points=2

let dist=text.match(/([0-9]+)ft/)
result.distance=dist?parseInt(dist[1]):10

if(text.includes("dunk")) result.type="dunk"
else if(text.includes("layup")) result.type="layup"
else result.type="jumper"

return result

}

///////////////////////////
// ANIMATION ENGINE
///////////////////////////

function animateShot(data){

let ball=document.getElementById("ball")

let startX=100+Math.random()*600
let startY=300+Math.random()*150

let hoopX=430
let hoopY=80

ball.style.left=startX+"px"
ball.style.top=startY+"px"

setTimeout(()=>{
ball.style.transition="all 0.8s"
ball.style.left=hoopX+"px"
ball.style.top=hoopY+"px"
},50)

if(data.type=="dunk") dunkEffect()
if(data.type=="layup") layupEffect()

}

function dunkEffect(){

let flash=document.getElementById("flash")
flash.style.opacity=0.8

setTimeout(()=>{
flash.style.opacity=0
},200)

}

function layupEffect(){

let ball=document.getElementById("ball")
ball.style.transform="scale(1.4)"

setTimeout(()=>{
ball.style.transform="scale(1)"
},300)

}

///////////////////////////
// CROWD LIGHT FLASH
///////////////////////////

function crowdFlash(){

let flash=document.getElementById("flash")
flash.style.opacity=0.5

setTimeout(()=>{
flash.style.opacity=0
},120)

}

///////////////////////////
// SCORE EXPLOSION
///////////////////////////

function scoreExplosion(points){

let arena=document.getElementById("arena")

let e=document.createElement("div")
e.className="scoreExplosion"
e.innerText="+"+points

e.style.left="400px"
e.style.top="200px"

arena.appendChild(e)

setTimeout(()=>e.remove(),1000)

}

///////////////////////////
// REPLAY
///////////////////////////

function replay(){

let r=document.getElementById("replay")

r.style.display="block"

setTimeout(()=>{
r.style.display="none"
},2000)

}

///////////////////////////
// GAME ENGINE
///////////////////////////

function simulatePlay(){

let plays=[
"Stephen Curry 28ft 3PT jumper",
"LeBron James 5ft dunk",
"Anthony Davis 7ft layup",
"Klay Thompson 25ft 3PT jumper"
]

let play=plays[Math.floor(Math.random()*plays.length)]

let parsed=parsePlay(play)

animateShot(parsed)

setTimeout(()=>{

let team=teams.LAL.players.includes(parsed.player)?"LAL":"GSW"

score[team]+=parsed.points

stats.players[parsed.player].pts+=parsed.points
stats.players[parsed.player].shots++

stats.teams[team].shots++

if(parsed.points==3) stats.teams[team].threes++
if(parsed.type=="dunk") stats.teams[team].dunks++
if(parsed.type=="layup") stats.teams[team].layups++

updateScore()

scoreExplosion(parsed.points)

crowdFlash()

replay()

},900)

}

///////////////////////////
// SCOREBOARD UPDATE
///////////////////////////

function updateScore(){

document.getElementById("teamA").innerText=score.LAL
document.getElementById("teamB").innerText=score.GSW

}

</script>

</body>
</html>
