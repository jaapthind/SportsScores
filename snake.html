<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS APEX // THE IMAX SINGULARITY</title>
    <style>
        :root {
            /* Hyper-Glass Definition */
            --glass-base: rgba(5, 8, 15, 0.9);
            --glass-border: rgba(255, 255, 255, 0.22);
            --glass-blur: blur(80px) saturate(240%);
            
            /* Neon Spectrum */
            --cyan: #00f3ff;
            --gold: #ffcf40;
            --magenta: #ff007f;
            --green: #00ff88;
            --red: #ff3333;
            
            /* Typography */
            --font-tech: 'JetBrains Mono', monospace;
            --font-main: 'SF Pro Display', -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); user-select: none; }
        body { background: #000; color: #fff; overflow: hidden; height: 100vh; position: relative; }

        /* =======================================================================
           1. CINEMATIC ARENA STAGE (ISOLATED LAYER)
           ======================================================================= */
        #shotTheater {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 100000; pointer-events: none; display: none;
            background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, #000 100%);
            transform: translateZ(0); /* Hardware Acceleration */
            will-change: transform;
        }
        #theaterCanvas { width: 100%; height: 100%; image-rendering: -webkit-optimize-contrast; }

        /* =======================================================================
           2. AMBIENT ATMOSPHERE
           ======================================================================= */
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0.5; }
        .orb { position: absolute; border-radius: 50%; filter: blur(200px); opacity: 0.3; z-index: 0; animation: fluid 30s infinite alternate linear; }
        .orb-1 { width: 1100px; height: 1100px; background: #001f4d; top: -10%; left: -10%; }
        .orb-2 { width: 900px; height: 900px; background: #3d004d; bottom: -10%; right: -10%; }
        @keyframes fluid { 100% { transform: translate(150px, 120px) scale(1.1); } }

        /* =======================================================================
           3. UI MASTER GRID
           ======================================================================= */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 110px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 60px; z-index: 1000; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(40px); border-bottom: 2px solid var(--glass-border);
        }
        .header-brand { font-size: 2rem; font-weight: 950; letter-spacing: -3px; }
        .header-brand span { color: var(--cyan); }
        #sysTime { font-family: var(--font-tech); font-weight: 900; color: var(--cyan); font-size: 1rem; }

        .master-layout {
            display: grid; grid-template-columns: 480px 1fr; gap: 40px;
            padding: 150px 40px 40px 40px; height: 100vh; position: relative; z-index: 10;
        }

        .panel {
            background: var(--glass-base); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1.5px solid var(--glass-border); border-top: 2.5px solid rgba(255,255,255,0.3);
            border-radius: 56px; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 70px 140px rgba(0,0,0,1);
        }

        .panel-head { padding: 40px; border-bottom: 2px solid var(--glass-border); background: rgba(0,0,0,0.3); }
        .panel-body { padding: 40px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 45px; }

        /* --- GOOGLE HOME BROADCAST --- */
        .terminal-box { display: flex; flex-direction: column; gap: 20px; }
        .nexus-input {
            width: 100%; background: rgba(0,0,0,0.6); border: 3px solid var(--glass-border);
            color: #fff; padding: 30px; border-radius: 25px; font-size: 1.3rem; outline: none;
            font-family: var(--font-tech); text-align: center;
        }
        .nexus-input:focus { border-color: var(--cyan); box-shadow: 0 0 40px rgba(0,243,255,0.25); }
        
        .btn-broadcast {
            background: var(--cyan); color: #000; padding: 25px; border-radius: 25px;
            font-weight: 950; text-transform: uppercase; letter-spacing: 3px; border: none;
            cursor: pointer; transition: 0.4s; font-size: 1.2rem;
        }
        .btn-broadcast:hover { transform: translateY(-4px); box-shadow: 0 0 60px var(--cyan); }

        #logTerm { background: rgba(0,0,0,0.6); border-radius: 30px; padding: 30px; font-family: var(--font-tech); font-size: 0.9rem; color: #444; height: 350px; overflow-y: auto; border: 2px solid var(--glass-border); }
        .log-cyan { color: var(--cyan); }

        /* --- TELEMETRY MATRIX --- */
        .matrix-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 40px; }
        .card {
            background: rgba(255,255,255,0.03); border: 2px solid var(--glass-border); border-radius: 48px;
            padding: 40px; transition: 0.5s; position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-12px); border-color: var(--cyan); background: rgba(255,255,255,0.06); }
        
        .l-badge { position: absolute; top: -15px; left: 40px; background: #fff; color: #000; padding: 6px 18px; border-radius: 12px; font-size: 0.8rem; font-weight: 950; }
        
        .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo-frame { width: 75px; height: 75px; background: #fff; border-radius: 50%; padding: 10px; border: 3.5px solid transparent; }
        .possession { border-color: var(--cyan); box-shadow: 0 0 35px var(--cyan); }
        .val-large { font-size: 3.5rem; font-weight: 950; font-family: var(--font-tech); }

        .game-footer { margin-top: 25px; padding-top: 25px; border-top: 2px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .live-timer { font-family: var(--font-tech); font-size: 1.5rem; font-weight: 950; color: var(--cyan); }
        .play-feed { font-size: 0.85rem; color: #555; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%; }
    </style>
</head>
<body>

    <div id="shotTheater"><canvas id="theaterCanvas"></canvas></div>
    <div class="ambient-layer"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
    <canvas id="particleCanvas"></canvas>

    <header>
        <div class="header-brand">NEXUS <span>SINGULARITY v42</span></div>
        <div id="sysTime">00:00:00.000</div>
    </header>

    <div class="master-layout">
        <div class="panel">
            <div class="panel-head">
                <div style="font-size: 1.6rem; font-weight: 950;">Broadcast Uplink</div>
            </div>
            <div class="panel-body">
                <div class="terminal-box">
                    <input type="text" id="nexusMsg" class="nexus-input" placeholder="Transmission payload...">
                    <button class="btn-broadcast" onclick="executeBroadcast()">Initiate Broadcast</button>
                </div>
                <div id="logTerm">> KERNEL v42.0 LOADED...<br>> BIOMETRIC ASSETS: CACHED.</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-body">
                <div class="matrix-grid" id="matrix"></div>
            </div>
        </div>
    </div>

    <script>
        // 🔴 GOOGLE HOME RELAY ENDPOINT 🔴
        const TARGET_UPLINK = "https://pets-hdtv-enormous-objects.trycloudflare.com/endpoint/@scrypted/webhook/public/33/fe2475e0d68cf025/turnOn";
        
        let scoreMem = {};
        let tickerCache = {};

        async function executeBroadcast() {
            const input = document.getElementById('nexusMsg');
            const val = input.value.trim(); if(!val) return;
            try {
                // DUAL-BURST SEQUENCE (For routine reliability)
                await fetch(TARGET_UPLINK, { method: 'GET', mode: 'no-cors' });
                setTimeout(() => fetch(TARGET_UPLINK, { method: 'GET', mode: 'no-cors' }), 400);
                document.getElementById('logTerm').innerHTML += `<br>> Relay Sent: ${val}`;
            } catch(e){}
            input.value = "";
        }

        const SOURCES = [
            { id: "NBA", url: "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard" },
            { id: "NCAA", url: "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard" }
        ];

        async function pollTelemetry() {
            let dataBatch = [];
            for (let src of SOURCES) {
                try {
                    let res = await fetch(src.url); let json = await res.json();
                    json.events.forEach(g => {
                        if(g.status.type.state === 'in') {
                            let c = g.competitions[0];
                            let game = {
                                id: g.id, l: src.id, 
                                clock: g.status.displayClock,
                                period: g.status.period,
                                play: c.situation?.lastPlay?.text || "Synchronizing action...",
                                athleteId: c.situation?.lastPlay?.athletes?.[0]?.id || null,
                                pos: c.situation?.possession || null,
                                h: { id: c.competitors[0].id, n: c.competitors[0].team.shortDisplayName, s: parseInt(c.competitors[0].score), i: c.competitors[0].team.logo },
                                a: { id: c.competitors[1].id, n: c.competitors[1].team.shortDisplayName, s: parseInt(c.competitors[1].score), i: c.competitors[1].team.logo }
                            };
                            dataBatch.push(game);
                            syncClock(game.id, game.clock);
                        }
                    });
                } catch(e){}
            }
            renderMatrix(dataBatch);
        }

        function renderMatrix(data) {
            const m = document.getElementById('matrix');
            if(data.length === 0) { m.innerHTML = "AWAITING LIVE TRANSMISSIONS..."; return; }
            m.innerHTML = data.map(g => `
                <div class="card">
                    <div class="l-badge">${g.l} // Q${g.period}</div>
                    <div class="score-row">
                        <div style="display:flex;align-items:center;gap:20px;">
                            <div class="logo-frame ${g.pos == g.a.id ? 'possession' : ''}"><img src="${g.a.i}" style="width:100%;height:100%;object-fit:contain;"></div>
                            <strong style="font-size:1.4rem;">${g.a.n}</strong>
                        </div>
                        <div class="val-large">${g.a.s}</div>
                    </div>
                    <div class="score-row">
                        <div style="display:flex;align-items:center;gap:20px;">
                            <div class="logo-frame ${g.pos == g.h.id ? 'possession' : ''}"><img src="${g.h.i}" style="width:100%;height:100%;object-fit:contain;"></div>
                            <strong style="font-size:1.4rem;">${g.h.n}</strong>
                        </div>
                        <div class="val-large">${g.h.s}</div>
                    </div>
                    <div class="game-footer">
                        <div class="live-timer" id="t_${g.id}">${g.clock}</div>
                        <div class="play-feed">${g.play}</div>
                    </div>
                </div>
            `).join('');

            data.forEach(g => {
                if(scoreMem[`${g.id}_a`] < g.a.s) triggerIMAX(g, 'a');
                if(scoreMem[`${g.id}_h`] < g.h.s) triggerIMAX(g, 'h');
                scoreMem[`${g.id}_a`] = g.a.s; scoreMem[`${g.id}_h`] = g.h.s;
            });
        }

        // --- THE PHOTOREALISTIC IMAX ENGINE ---
        const tC = document.getElementById('theaterCanvas');
        const tX = tC.getContext('2d');
        const athlete = new Image(); athlete.crossOrigin = "anonymous";
        const bBall = new Image(); bBall.crossOrigin = "anonymous"; bBall.src = 'https://i.imgur.com/vHqC6M7.png'; // High-res Wilson Ball
        const court = new Image(); court.crossOrigin = "anonymous"; court.src = 'https://i.imgur.com/8Q2Wq4U.jpeg'; // Real Wood Court Floor

        function triggerIMAX(game, side) {
            const stage = document.getElementById('shotTheater');
            stage.style.display = 'block';
            tC.width = window.innerWidth; tC.height = window.innerHeight;

            const distMatch = game.play.match(/(\d+)-foot/);
            const feet = distMatch ? parseInt(distMatch[1]) : (game.play.includes("layup") ? 2 : 15);
            const isDunk = game.play.includes("layup") || game.play.includes("dunk");
            
            athlete.src = game.athleteId ? `https://a.espncdn.com/i/headshots/nba/players/full/${game.athleteId}.png` : `https://a.espncdn.com/i/teamlogos/default-team-logo-500.png`;
            athlete.onload = () => runIMAXSequence(feet, isDunk);
        }

        function runIMAXSequence(feet, isDunk) {
            let f = 0; const rimX = tC.width * 0.88; const rimY = tC.height * 0.38;
            let shooterX = isDunk ? rimX - 350 : (feet > 22 ? 200 : 500);
            let ball = { x: shooterX + 150, y: tC.height * 0.75, vx: (rimX - 60 - shooterX)/65, vy: feet > 22 ? -36 : -22, active: false, r: 0 };

            function loop() {
                tX.clearRect(0,0,tC.width,tC.height);

                // 1. Draw Wood-Grain Court
                tX.drawImage(court, 0, tC.height * 0.85, tC.width, tC.height * 0.15);

                // 2. Draw Precision Rim (Vector Mesh Net)
                tX.strokeStyle = "#ff4500"; tX.lineWidth = 12;
                tX.beginPath(); tX.arc(rimX - 55, rimY + 85, 32, 0, Math.PI); tX.stroke(); // Rim
                tX.strokeStyle = "rgba(255,255,255,0.4)"; tX.lineWidth = 3;
                for(let i=-25; i<=25; i+=12) { tX.beginPath(); tX.moveTo(rimX-55+i, rimY+117); tX.lineTo(rimX-55+i*0.6, rimY+180 + Math.sin(f*0.1)*5); tX.stroke(); } // Net Physics

                // 3. Draw Biometric Athlete (Action Image)
                let jump = (f > 25 && f < 65) ? -95 : (isDunk && f > 25 ? (f-25)*-4 : 0);
                if(isDunk && f > 25) shooterX += 6.5; // Kinetic Gliding
                tX.drawImage(athlete, shooterX, tC.height * 0.78 + jump - 220, 320, 320);

                // 4. Parabolic Physics Sequence
                if(f === 48) ball.active = true;
                if(ball.active) {
                    ball.x += ball.vx; ball.y += ball.vy; ball.vy += 0.82; ball.r += 0.35; // True Gravity (0.82)
                    tX.save(); tX.translate(ball.x, ball.y); tX.rotate(ball.r);
                    tX.drawImage(bBall, -24, -24, 48, 48); tX.restore();
                }

                f++;
                if(f < 130) requestAnimationFrame(loop);
                else document.getElementById('shotTheater').style.display = 'none';
            }
            loop();
        }

        // --- PREDICTIVE CLOCK ENGINE ---
        function syncClock(id, raw) {
            if(!raw || !raw.includes(":")) return;
            let p = raw.split(":"); let t = (parseInt(p[0])*60) + parseInt(p[1]);
            if(!tickerCache[id] || Math.abs(tickerCache[id]-t) > 5) tickerCache[id] = t;
        }
        setInterval(() => {
            for(let id in tickerCache) {
                if(tickerCache[id] > 0) {
                    tickerCache[id]--;
                    let m = Math.floor(tickerCache[id]/60); let s = String(tickerCache[id]%60).padStart(2,'0');
                    let el = document.getElementById(`t_${id}`); if(el && !el.innerText.includes("End")) el.innerText = `${m}:${s}`;
                }
            }
        }, 1000);

        // --- AMBIENT CORE ---
        const pC = document.getElementById('particleCanvas'); const pX = pC.getContext('2d');
        let pts = [];
        function initP() {
            pC.width = window.innerWidth; pC.height = window.innerHeight;
            for(let i=0; i<100; i++) pts.push({ x: Math.random()*pC.width, y: Math.random()*pC.height, s: Math.random()*3, vx: Math.random()*0.4-0.2, vy: Math.random()*0.4-0.2 });
        }
        function drawP() {
            pX.clearRect(0,0,pC.width,pC.height); pX.fillStyle = "rgba(0, 243, 255, 0.45)";
            pts.forEach(p => { p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>pC.width) p.vx*=-1; if(p.y<0||p.y>pC.height) p.vy*=-1; pX.beginPath(); pX.arc(p.x, p.y, p.s, 0, Math.PI*2); pX.fill(); });
            requestAnimationFrame(drawP);
        }
        initP(); drawP(); pollTelemetry(); setInterval(pollTelemetry, 15000);
        setInterval(() => { const d = new Date(); document.getElementById('sysTime').innerText = d.toLocaleTimeString('en-US', {hour12:false}) + "." + d.getMilliseconds(); }, 50);
    </script>
</body>
</html>
