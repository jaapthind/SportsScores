<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ULTRADASH // PROJECT 10-16-26</title>
    <style>
        :root {
            --seahawks-blue: #002244; --seahawks-green: #69BE28; --neon-cyan: #00f3ff;
            --bg: #050505; --panel: #121212; --text: #f0f0f0;
        }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        .grid-container { display: grid; grid-template-columns: 45% 55%; height: 100vh; }
        
        /* LEFT PANEL: GUESTBOOK & SYSTEM */
        #left-panel { background: var(--panel); border-right: 2px solid #222; display: flex; flex-direction: column; padding: 30px; box-sizing: border-box; }
        .status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .status-header h1 { font-size: 1.2rem; text-transform: uppercase; color: var(--neon-cyan); letter-spacing: 3px; margin: 0; }
        
        .input-box { width: 100%; background: #000; border: 1px solid #444; color: var(--neon-cyan); padding: 20px; font-size: 1.1rem; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .input-box:focus { border-color: var(--seahawks-green); }
        .btn-trigger { width: 100%; background: var(--text); color: #000; padding: 20px; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; transition: 0.3s; }
        .btn-trigger:hover { background: var(--seahawks-green); color: white; box-shadow: 0 0 20px var(--seahawks-green); }

        .log-screen { flex-grow: 1; background: #000; border: 1px solid #222; margin-top: 20px; padding: 15px; font-family: 'Courier New', monospace; overflow-y: auto; font-size: 0.8rem; }
        .log-entry { margin-bottom: 8px; border-bottom: 1px solid #111; padding-bottom: 5px; }
        .log-entry.score { color: #ff00ff; font-weight: bold; }

        /* RIGHT PANEL: LIVE SPORTS FLASH */
        #right-panel { position: relative; display: flex; flex-direction: column; padding: 30px; overflow-y: auto; }
        .flash-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; z-index: 100; transition: 0.1s; }
        @keyframes rainbowStrobe {
            0% { background: red; } 20% { background: yellow; } 40% { background: green; } 60% { background: blue; } 80% { background: purple; } 100% { background: transparent; }
        }
        .animate-flash { animation: rainbowStrobe 1.5s linear; opacity: 1; }

        .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .game-card { background: #1a1a1a; padding: 20px; border-left: 5px solid #333; position: relative; transition: 0.3s; }
        .game-card.highlight { border-left-color: var(--seahawks-green); background: #002244; }
        .league-tag { font-size: 0.6rem; background: #444; padding: 2px 5px; position: absolute; top: 5px; right: 5px; }
        .team-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.1rem; margin: 5px 0; }
        .score-val { color: var(--neon-cyan); font-size: 1.5rem; }

        /* SCROLLBARS */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

    <div class="grid-container">
        <div id="left-panel">
            <div class="status-header">
                <h1>System Node // Project 26</h1>
                <div id="clock" style="font-family: monospace;">00:00:00</div>
            </div>
            
            <p style="color: #777; font-size: 0.8rem;">Enter message for Google Home Broadcast:</p>
            <input type="text" id="userInput" class="input-box" placeholder="Broadcast Command...">
            <button class="btn-trigger" onclick="runBroadcast()">Execute Transmission</button>
            
            <div class="log-screen" id="sysLog">
                <div class="log-entry">> UPLINK ESTABLISHED...</div>
                <div class="log-entry">> WAITING FOR INPUT...</div>
            </div>
        </div>

        <div id="right-panel">
            <div class="flash-overlay" id="strobe"></div>
            <div class="status-header">
                <h1>Live Sports Uplink</h1>
                <div style="color: var(--seahawks-green); font-size: 0.8rem;">● LIVE POLLING</div>
            </div>
            <div class="score-grid" id="scoreDisplay">
                </div>
        </div>
    </div>

    <script>
        const SCRPYTED_WEBHOOK = "YOUR_SCRPYTED_WEBHOOK_HERE"; // PASTE YOUR URL HERE
        let previousScores = {};

        function addLog(msg, isScore = false) {
            const log = document.getElementById('sysLog');
            const entry = document.createElement('div');
            entry.className = isScore ? 'log-entry score' : 'log-entry';
            entry.innerText = `> ${new Date().toLocaleTimeString()}: ${msg}`;
            log.prepend(entry);
        }

        async function runBroadcast() {
            const val = document.getElementById('userInput').value;
            if(!val) return;
            
            addLog(`TRANSMITTING: "${val}"`);
            
            // This triggers your Scrypted Dummy Switch
            try {
                await fetch(SCRPYTED_WEBHOOK + "?state=on");
                setTimeout(() => fetch(SCRPYTED_WEBHOOK + "?state=off"), 2000);
                addLog("GOOGLE HOME TRIGGERED SUCCESSFULLY");
            } catch (e) {
                addLog("ERROR: WEBHOOK FAILED. CHECK SCRPYTED URL.");
            }
            document.getElementById('userInput').value = "";
        }

        async function fetchScores() {
            const endpoints = [
                {l: 'NBA', u: 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard'},
                {l: 'MLB', u: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard'},
                {l: 'NCAA', u: 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard'},
                {l: 'SOCCER', u: 'https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard'}
            ];

            let html = "";
            let scoreChanged = false;

            for(let e of endpoints) {
                try {
                    const res = await fetch(e.u);
                    const data = await res.json();
                    
                    data.events.forEach(game => {
                        const competition = game.competitions[0];
                        const home = competition.competitors[0];
                        const away = competition.competitors[1];
                        const id = game.id;
                        const scoreSum = parseInt(home.score) + parseInt(away.score);

                        // RAINBOW FLASH LOGIC
                        if(previousScores[id] && previousScores[id] < scoreSum) {
                            scoreChanged = true;
                            addLog(`SCORE UPDATE: ${away.team.shortDisplayName} vs ${home.team.shortDisplayName}`, true);
                        }
                        previousScores[id] = scoreSum;

                        const isSeahawks = game.name.toLowerCase().includes("seahawks");
                        html += `
                            <div class="game-card ${isSeahawks ? 'highlight' : ''}">
                                <div class="league-tag">${e.l}</div>
                                <div class="team-row"><span>${away.team.shortDisplayName}</span><span class="score-val">${away.score}</span></div>
                                <div class="team-row"><span>${home.team.shortDisplayName}</span><span class="score-val">${home.score}</span></div>
                                <div style="font-size:0.6rem; color:#666;">${game.status.type.detail}</div>
                            </div>`;
                    });
                } catch(err) { console.log("Fetch error for " + e.l); }
            }
            document.getElementById('scoreDisplay').innerHTML = html;
            if(scoreChanged) triggerRainbow();
        }

        function triggerRainbow() {
            const s = document.getElementById('strobe');
            s.classList.remove('animate-flash');
            void s.offsetWidth; 
            s.classList.add('animate-flash');
        }

        // Clock logic
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Initial fetch and loop
        fetchScores();
        setInterval(fetchScores, 20000); 

    </script>
</body>
</html>
