<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRADASH // OMNI-TRACKER</title>
    <style>
        /* --- GLOBAL VARIABLES & CSS RESET --- */
        :root {
            --bg-deep: #020203;
            --panel-bg: #09090b;
            --neon-blue: #00e5ff;
            --neon-pink: #ff0055;
            --neon-green: #00ff66;
            --neon-yellow: #ffcc00;
            --alert-red: #ff0000;
            --text-main: #d1d1d1;
            --text-dim: #444444;
            --grid-line: rgba(0, 229, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body, html {
            width: 100vw; height: 100vh; overflow: hidden;
            background-color: var(--bg-deep); color: var(--text-main);
            font-family: 'Consolas', 'Courier New', monospace;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* --- HARDWARE ACCELERATED ANIMATIONS --- */
        @keyframes targetedScorePop {
            0% { transform: scale(1); color: var(--neon-blue); text-shadow: none; }
            10% { transform: scale(1.8); color: #ffffff; text-shadow: 0 0 20px #fff, 0 0 40px var(--neon-blue), 0 0 60px var(--neon-blue); }
            50% { transform: scale(1.3); color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
            100% { transform: scale(1); color: var(--neon-blue); text-shadow: none; }
        }

        @keyframes cardPulseBorder {
            0% { border-color: #333; box-shadow: none; }
            20% { border-color: var(--neon-blue); box-shadow: 0 0 30px rgba(0, 229, 255, 0.5) inset; }
            100% { border-color: #333; box-shadow: none; }
        }

        @keyframes scanlineSweep {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }

        .score-updated {
            display: inline-block;
            animation: targetedScorePop 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            font-weight: 900;
        }

        .card-updated {
            animation: cardPulseBorder 2.5s ease-out forwards;
        }

        .scanline {
            position: absolute; top: 0; left: 0; width: 100vw; height: 10vh;
            background: linear-gradient(to bottom, transparent, rgba(0, 229, 255, 0.1), transparent);
            opacity: 0.5; pointer-events: none; z-index: 9999;
            animation: scanlineSweep 8s linear infinite;
        }

        /* --- SPLIT SCREEN ARCHITECTURE --- */
        .wrapper { display: flex; width: 100vw; height: 100vh; position: relative; z-index: 10; }
        
        .panel { background: var(--panel-bg); height: 100%; display: flex; flex-direction: column; }
        
        /* LEFT: COMMAND & CONTROL */
        .left-col { 
            width: 35%; border-right: 1px solid #222; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.9); z-index: 50;
        }
        
        .sys-header {
            padding: 25px; border-bottom: 1px solid #222;
            background: linear-gradient(180deg, #111, transparent);
        }
        .sys-header h1 { color: var(--neon-pink); font-size: 1.4rem; letter-spacing: 4px; text-transform: uppercase; }
        .clock-display { font-size: 1.2rem; color: var(--text-dim); margin-top: 10px; font-weight: bold; }

        .comm-module { padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .comm-input {
            width: 100%; background: #000; border: 1px solid #333; color: var(--neon-blue);
            padding: 18px; font-family: inherit; font-size: 1.1rem; outline: none; transition: 0.3s;
        }
        .comm-input:focus { border-color: var(--neon-pink); box-shadow: inset 0 0 10px rgba(255, 0, 85, 0.2); }
        
        .btn-override {
            background: #111; color: var(--text-main); border: 1px solid #444; padding: 18px;
            font-family: inherit; font-weight: bold; font-size: 1.2rem; cursor: pointer; text-transform: uppercase;
        }
        .btn-override:hover:not(:disabled) { background: var(--neon-pink); color: #fff; border-color: var(--neon-pink); box-shadow: 0 0 20px rgba(255,0,85,0.4); }
        .btn-override:disabled { background: #050505; color: #333; border-color: #222; cursor: not-allowed; }

        .buffer-track { width: 100%; height: 4px; background: #111; margin-top: 5px; position: relative; }
        .buffer-fill { height: 100%; width: 0%; background: var(--alert-red); transition: width 1s linear; }

        .console-output {
            flex-grow: 1; background: #020202; border-top: 1px solid #222; padding: 20px;
            overflow-y: auto; font-size: 0.85rem; display: flex; flex-direction: column; gap: 8px;
        }
        .term-line { border-left: 2px solid #333; padding-left: 12px; }
        .term-info { color: #888; }
        .term-exec { color: var(--neon-green); border-left-color: var(--neon-green); }
        .term-alert { color: var(--neon-yellow); border-left-color: var(--neon-yellow); }

        /* RIGHT: LIVE TELEMETRY */
        .right-col { width: 65%; padding: 30px; overflow-y: auto; position: relative; }
        
        .telemetry-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .telemetry-header h2 { font-size: 2.2rem; color: #fff; letter-spacing: 2px; }
        .live-indicator { display: flex; align-items: center; gap: 10px; color: var(--neon-green); font-weight: bold; }
        .pulse-dot { width: 10px; height: 10px; background: var(--neon-green); border-radius: 50%; animation: pulseOpacity 1s infinite; }
        @keyframes pulseOpacity { 0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--neon-green); } 50% { opacity: 0.2; box-shadow: none; } }

        .sports-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .game-node {
            background: #0a0a0c; border: 1px solid #333; padding: 25px;
            border-radius: 6px; position: relative; display: flex; flex-direction: column; gap: 15px;
        }
        
        .league-tag {
            position: absolute; top: -12px; left: 15px; background: #fff; color: #000;
            padding: 4px 12px; font-weight: 900; font-size: 0.8rem; border-radius: 2px;
        }

        .team-block { display: flex; justify-content: space-between; align-items: center; }
        .team-name { font-size: 1.4rem; font-weight: bold; color: #ccc; }
        .team-score { font-size: 2.2rem; font-weight: bold; color: var(--neon-blue); font-family: Impact, sans-serif; transition: color 0.3s; }
        
        .clock-block { text-align: right; border-top: 1px dashed #333; padding-top: 12px; font-size: 0.9rem; color: var(--neon-yellow); font-weight: bold; }

        .no-games { grid-column: 1 / -1; text-align: center; padding: 50px; color: var(--text-dim); font-size: 1.5rem; letter-spacing: 2px; border: 1px dashed #333; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444; }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <div class="wrapper">
        <div class="panel left-col">
            <div class="sys-header">
                <h1>Uplink Control</h1>
                <div class="clock-display" id="sysClock">00:00:00.000</div>
            </div>

            <div class="comm-module">
                <input type="text" id="commandInput" class="comm-input" placeholder="Type Google Home broadcast..." autocomplete="off">
                <button id="execBtn" class="btn-override" onclick="triggerBroadcast()">Execute Payload</button>
                
                <div class="buffer-track">
                    <div id="bufferFill" class="buffer-fill"></div>
                </div>
                <div id="bufferText" style="text-align: right; font-size: 0.75rem; color: #666; font-weight: bold; margin-top: 4px;">SYSTEM READY</div>
            </div>

            <div class="console-output" id="terminal">
                <div class="term-line term-info">>> KERNEL LOADED. INITIALIZING WEBSOCKETS.</div>
            </div>
        </div>

        <div class="panel right-col">
            <div class="telemetry-header">
                <h2>STRICT-LIVE FEED</h2>
                <div class="live-indicator"><div class="pulse-dot"></div> ACTIVE POLLING</div>
            </div>
            <div class="sports-grid" id="sportsContainer">
                </div>
        </div>
    </div>

    <script>
        /**
         * =======================================================================
         * 1. GOOGLE HOME WEBHOOK CONFIGURATION
         * =======================================================================
         */
        // ⚠️ PASTE YOUR SCRYPTED CLOUDFLARE WEBHOOK URL HERE ⚠️
        const WEBHOOK_TARGET = "YOUR_WEBHOOK_URL_HERE"; 
        
        const COOLDOWN_TIME = 60000; 
        let isLocked = false;

        function termLog(msg, type="info") {
            const term = document.getElementById('terminal');
            const line = document.createElement('div');
            line.className = `term-line term-${type}`;
            const ts = new Date().toISOString().split('T')[1].slice(0, 12);
            line.innerText = `[${ts}] ${msg}`;
            term.appendChild(line);
            term.scrollTop = term.scrollHeight;
        }

        async function triggerBroadcast() {
            if (isLocked) return;
            const input = document.getElementById('commandInput');
            const payload = input.value.trim();
            
            if (!payload) { termLog("ERR: Empty payload rejected.", "alert"); return; }
            
            termLog(`FIRING: "${payload}"`, "exec");
            
            try {
                fetch(WEBHOOK_TARGET, { method: 'GET', mode: 'no-cors' });
                termLog("WEBHOOK SIGNAL SENT.", "exec");
            } catch (e) {
                termLog("NET_ERR: Bridge unreachable.", "alert");
            }

            input.value = "";
            initiateLockout();
        }

        function initiateLockout() {
            isLocked = true;
            const btn = document.getElementById('execBtn');
            const fill = document.getElementById('bufferFill');
            const txt = document.getElementById('bufferText');
            
            btn.disabled = true;
            btn.innerText = "BUFFERING...";
            fill.style.transition = "none";
            fill.style.width = "100%";
            
            let msLeft = COOLDOWN_TIME;
            void fill.offsetWidth; 
            fill.style.transition = `width ${COOLDOWN_TIME}ms linear`;
            fill.style.width = "0%";

            const lockTimer = setInterval(() => {
                msLeft -= 100;
                txt.innerText = `COOLDOWN: ${(msLeft / 1000).toFixed(1)}s`;
                if (msLeft <= 0) {
                    clearInterval(lockTimer);
                    isLocked = false;
                    btn.disabled = false;
                    btn.innerText = "EXECUTE PAYLOAD";
                    txt.innerText = "SYSTEM READY";
                    termLog("BUFFER CLEARED. WEAPONS HOT.", "info");
                }
            }, 100);
        }

        document.getElementById('commandInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') triggerBroadcast();
        });


        /**
         * =======================================================================
         * 2. STRICT-LIVE SPORTS ENGINE
         * =======================================================================
         */
        const MEMORY_BANK = {}; 
        const API_NODES = [
            { id: "NBA", url: "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard" },
            { id: "NCAA", url: "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard" },
            { id: "MLB", url: "https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard" },
            { id: "SOCCER", url: "https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard" }
        ];

        async function pollTelemetry() {
            let activeNodes = [];

            for (const node of API_NODES) {
                try {
                    const res = await fetch(node.url);
                    const json = await res.json();
                    
                    if (json.events) {
                        json.events.forEach(game => {
                            // STRICT LIVE CHECK: Only state 'in' means the clock is actively running right now.
                            if (game.status.type.state === 'in') {
                                activeNodes.push(extractGameData(game, node.id));
                            }
                        });
                    }
                } catch (err) {
                    termLog(`POLL_FAIL: ${node.id} endpoint down.`, "alert");
                }
            }
            renderDOM(activeNodes);
        }

        function extractGameData(raw, league) {
            const c = raw.competitions[0];
            const t1 = c.competitors[0];
            const t2 = c.competitors[1];
            
            return {
                uuid: `${league}_${raw.id}`,
                league: league,
                clock: raw.status.type.detail,
                home: { id: t1.team.id, name: t1.team.shortDisplayName, score: parseInt(t1.score) || 0 },
                away: { id: t2.team.id, name: t2.team.shortDisplayName, score: parseInt(t2.score) || 0 }
            };
        }

        function renderDOM(liveGames) {
            const container = document.getElementById('sportsContainer');
            
            if (liveGames.length === 0) {
                container.innerHTML = `<div class="no-games">[ SYSTEM IDLE: NO LIVE OPERATIONS DETECTED ]</div>`;
                return;
            }

            // We update existing DOM elements to allow CSS animations to trigger properly
            // instead of wiping the innerHTML entirely every 15 seconds.
            
            const currentDOMIds = Array.from(container.children).map(el => el.id);
            const incomingIds = liveGames.map(g => g.uuid);

            // 1. Remove games that are no longer live
            currentDOMIds.forEach(id => {
                if (!incomingIds.includes(id) && id !== '') {
                    document.getElementById(id).remove();
                }
            });

            // 2. Add or Update games
            liveGames.forEach(game => {
                let card = document.getElementById(game.uuid);
                
                // If game isn't on screen yet, build the HTML structure
                if (!card) {
                    card = document.createElement('div');
                    card.className = 'game-node';
                    card.id = game.uuid;
                    card.innerHTML = `
                        <div class="league-tag">${game.league}</div>
                        <div class="team-block">
                            <span class="team-name">${game.away.name}</span>
                            <span class="team-score" id="score_${game.uuid}_away">${game.away.score}</span>
                        </div>
                        <div class="team-block">
                            <span class="team-name">${game.home.name}</span>
                            <span class="team-score" id="score_${game.uuid}_home">${game.home.score}</span>
                        </div>
                        <div class="clock-block" id="clock_${game.uuid}">${game.clock}</div>
                    `;
                    container.appendChild(card);
                    
                    // Init memory
                    MEMORY_BANK[`${game.uuid}_away`] = game.away.score;
                    MEMORY_BANK[`${game.uuid}_home`] = game.home.score;
                } else {
                    // Game exists, update clock
                    document.getElementById(`clock_${game.uuid}`).innerText = game.clock;

                    // Check Away Score
                    const awayMemKey = `${game.uuid}_away`;
                    if (game.away.score > MEMORY_BANK[awayMemKey]) {
                        termLog(`SCORE EVENT: ${game.away.name} [${game.away.score}]`, "term-alert");
                        triggerScoreAnimation(card, `score_${game.uuid}_away`, game.away.score);
                        MEMORY_BANK[awayMemKey] = game.away.score;
                    }

                    // Check Home Score
                    const homeMemKey = `${game.uuid}_home`;
                    if (game.home.score > MEMORY_BANK[homeMemKey]) {
                        termLog(`SCORE EVENT: ${game.home.name} [${game.home.score}]`, "term-alert");
                        triggerScoreAnimation(card, `score_${game.uuid}_home`, game.home.score);
                        MEMORY_BANK[homeMemKey] = game.home.score;
                    }
                }
            });
        }

        // --- THE TARGETED DOM ANIMATION ENGINE ---
        function triggerScoreAnimation(cardElement, scoreElementId, newScore) {
            const scoreEl = document.getElementById(scoreElementId);
            
            // Update the actual text
            scoreEl.innerText = newScore;
            
            // Remove classes if they exist to reset animation state
            scoreEl.classList.remove('score-updated');
            cardElement.classList.remove('card-updated');
            
            // Force browser reflow (the secret to restarting CSS animations)
            void scoreEl.offsetWidth; 
            void cardElement.offsetWidth;
            
            // Apply animation classes
            scoreEl.classList.add('score-updated');
            cardElement.classList.add('card-updated');
            
            // Clean up classes after animation finishes (2.5s)
            setTimeout(() => {
                if (scoreEl) scoreEl.classList.remove('score-updated');
                if (cardElement) cardElement.classList.remove('card-updated');
            }, 2500);
        }

        // =======================================================================
        // 3. SYSTEM LOOP INITIALIZATION
        // =======================================================================
        setInterval(() => {
            const d = new Date();
            document.getElementById('sysClock').innerText = 
                d.toLocaleTimeString('en-US', { hour12: false }) + "." + String(d.getMilliseconds()).padStart(3, '0');
        }, 47); // Weird interval makes it look cooler/faster

        setTimeout(() => { termLog("ESTABLISHING ESPN API LINK...", "info"); }, 800);
        setTimeout(pollTelemetry, 1500);
        
        // Rapid 10-second polling for live score accuracy
        setInterval(pollTelemetry, 10000);

    </script>
</body>
</html>
