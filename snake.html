<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRADASH // THE MONOLITH</title>
    <style>
        :root {
            /* Liquid Glass Physics */
            --glass-bg: rgba(10, 15, 25, 0.6);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shine: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(50px) saturate(220%);
            
            /* Neon Spectrum */
            --cyan: #00f3ff;
            --gold: #ffcf40;
            --green: #00ff88;
            --magenta: #ff007f;
            --red: #ff3333;
            --text-main: #ffffff;
            --font-mono: 'JetBrains Mono', monospace;
            
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'SF Pro Display', sans-serif; user-select: none; }
        body { background: #010103; color: var(--text-main); overflow: hidden; height: 100vh; position: relative; }

        /* --- AMBIENT PHYSICS --- */
        #particleCanvas, #goldRainCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(140px); opacity: 0.35; z-index: 0; animation: fluid 25s infinite alternate ease-in-out; }
        .orb-1 { width: 800px; height: 800px; background: #001f4d; top: -10%; left: -10%; }
        .orb-2 { width: 600px; height: 600px; background: #3d004d; bottom: -10%; right: -10%; }
        @keyframes fluid { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(120px, 80px) scale(1.1); } }

        /* --- GLOBAL HEADER --- */
        .nexus-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 85px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; z-index: 1000; background: rgba(0,0,0,0.4);
            backdrop-filter: blur(30px); border-bottom: 1px solid var(--glass-border);
        }
        .vault-stats { display: flex; align-items: center; gap: 15px; background: rgba(255,207,64,0.1); padding: 8px 25px; border-radius: 30px; border: 1px solid var(--gold); box-shadow: 0 0 20px rgba(255,207,64,0.1); }
        .coin-icon { font-size: 1.5rem; animation: rotateCoin 3s infinite linear; }
        @keyframes rotateCoin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        /* --- MASTER LAYOUT --- */
        .monolith-grid {
            display: grid; grid-template-columns: 420px 1fr; gap: 25px;
            padding: 110px 25px 25px 25px; height: 100vh; position: relative; z-index: 10;
        }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); border-top: 1px solid var(--glass-shine);
            border-radius: 40px; box-shadow: 0 50px 100px rgba(0,0,0,0.7);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .panel-head { padding: 30px; border-bottom: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); }
        .panel-body { padding: 30px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 30px; }

        /* --- COMMAND CENTER --- */
        .input-glass {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
            color: #fff; padding: 22px; border-radius: 20px; outline: none; font-size: 1.1rem;
        }
        .btn-apex {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            border: 1px solid var(--glass-border); color: #fff; padding: 22px;
            border-radius: 20px; font-weight: 900; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.3s;
        }
        .btn-apex:hover { background: var(--cyan); color: #000; box-shadow: 0 0 40px var(--cyan); transform: translateY(-3px); }

        .soundboard { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .sb-btn { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: #888; padding: 18px; border-radius: 15px; font-size: 0.75rem; font-weight: 800; cursor: pointer; text-align: center; }
        .sb-btn:hover { background: rgba(0,243,255,0.1); color: var(--cyan); }

        /* --- PRO-SPORTS TELEMETRY --- */
        .matrix-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 25px; }
        
        .game-card {
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 34px;
            padding: 30px; transition: 0.4s; cursor: pointer; position: relative; overflow: hidden;
        }
        .game-card:hover { transform: translateY(-10px); border-color: var(--cyan); background: rgba(255,255,255,0.05); }

        /* Accurate Possession Glow */
        .possession-glow { box-shadow: 0 0 30px var(--cyan); border: 2.5px solid var(--cyan) !important; }

        /* Game Break Overlays */
        .break-alert {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 127, 0.15); display: none; align-items: center; justify-content: center;
            z-index: 10; pointer-events: none;
        }
        .break-alert.active { display: flex; animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.9; } }
        .alert-tag { background: var(--magenta); color: #fff; padding: 6px 16px; border-radius: 10px; font-weight: 900; letter-spacing: 2px; }

        .l-badge { position: absolute; top: -12px; left: 30px; background: #fff; color: #000; padding: 5px 14px; border-radius: 10px; font-size: 0.75rem; font-weight: 900; }
        
        .team-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .team-meta { display: flex; align-items: center; gap: 15px; }
        .logo-frame { width: 55px; height: 55px; background: #fff; border-radius: 50%; padding: 7px; border: 1px solid transparent; transition: 0.3s; }
        .logo-img { width: 100%; height: 100%; object-fit: contain; }
        .score-num { font-size: 2.8rem; font-weight: 900; font-family: var(--font-mono); }

        .bet-row {
            margin-top: 20px; padding-top: 20px; border-top: 1px dashed var(--glass-border);
            display: flex; gap: 10px;
        }
        .bet-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.4); color: #fff; font-size: 0.75rem; font-weight: 900; cursor: pointer; }
        .bet-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        .card-footer {
            margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .live-clock { font-family: var(--font-mono); font-size: 1.2rem; font-weight: 900; color: var(--cyan); }
        .play-by-play { font-size: 0.7rem; color: #666; font-style: italic; max-width: 60%; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        /* --- TERMINAL --- */
        #termLog { background: rgba(0,0,0,0.5); border-radius: 25px; padding: 25px; font-family: var(--font-mono); font-size: 0.8rem; height: 200px; overflow-y: auto; color: #444; border: 1px solid var(--glass-border); }
        .t-cyan { color: var(--cyan); } .t-gold { color: var(--gold); }
    </style>
</head>
<body>

    <div class="ambient-layer"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
    <canvas id="particleCanvas"></canvas>
    <canvas id="goldRainCanvas"></canvas>

    <header class="nexus-header">
        <div style="font-size: 1.8rem; font-weight: 900; letter-spacing: -1.5px;">NEXUS <span style="color:var(--cyan);">APEX v27</span></div>
        <div class="vault-stats">
            <span class="coin-icon">🪙</span>
            <span id="goldCounter" style="font-family:var(--font-mono); font-weight:900; color:var(--gold); font-size: 1.3rem;">0</span>
        </div>
    </header>

    <div class="monolith-grid">
        
        <div class="glass-panel">
            <div class="panel-head">
                <div style="font-size: 1.5rem; font-weight: 900;">Nexus Terminal</div>
                <div id="sysTime" style="color:var(--cyan); font-size: 0.9rem; font-weight: 800; margin-top: 5px;">00:00:00.000</div>
            </div>
            <div class="panel-body">
                <input type="text" id="cmdInput" class="input-glass" placeholder="Initiate transmission...">
                <button class="btn-apex" onclick="dispatchUplink()">Transmit to House</button>

                <div class="soundboard">
                    <button class="sb-btn" onclick="macro('Attention, dinner is ready downstairs.')">🍕 Dinner</button>
                    <button class="sb-btn" onclick="macro('Bedtime protocol starting now.')">🌙 Bedtime</button>
                    <button class="sb-btn" onclick="macro('Study session in progress. Do not disturb.')">📚 Study</button>
                    <button class="sb-btn" onclick="macro('Wake up! Time for Berkeley City College.')">☀️ Wake Up</button>
                    <button class="sb-btn" onclick="macro('Security Alert: Check the front door.')">🚨 Alert</button>
                    <button class="sb-btn" onclick="macro('Go Seahawks! Massive touchdown!')">🏈 Seahawks</button>
                </div>

                <div id="termLog">
                    <div>> OMEGA CORE v27.0 INITIALIZED.</div>
                    <div class="t-cyan">> GOOGLE ROUTINE SYNC: ACTIVE.</div>
                </div>
            </div>
        </div>

        <div class="glass-panel">
            <div class="panel-head" style="display:flex; justify-content:space-between; align-items:center;">
                <div style="font-size: 1.5rem; font-weight: 900;">OMNI-Telemetry</div>
                <div style="font-size: 0.8rem; color:var(--green); font-weight:900; letter-spacing: 1px;">● LIVE STREAM ACTIVE</div>
            </div>
            <div class="panel-body">
                <div class="matrix-grid" id="matrix">
                    <div style="grid-column: 1/-1; text-align: center; padding: 100px; color: #444;">SYNCING WITH ESPN SATELLITE...</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 🔴 PASTE WEBHOOK URL 🔴
        const TARGET = "https://pets-hdtv-enormous-objects.trycloudflare.com/endpoint/@scrypted/webhook/public/33/fe2475e0d68cf025/turnOn";
        
        let goldVault = parseInt(localStorage.getItem('apexGold')) || 0;
        let localClocks = {}; // Predictive countdowns
        let predictions = {}; 
        let scoreMem = {};

        document.getElementById('goldCounter').innerText = goldVault;

        function addLog(m, c="") {
            const l = document.getElementById('termLog');
            l.innerHTML += `<div class="${c}">> ${new Date().toLocaleTimeString()}: ${m}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        async function dispatchUplink() {
            const val = document.getElementById('cmdInput').value;
            if(!val) return;
            addLog(`Uplink: ${val}`, "t-cyan");
            try {
                await fetch(TARGET, { method: 'GET', mode: 'no-cors' });
                setTimeout(() => fetch(TARGET, { method: 'GET', mode: 'no-cors' }), 450);
                addLog(`Success: Broadcast Fired.`);
            } catch(e) { addLog(`Error: Connection Failed.`); }
            document.getElementById('cmdInput').value = "";
        }
        function macro(m) { document.getElementById('cmdInput').value = m; dispatchUplink(); }

        const APIS = [
            { id: "NBA", url: "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard" },
            { id: "NCAA", url: "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard" },
            { id: "MLB", url: "https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard" },
            { id: "NHL", url: "https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/scoreboard" }
        ];

        async function pollTelemetry() {
            let active = [];
            for (let api of APIS) {
                try {
                    let res = await fetch(api.url); let json = await res.json();
                    json.events.forEach(g => {
                        if(g.status.type.state === 'in') {
                            let c = g.competitions[0];
                            let game = {
                                id: g.id, l: api.id,
                                status: g.status.type.detail,
                                rawClock: g.status.displayClock, 
                                situation: c.situation || null,
                                h: { id: c.competitors[0].id, n: c.competitors[0].team.shortDisplayName, s: parseInt(c.competitors[0].score), i: c.competitors[0].team.logo },
                                a: { id: c.competitors[1].id, n: c.competitors[1].team.shortDisplayName, s: parseInt(c.competitors[1].score), i: c.competitors[1].team.logo }
                            };
                            active.push(game);
                            syncClock(game.id, game.rawClock);
                        }
                    });
                } catch(e){}
            }
            renderMatrix(active);
        }

        function renderMatrix(games) {
            const m = document.getElementById('matrix');
            if(games.length === 0) { m.innerHTML = "<div style='grid-column:1/-1; text-align:center; padding:50px; color:#444;'>AWAITING LIVE GAMES...</div>"; return; }
            
            m.innerHTML = games.map(g => {
                const pred = predictions[g.id] || null;
                const isBreak = g.status.toLowerCase().includes("timeout") || g.status.toLowerCase().includes("halftime") || g.status.toLowerCase().includes("end");
                const hasBall = g.situation && g.situation.possession;

                return `
                <div class="game-card">
                    <div class="break-alert ${isBreak ? 'active' : ''}"><div class="alert-tag">${g.status.toUpperCase()}</div></div>
                    <div class="l-badge">${g.l}</div>
                    
                    <div class="team-line">
                        <div class="team-meta">
                            <div class="logo-frame ${hasBall == g.a.id ? 'possession-glow' : ''}"><img src="${g.a.i}" class="logo-img"></div>
                            <strong>${g.a.n}</strong>
                        </div>
                        <div class="score-num" id="s_${g.id}_a">${g.a.s}</div>
                    </div>
                    
                    <div class="team-line">
                        <div class="team-meta">
                            <div class="logo-frame ${hasBall == g.h.id ? 'possession-glow' : ''}"><img src="${g.h.i}" class="logo-img"></div>
                            <strong>${g.h.n}</strong>
                        </div>
                        <div class="score-num" id="s_${g.id}_h">${g.h.s}</div>
                    </div>

                    <div class="bet-row">
                        <button class="bet-btn ${pred === 'a' ? 'active' : ''}" onclick="predict('${g.id}', 'a')">${g.a.n}</button>
                        <button class="bet-btn ${pred === 'h' ? 'active' : ''}" onclick="predict('${g.id}', 'h')">${g.h.n}</button>
                    </div>

                    <div class="card-footer">
                        <div class="live-clock" id="clock_${g.id}">${g.rawClock}</div>
                        <div class="play-by-play">${g.situation && g.situation.lastPlay ? g.situation.lastPlay.text : ''}</div>
                    </div>
                </div>
            `}).join('');

            // CHECK WINNERS
            games.forEach(g => {
                if(scoreMem[`${g.id}_a`] !== undefined && g.a.s > scoreMem[`${g.id}_a`]) handleScore(g.id, 'a');
                if(scoreMem[`${g.id}_h`] !== undefined && g.h.s > scoreMem[`${g.id}_h`]) handleScore(g.id, 'h');
                scoreMem[`${g.id}_a`] = g.a.s; scoreMem[`${g.id}_h`] = g.h.s;
            });
        }

        // --- PREDICTIVE CLOCK LOGIC ---
        function syncClock(id, raw) {
            if(!raw || !raw.includes(":")) return;
            const pts = raw.split(":");
            let totalSecs = (parseInt(pts[0]) * 60) + parseInt(pts[1]);
            if(!localClocks[id] || Math.abs(localClocks[id] - totalSecs) > 5) localClocks[id] = totalSecs;
        }

        setInterval(() => {
            for(let id in localClocks) {
                if(localClocks[id] > 0) {
                    localClocks[id]--;
                    const m = Math.floor(localClocks[id] / 60);
                    const s = String(localClocks[id] % 60).padStart(2, '0');
                    const el = document.getElementById(`clock_${id}`);
                    if(el && !el.innerText.includes("Time") && !el.innerText.includes("Half")) el.innerText = `${m}:${s}`;
                }
            }
        }, 1000);

        // --- BETTING ENGINE ---
        function predict(gid, side) { predictions[gid] = side; pollTelemetry(); }
        function handleScore(gid, side) {
            if(predictions[gid] === side) {
                goldVault++; localStorage.setItem('apexGold', goldVault);
                document.getElementById('goldCounter').innerText = goldVault;
                addLog(`JACKPOT! Prediction correct. +1 Coin.`, "t-gold");
                rainGold();
            }
            predictions[gid] = null;
        }

        // --- REWARD ANIMATION ---
        const rC = document.getElementById('goldRainCanvas');
        const rX = rC.getContext('2d');
        let goldArr = [];
        function rainGold() {
            rC.width = window.innerWidth; rC.height = window.innerHeight;
            for(let i=0; i<60; i++) goldArr.push({ x: Math.random()*rC.width, y: -50, vy: Math.random()*5+5, r: Math.random()*Math.PI*2, vr: Math.random()*0.2 });
            animG();
        }
        function animG() {
            rX.clearRect(0,0,rC.width,rC.height); rX.fillStyle = "#ffcf40";
            goldArr.forEach((c, i) => {
                c.y += c.vy; c.r += c.vr;
                rX.save(); rX.translate(c.x, c.y); rX.rotate(c.r);
                rX.beginPath(); rX.arc(0,0,10,0,Math.PI*2); rX.fill(); rX.restore();
                if(c.y > rC.height) goldArr.splice(i, 1);
            });
            if(goldArr.length > 0) requestAnimationFrame(animG);
        }

        // --- AMBIENT PARTICLES ---
        const pC = document.getElementById('particleCanvas');
        const pX = pC.getContext('2d');
        let pts = [];
        function initP() {
            pC.width = window.innerWidth; pC.height = window.innerHeight;
            for(let i=0; i<90; i++) pts.push({ x: Math.random()*pC.width, y: Math.random()*pC.height, s: Math.random()*2, vx: Math.random()*0.4-0.2, vy: Math.random()*0.4-0.2 });
        }
        function drawP() {
            pX.clearRect(0,0,pC.width,pC.height); pX.fillStyle = "rgba(0, 243, 255, 0.35)";
            pts.forEach(p => { p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>pC.width) p.vx*=-1; if(p.y<0||p.y>pC.height) p.vy*=-1; pX.beginPath(); pX.arc(p.x, p.y, p.s, 0, Math.PI*2); pX.fill(); });
            requestAnimationFrame(drawP);
        }
        initP(); drawP();

        setInterval(() => {
            const d = new Date(); document.getElementById('sysTime').innerText = d.toLocaleTimeString('en-US', {hour12:false}) + "." + d.getMilliseconds();
        }, 50);

        pollTelemetry(); setInterval(pollTelemetry, 15000);
    </script>
</body>
</html>
