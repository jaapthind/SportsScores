<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS SPORTS // VIBRANT EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   THEME VARIABLES - NCAA VIBRANT BLUE & WHITE
   ========================================================================== */
:root {
  --ncaa-blue: #003087;
  --ncaa-blue-light: #005eb8;
  --ncaa-blue-bright: #0085ca;
  --ncaa-orange: #f26522;
  --ncaa-orange-glow: rgba(242, 101, 34, 0.6);
  --bg-deep: #011228;
  --bg-surface: #022047;
  --text-main: #ffffff;
  --text-muted: #a0c0e8;
  --text-dark: #001a3b;
  --border-light: rgba(255, 255, 255, 0.15);
  --border-bright: rgba(255, 255, 255, 0.4);
  --success: #00e676;
  --danger: #ff1744;
  --glass-bg: rgba(2, 32, 71, 0.85);
  --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  --tr-fast: all 0.2s ease;
  --tr-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

/* ==========================================================================
   RESET & BASE
   ========================================================================== */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; user-select:none; }
body, html { width:100vw; height:100vh; overflow:hidden; background:var(--bg-deep); color:var(--text-main); position:relative; }

/* Dynamic Background Pattern */
.bg-pattern { position:absolute; inset:0; z-index:0; opacity:0.08; background-image: radial-gradient(var(--text-main) 1px, transparent 1px); background-size: 24px 24px; pointer-events:none; }
.bg-glow-1 { position:absolute; width:800px; height:800px; background:radial-gradient(circle, var(--ncaa-blue-light) 0%, transparent 70%); top:-200px; left:-200px; opacity:0.4; z-index:0; pointer-events:none; }
.bg-glow-2 { position:absolute; width:600px; height:600px; background:radial-gradient(circle, var(--ncaa-orange) 0%, transparent 70%); bottom:-200px; right:-100px; opacity:0.15; z-index:0; pointer-events:none; }

/* ==========================================================================
   LAYOUT STRUCTURE
   ========================================================================== */
.app-wrapper { position:relative; z-index:10; display:flex; flex-direction:column; height:100vh; }

/* ==========================================================================
   HEADER / TOP NAVIGATION
   ========================================================================== */
.top-bar { display:flex; justify-content:space-between; align-items:stretch; background:var(--ncaa-blue); border-bottom:2px solid var(--ncaa-orange); height:70px; flex-shrink:0; box-shadow:0 4px 20px rgba(0,0,0,0.5); }
.brand-zone { display:flex; align-items:center; padding:0 30px; background:linear-gradient(90deg, var(--ncaa-blue-light), var(--ncaa-blue)); position:relative; overflow:hidden; }
.brand-zone::after { content:''; position:absolute; right:-20px; top:0; bottom:0; width:40px; background:var(--ncaa-orange); transform:skewX(-20deg); }
.brand-text { font-family:'Bebas Neue', sans-serif; font-size:2.8rem; letter-spacing:4px; color:var(--text-main); text-shadow:2px 2px 0px var(--text-dark); z-index:2; margin-right:20px; }

.filters-zone { display:flex; align-items:center; padding:0 20px; gap:10px; flex:1; }
.filter-btn { background:transparent; border:2px solid var(--border-light); color:var(--text-muted); font-family:'Bebas Neue', sans-serif; font-size:1.4rem; padding:6px 24px; border-radius:30px; cursor:pointer; transition:var(--tr-fast); letter-spacing:2px; }
.filter-btn:hover { border-color:var(--text-main); color:var(--text-main); }
.filter-btn.active { background:var(--text-main); color:var(--ncaa-blue); border-color:var(--text-main); box-shadow:0 0 15px rgba(255,255,255,0.4); }

.metrics-zone { display:flex; align-items:center; padding:0 30px; gap:30px; background:rgba(0,0,0,0.2); border-left:1px solid var(--border-light); }
.metric-group { display:flex; flex-direction:column; align-items:flex-end; }
.metric-label { font-family:'Space Mono', monospace; font-size:0.65rem; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:2px; }
.metric-val { font-family:'Bebas Neue', sans-serif; font-size:1.8rem; line-height:1; color:var(--text-main); }
.metric-val.highlight { color:var(--ncaa-orange); text-shadow:0 0 10px var(--ncaa-orange-glow); }
.live-indicator { display:flex; align-items:center; gap:8px; background:rgba(242, 101, 34, 0.15); border:1px solid var(--ncaa-orange); padding:6px 16px; border-radius:20px; }
.live-dot { width:10px; height:10px; background:var(--ncaa-orange); border-radius:50%; animation:pulseLive 1.2s infinite alternate; }
@keyframes pulseLive { from { opacity:0.5; box-shadow:0 0 0 transparent; } to { opacity:1; box-shadow:0 0 12px var(--ncaa-orange); } }
.live-text { font-family:'Space Mono', monospace; font-size:0.8rem; font-weight:700; color:var(--ncaa-orange); letter-spacing:1px; }

/* ==========================================================================
   MAIN GRID AREA
   ========================================================================== */
.main-content { flex:1; overflow-y:auto; padding:30px; display:flex; flex-direction:column; }
.main-content::-webkit-scrollbar { width:8px; }
.main-content::-webkit-scrollbar-track { background:rgba(0,0,0,0.2); }
.main-content::-webkit-scrollbar-thumb { background:var(--ncaa-blue-bright); border-radius:4px; }

.games-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(420px, 1fr)); gap:24px; width:100%; }
.empty-state { grid-column:1/-1; display:flex; flex-direction:column; align-items:center; justify-content:center; height:400px; gap:20px; }
.empty-icon { font-size:4rem; opacity:0.5; animation:float 3s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform:translateY(0); } 50% { transform:translateY(-15px); } }
.empty-text { font-family:'Bebas Neue', sans-serif; font-size:2rem; color:var(--text-muted); letter-spacing:4px; }

/* ==========================================================================
   DETAILED GAME CARDS
   ========================================================================== */
.game-card { background:linear-gradient(145deg, var(--bg-surface), #011836); border:1px solid var(--border-light); border-radius:16px; overflow:hidden; display:flex; flex-direction:column; transition:var(--tr-smooth); cursor:pointer; box-shadow:0 10px 20px rgba(0,0,0,0.3); position:relative; }
.game-card:hover { transform:translateY(-6px) scale(1.01); border-color:var(--border-bright); box-shadow:0 15px 35px rgba(0,0,0,0.5), 0 0 20px rgba(0, 94, 184, 0.4); }
.game-card::before { content:''; position:absolute; top:0; left:0; width:100%; height:4px; background:linear-gradient(90deg, var(--ncaa-blue-bright), var(--ncaa-orange)); opacity:0; transition:var(--tr-fast); }
.game-card:hover::before { opacity:1; }

/* Card Header */
.card-header { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:rgba(0,0,0,0.2); border-bottom:1px solid var(--border-light); }
.card-meta-left { display:flex; align-items:center; gap:12px; }
.card-league { font-family:'Bebas Neue', sans-serif; font-size:1.2rem; letter-spacing:2px; padding:2px 10px; border-radius:4px; background:var(--ncaa-blue-light); color:#fff; line-height:1.2; }
.card-network { font-family:'Space Mono', monospace; font-size:0.65rem; color:var(--text-muted); font-weight:700; background:rgba(255,255,255,0.1); padding:4px 8px; border-radius:4px; }
.card-clock { font-family:'Space Mono', monospace; font-size:0.8rem; font-weight:700; color:var(--ncaa-orange); display:flex; align-items:center; gap:6px; background:rgba(242, 101, 34, 0.1); padding:4px 10px; border-radius:6px; border:1px solid rgba(242, 101, 34, 0.3); }

/* Card Body (Teams & Scores) */
.card-body { padding:16px; display:flex; flex-direction:column; gap:16px; }
.team-row { display:flex; align-items:center; justify-content:space-between; }
.team-id { display:flex; align-items:center; gap:14px; flex:1; }
.team-logo-box { width:56px; height:56px; background:#fff; border-radius:50%; display:flex; justify-content:center; align-items:center; padding:6px; box-shadow:0 4px 10px rgba(0,0,0,0.4); border:2px solid var(--border-light); }
.team-logo-box img { width:100%; height:100%; object-fit:contain; }
.team-info { display:flex; flex-direction:column; justify-content:center; }
.team-name { font-family:'Bebas Neue', sans-serif; font-size:2rem; line-height:0.9; color:var(--text-main); letter-spacing:1px; }
.team-record { font-family:'Space Mono', monospace; font-size:0.7rem; color:var(--text-muted); margin-top:4px; }

/* Period Scores inline in card */
.linescore-mini { display:flex; gap:8px; margin-right:16px; }
.ls-box { width:24px; text-align:center; font-family:'Space Mono', monospace; font-size:0.8rem; color:var(--text-muted); background:rgba(0,0,0,0.3); padding:4px 0; border-radius:4px; }

/* Total Score */
.total-score { font-family:'Bebas Neue', sans-serif; font-size:3.5rem; line-height:0.8; width:70px; text-align:right; color:rgba(255,255,255,0.7); transition:var(--tr-smooth); }
.total-score.leading { color:var(--text-main); }
.total-score.flash { color:var(--ncaa-orange); text-shadow:0 0 20px var(--ncaa-orange-glow); transform:scale(1.15); }

/* Card Footer (Top Performer / Last Play) */
.card-footer { padding:12px 16px; background:rgba(0,0,0,0.3); border-top:1px solid var(--border-light); display:flex; align-items:center; gap:12px; }
.cf-label { font-family:'Space Mono', monospace; font-size:0.6rem; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; background:var(--ncaa-blue); padding:2px 6px; border-radius:4px; }
.cf-text { font-family:'Inter', sans-serif; font-size:0.8rem; color:var(--text-main); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }

/* ==========================================================================
   TICKER (BOTTOM)
   ========================================================================== */
.ticker-wrap { height:40px; background:var(--ncaa-blue-light); border-top:2px solid var(--ncaa-blue-bright); display:flex; align-items:center; overflow:hidden; position:relative; z-index:20; flex-shrink:0;}
.ticker-badge { background:var(--ncaa-orange); color:#fff; font-family:'Bebas Neue', sans-serif; font-size:1.2rem; letter-spacing:2px; padding:0 20px; height:100%; display:flex; align-items:center; position:absolute; left:0; z-index:2; box-shadow:5px 0 15px rgba(0,0,0,0.3); }
.ticker-viewport { flex:1; overflow:hidden; margin-left:110px; position:relative; height:100%; }
.ticker-scroll { display:flex; align-items:center; height:100%; white-space:nowrap; position:absolute; animation:ticker 30s linear infinite; }
.ticker-scroll:hover { animation-play-state:paused; }
@keyframes ticker { 0% { transform:translateX(0); } 100% { transform:translateX(-50%); } }
.ticker-item { display:inline-flex; align-items:center; gap:10px; padding:0 30px; font-family:'Inter', sans-serif; font-size:0.85rem; font-weight:600; color:#fff; border-right:1px solid rgba(255,255,255,0.2); }
.ti-team { font-family:'Bebas Neue', sans-serif; font-size:1.2rem; letter-spacing:1px; }
.ti-score { color:var(--ncaa-orange); font-size:1.1rem; }
.ti-time { font-family:'Space Mono', monospace; font-size:0.75rem; color:rgba(255,255,255,0.6); }

/* ==========================================================================
   DETAILED MODAL
   ========================================================================== */
.modal-overlay { position:fixed; inset:0; background:rgba(0, 15, 35, 0.9); backdrop-filter:blur(15px); z-index:9999; display:flex; justify-content:center; align-items:center; opacity:0; pointer-events:none; transition:var(--tr-smooth); }
.modal-overlay.active { opacity:1; pointer-events:all; }
.modal-window { background:var(--bg-deep); border:1px solid var(--border-bright); border-radius:24px; width:95vw; max-width:1100px; height:90vh; display:flex; flex-direction:column; box-shadow:0 25px 80px rgba(0,0,0,0.8), 0 0 40px rgba(0, 94, 184, 0.3); transform:translateY(40px) scale(0.95); transition:var(--tr-smooth); overflow:hidden; }
.modal-overlay.active .modal-window { transform:translateY(0) scale(1); }

/* Modal Header */
.mh-top { display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:var(--bg-surface); border-bottom:1px solid var(--border-light); }
.mh-venue { font-family:'Space Mono', monospace; font-size:0.8rem; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; }
.mh-close { background:rgba(255,255,255,0.1); border:none; color:#fff; width:40px; height:40px; border-radius:50%; font-size:1.5rem; cursor:pointer; transition:var(--tr-fast); display:flex; justify-content:center; align-items:center; }
.mh-close:hover { background:var(--ncaa-orange); transform:rotate(90deg); }

/* Modal Matchup Banner */
.mh-matchup { display:flex; justify-content:space-between; align-items:center; padding:40px 60px; background:linear-gradient(180deg, rgba(0, 94, 184, 0.15) 0%, transparent 100%); position:relative; }
.m-team { display:flex; flex-direction:column; align-items:center; gap:16px; width:30%; z-index:2; }
.m-logo { width:140px; height:140px; background:#fff; border-radius:50%; display:flex; justify-content:center; align-items:center; padding:15px; box-shadow:0 15px 35px rgba(0,0,0,0.5); border:4px solid var(--ncaa-blue-bright); }
.m-logo img { width:100%; height:100%; object-fit:contain; }
.m-name { font-family:'Bebas Neue', sans-serif; font-size:3.5rem; letter-spacing:2px; color:var(--text-main); line-height:1; text-align:center; text-shadow:0 4px 15px rgba(0,0,0,0.6); }

.m-center { display:flex; flex-direction:column; align-items:center; gap:15px; z-index:2; }
.m-clock-lrg { font-family:'Space Mono', monospace; font-size:1.2rem; font-weight:700; color:var(--ncaa-orange); background:rgba(242, 101, 34, 0.15); padding:8px 24px; border-radius:30px; border:1px solid var(--ncaa-orange); letter-spacing:2px; }
.m-score-wrap { display:flex; align-items:center; gap:30px; }
.m-score-big { font-family:'Bebas Neue', sans-serif; font-size:8rem; line-height:0.8; color:var(--text-main); text-shadow:0 10px 30px rgba(0,0,0,0.5); }
.m-score-divider { font-family:'Inter', sans-serif; font-size:4rem; color:var(--border-light); font-weight:200; }

/* Modal Navigation */
.modal-nav { display:flex; background:rgba(0,0,0,0.4); border-bottom:1px solid var(--border-light); }
.m-nav-btn { flex:1; text-align:center; padding:20px 0; font-family:'Bebas Neue', sans-serif; font-size:1.5rem; letter-spacing:3px; color:var(--text-muted); cursor:pointer; transition:var(--tr-fast); border-bottom:4px solid transparent; background:transparent; }
.m-nav-btn:hover { background:rgba(255,255,255,0.05); color:var(--text-main); }
.m-nav-btn.active { color:var(--ncaa-blue-bright); border-bottom-color:var(--ncaa-blue-bright); background:rgba(0, 133, 202, 0.1); }

/* Modal Body Content */
.modal-body { flex:1; overflow-y:auto; position:relative; background:var(--bg-deep); }
.modal-body::-webkit-scrollbar { width:10px; }
.modal-body::-webkit-scrollbar-track { background:rgba(0,0,0,0.3); }
.modal-body::-webkit-scrollbar-thumb { background:var(--ncaa-blue-light); border-radius:5px; }
.tab-pane { display:none; padding:30px 40px; animation:fadeIn 0.4s ease; }
.tab-pane.active { display:block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* Box Score Tables */
.table-section { margin-bottom:40px; background:rgba(2, 32, 71, 0.4); border-radius:12px; border:1px solid var(--border-light); overflow:hidden; }
.table-header-row { background:var(--ncaa-blue); padding:12px 20px; display:flex; align-items:center; gap:15px; }
.th-logo { width:30px; height:30px; background:#fff; border-radius:50%; padding:3px; }
.th-name { font-family:'Bebas Neue', sans-serif; font-size:1.5rem; letter-spacing:2px; color:#fff; }

.data-table { width:100%; border-collapse:collapse; }
.data-table th { font-family:'Space Mono', monospace; font-size:0.7rem; color:var(--text-muted); text-align:right; padding:12px 15px; background:rgba(0,0,0,0.4); border-bottom:2px solid var(--border-light); text-transform:uppercase; }
.data-table th:first-child { text-align:left; }
.data-table td { font-family:'Space Mono', monospace; font-size:0.85rem; text-align:right; padding:12px 15px; border-bottom:1px solid rgba(255,255,255,0.05); color:var(--text-main); }
.data-table td:first-child { text-align:left; font-family:'Inter', sans-serif; font-weight:600; display:flex; align-items:center; gap:12px; }
.data-table tr:hover td { background:rgba(255,255,255,0.05); }
.player-avatar { width:36px; height:36px; border-radius:50%; background:var(--bg-surface); border:1px solid var(--border-light); object-fit:cover; }
.totals-row td { font-weight:800; background:rgba(0, 94, 184, 0.2) !important; color:var(--ncaa-orange); }

/* Team Comparison Graph */
.comparison-wrap { display:flex; flex-direction:column; gap:25px; padding:20px; }
.comp-row { display:flex; align-items:center; justify-content:space-between; gap:20px; }
.comp-val { font-family:'Bebas Neue', sans-serif; font-size:2rem; width:60px; text-align:center; }
.comp-val.away { color:var(--ncaa-blue-bright); }
.comp-val.home { color:var(--ncaa-orange); }
.comp-center { flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; }
.comp-label { font-family:'Space Mono', monospace; font-size:0.8rem; color:var(--text-main); letter-spacing:2px; text-transform:uppercase; }
.comp-bar-bg { width:100%; height:8px; background:rgba(0,0,0,0.5); border-radius:4px; display:flex; overflow:hidden; }
.comp-bar-fill-away { background:var(--ncaa-blue-bright); transition:width 1s cubic-bezier(0.16, 1, 0.3, 1); }
.comp-bar-fill-home { background:var(--ncaa-orange); transition:width 1s cubic-bezier(0.16, 1, 0.3, 1); }

/* Play by Play Feed */
.pbp-container { display:flex; flex-direction:column; gap:10px; }
.pbp-item { display:flex; align-items:center; padding:15px 20px; background:rgba(255,255,255,0.03); border:1px solid var(--border-light); border-radius:8px; gap:20px; transition:var(--tr-fast); }
.pbp-item:hover { background:rgba(255,255,255,0.08); transform:translateX(5px); border-color:var(--ncaa-blue-bright); }
.pbp-clock { font-family:'Space Mono', monospace; font-size:0.9rem; color:var(--text-muted); width:80px; font-weight:700; }
.pbp-icon { width:32px; height:32px; border-radius:50%; display:flex; justify-content:center; align-items:center; font-size:1rem; flex-shrink:0; }
.icon-score { background:rgba(242, 101, 34, 0.2); border:1px solid var(--ncaa-orange); color:var(--ncaa-orange); }
.icon-foul { background:rgba(255, 23, 68, 0.2); border:1px solid var(--danger); color:var(--danger); }
.icon-normal { background:rgba(0, 133, 202, 0.2); border:1px solid var(--ncaa-blue-bright); color:var(--ncaa-blue-bright); }
.pbp-desc { flex:1; font-family:'Inter', sans-serif; font-size:1rem; color:var(--text-main); line-height:1.4; }
.pbp-desc strong { color:var(--text-main); font-weight:800; }
.pbp-score-tag { font-family:'Bebas Neue', sans-serif; font-size:1.8rem; letter-spacing:2px; color:var(--ncaa-orange); width:100px; text-align:right; }

/* Loaders */
.loader-box { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px; gap:20px; }
.spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.1); border-top-color:var(--ncaa-orange); border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { 100% { transform:rotate(360deg); } }
.loader-text { font-family:'Space Mono', monospace; font-size:0.9rem; color:var(--text-muted); letter-spacing:3px; }

</style>
</head>
<body>

<div class="bg-pattern"></div>
<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>

<div class="app-wrapper">
  
  <header class="top-bar">
    <div class="brand-zone">
      <div class="brand-text">NEXUS // SPORTS</div>
    </div>
    
    <div class="filters-zone" id="filterContainer">
      <button class="filter-btn active" data-league="ALL">ALL LIVE</button>
      <button class="filter-btn" data-league="NBA">NBA</button>
      <button class="filter-btn" data-league="NCAA">NCAA</button>
      <button class="filter-btn" data-league="MLB">MLB</button>
      <button class="filter-btn" data-league="SOCCER">SOCCER</button>
    </div>

    <div class="metrics-zone">
      <div class="live-indicator">
        <div class="live-dot"></div>
        <div class="live-text" id="sysStatus">SYNCING</div>
      </div>
      <div class="metric-group">
        <span class="metric-label">ACTIVE GAMES</span>
        <span class="metric-val highlight" id="countGames">0</span>
      </div>
      <div class="metric-group">
        <span class="metric-label">TOTAL POINTS</span>
        <span class="metric-val" id="countPts">0</span>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="games-grid" id="gridContainer">
      <div class="empty-state">
        <div class="spinner"></div>
        <div class="empty-text">INITIALIZING TELEMETRY...</div>
      </div>
    </div>
  </main>

  <div class="ticker-wrap">
    <div class="ticker-badge">LIVE UPDATES</div>
    <div class="ticker-viewport">
      <div class="ticker-scroll" id="tickerScroll">
        </div>
    </div>
  </div>

</div>

<div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
  <div class="modal-window" onclick="event.stopPropagation()">
    
    <div class="mh-top">
      <div class="card-league" id="modLeague">LEAGUE</div>
      <div class="mh-venue" id="modVenue">VENUE NAME / LOCATION</div>
      <button class="mh-close" onclick="forceCloseModal()">✕</button>
    </div>

    <div class="mh-matchup">
      <div class="m-team">
        <div class="m-logo"><img id="modAwayLogo" src="" alt=""></div>
        <div class="m-name" id="modAwayName">AWAY</div>
        <div class="team-record" id="modAwayRec">0-0</div>
      </div>
      
      <div class="m-center">
        <div class="m-clock-lrg" id="modClock">Q1 - 12:00</div>
        <div class="m-score-wrap">
          <div class="m-score-big" id="modAwayScore">0</div>
          <div class="m-score-divider">-</div>
          <div class="m-score-big" id="modHomeScore">0</div>
        </div>
      </div>

      <div class="m-team">
        <div class="m-logo"><img id="modHomeLogo" src="" alt=""></div>
        <div class="m-name" id="modHomeName">HOME</div>
        <div class="team-record" id="modHomeRec">0-0</div>
      </div>
    </div>

    <div class="modal-nav">
      <button class="m-nav-btn active" data-tab="box">BOX SCORE</button>
      <button class="m-nav-btn" data-tab="team">TEAM STATS</button>
      <button class="m-nav-btn" data-tab="pbp">PLAY-BY-PLAY</button>
    </div>

    <div class="modal-body" id="modBody">
      <div class="loader-box">
        <div class="spinner"></div>
        <div class="loader-text">AWAITING DEEP DATA...</div>
      </div>
    </div>

  </div>
</div>

<script>
/* ==========================================================================
   CORE ENGINE LOGIC - VIBRANT EDITION
   ========================================================================== */

const ENDPOINTS = [
  { id: "NBA",    url: "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard",                 sum: "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/summary?event=" },
  { id: "NCAA",   url: "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard", sum: "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/summary?event=" },
  { id: "MLB",    url: "https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard",                   sum: "https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/summary?event=" },
  { id: "SOCCER", url: "https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard",                   sum: "https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/summary?event=" }
];

const APP_STATE = {
  filter: 'ALL',
  liveData: {},    // Map of gameUID -> parsedGameData
  prevScores: {},  // Map of gameUID_side -> score (for animations)
  modalOpen: null, // UID of open modal
  activeTab: 'box',
  deepData: {}     // Map of gameUID -> { boxscore, teamstats, pbp }
};

// ==========================================================================
// INITIALIZATION & POLLING
// ==========================================================================
async function bootEngine() {
  await fetchMasterFeed();
  setInterval(fetchMasterFeed, 10000); // Fast 10s poll
  
  // Setup Event Listeners
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      APP_STATE.filter = e.target.getAttribute('data-league');
      renderGrid();
    });
  });

  document.querySelectorAll('.m-nav-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('.m-nav-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      APP_STATE.activeTab = e.target.getAttribute('data-tab');
      renderModalTab();
    });
  });
}

// ==========================================================================
// DATA FETCHING & PARSING
// ==========================================================================
async function fetchMasterFeed() {
  document.getElementById('sysStatus').innerText = "FETCHING...";
  
  let tempGames = {};
  let totalPts = 0;
  let activeCount = 0;

  for (const ep of ENDPOINTS) {
    try {
      const response = await fetch(ep.url);
      const data = await response.json();
      
      if (data.events) {
        data.events.forEach(ev => {
          if (ev.status.type.state === 'in') { // Only LIVE games
            const parsed = parseEvent(ev, ep);
            tempGames[parsed.uid] = parsed;
            activeCount++;
            totalPts += (parsed.away.score + parsed.home.score);
          }
        });
      }
    } catch(err) {
      console.warn("Endpoint failed:", ep.id);
    }
  }

  APP_STATE.liveData = tempGames;
  
  // Update Header Metrics
  document.getElementById('countGames').innerText = activeCount;
  document.getElementById('countPts').innerText = totalPts;
  document.getElementById('sysStatus').innerText = "LIVE";

  renderGrid();
  buildTicker();

  // If modal is open, auto-refresh its deep data
  if (APP_STATE.modalOpen && APP_STATE.liveData[APP_STATE.modalOpen]) {
    updateModalHeader(APP_STATE.liveData[APP_STATE.modalOpen]);
    fetchDeepData(APP_STATE.liveData[APP_STATE.modalOpen]);
  }
}

function parseEvent(ev, ep) {
  const comp = ev.competitions[0];
  const t1 = comp.competitors[0];
  const t2 = comp.competitors[1];
  
  const homeRaw = t1.homeAway === 'home' ? t1 : t2;
  const awayRaw = t1.homeAway === 'away' ? t1 : t2;

  const extractTeam = (t) => ({
    id: t.team.id,
    name: t.team.shortDisplayName || t.team.name || "TBA",
    score: parseInt(t.score) || 0,
    logo: t.team.logo || "https://a.espncdn.com/i/teamlogos/default-team-logo-500.png",
    record: t.records && t.records[0] ? t.records[0].summary : "0-0",
    linescores: (t.linescores || []).map(l => l.value)
  });

  let broadcast = "N/A";
  if (comp.broadcasts && comp.broadcasts.length > 0) {
    broadcast = comp.broadcasts[0].names.join(", ");
  }

  let lastPlay = "Game in progress...";
  if (comp.situation && comp.situation.lastPlay && comp.situation.lastPlay.text) {
    lastPlay = comp.situation.lastPlay.text;
  }

  return {
    uid: `${ep.id}_${ev.id}`,
    espnId: ev.id,
    league: ep.id,
    clock: ev.status.type.detail || "LIVE",
    venue: comp.venue ? comp.venue.fullName : "Unknown Arena",
    network: broadcast,
    lastPlay: lastPlay,
    home: extractTeam(homeRaw),
    away: extractTeam(awayRaw),
    endpoint: ep
  };
}

// ==========================================================================
// GRID RENDERING
// ==========================================================================
function renderGrid() {
  const container = document.getElementById('gridContainer');
  let filtered = Object.values(APP_STATE.liveData);
  
  if (APP_STATE.filter !== 'ALL') {
    filtered = filtered.filter(g => g.league === APP_STATE.filter);
  }

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🏟️</div>
        <div class="empty-text">NO LIVE ${APP_STATE.filter !== 'ALL' ? APP_STATE.filter : ''} GAMES ACTIVE</div>
      </div>`;
    return;
  }

  // Remove stale cards
  const activeUIDs = filtered.map(g => g.uid);
  Array.from(container.children).forEach(child => {
    if (child.id && !activeUIDs.includes(child.id)) child.remove();
  });
  
  const empty = container.querySelector('.empty-state');
  if (empty) empty.remove();

  // Create or Update Cards
  filtered.forEach(game => {
    let card = document.getElementById(game.uid);
    if (!card) {
      card = document.createElement('div');
      card.className = 'game-card';
      card.id = game.uid;
      card.onclick = () => handleCardClick(game.uid);
      card.innerHTML = buildCardShell(game);
      container.appendChild(card);
      
      // Init memory for flash
      APP_STATE.prevScores[`${game.uid}_away`] = game.away.score;
      APP_STATE.prevScores[`${game.uid}_home`] = game.home.score;
    } else {
      updateCardDOM(card, game);
    }
  });
}

function buildCardShell(g) {
  return `
    <div class="card-header">
      <div class="card-meta-left">
        <div class="card-league">${g.league}</div>
        <div class="card-network">${g.network}</div>
      </div>
      <div class="card-clock" id="clk_${g.uid}"><div class="live-dot"></div>${g.clock}</div>
    </div>
    <div class="card-body">
      <div class="team-row">
        <div class="team-id">
          <div class="team-logo-box"><img src="${g.away.logo}" onerror="this.style.display='none'"></div>
          <div class="team-info">
            <div class="team-name">${g.away.name}</div>
            <div class="team-record">${g.away.record}</div>
          </div>
        </div>
        <div class="linescore-mini" id="ls_a_${g.uid}"></div>
        <div class="total-score" id="scr_a_${g.uid}">${g.away.score}</div>
      </div>
      <div class="team-row">
        <div class="team-id">
          <div class="team-logo-box"><img src="${g.home.logo}" onerror="this.style.display='none'"></div>
          <div class="team-info">
            <div class="team-name">${g.home.name}</div>
            <div class="team-record">${g.home.record}</div>
          </div>
        </div>
        <div class="linescore-mini" id="ls_h_${g.uid}"></div>
        <div class="total-score" id="scr_h_${g.uid}">${g.home.score}</div>
      </div>
    </div>
    <div class="card-footer">
      <div class="cf-label">LATEST</div>
      <div class="cf-text" id="lp_${g.uid}">${g.lastPlay}</div>
    </div>
  `;
}

function updateCardDOM(card, g) {
  // Update Clock
  document.getElementById(`clk_${g.uid}`).innerHTML = `<div class="live-dot"></div>${g.clock}`;
  document.getElementById(`lp_${g.uid}`).innerText = g.lastPlay;

  // Render mini linescores
  const buildLS = (ls) => ls.map(val => `<div class="ls-box">${val}</div>`).join('');
  document.getElementById(`ls_a_${g.uid}`).innerHTML = buildLS(g.away.linescores);
  document.getElementById(`ls_h_${g.uid}`).innerHTML = buildLS(g.home.linescores);

  // Score Diff & Animation Logic
  const processScore = (side) => {
    const el = document.getElementById(`scr_${side.charAt(0)}_${g.uid}`);
    const memKey = `${g.uid}_${side}`;
    const prev = APP_STATE.prevScores[memKey];
    const curr = g[side].score;
    
    if (el) {
      el.innerText = curr;
      if (curr !== prev) {
        // Flash!
        el.classList.remove('flash');
        void el.offsetWidth;
        el.classList.add('flash');
        APP_STATE.prevScores[memKey] = curr;
      }
      
      const other = side === 'away' ? 'home' : 'away';
      el.classList.toggle('leading', curr > g[other].score);
    }
  };

  processScore('away');
  processScore('home');
}

// ==========================================================================
// TICKER
// ==========================================================================
function buildTicker() {
  const scroll = document.getElementById('tickerScroll');
  const games = Object.values(APP_STATE.liveData);
  if (games.length === 0) {
    scroll.innerHTML = `<div class="ticker-item">NO LIVE DATA...</div>`;
    return;
  }
  
  let html = '';
  games.forEach(g => {
    html += `
      <div class="ticker-item">
        <span class="ti-team">${g.away.name.toUpperCase()}</span>
        <span class="ti-score">${g.away.score}</span>
        <span style="color:var(--border-bright)">@</span>
        <span class="ti-team">${g.home.name.toUpperCase()}</span>
        <span class="ti-score">${g.home.score}</span>
        <span class="ti-time">(${g.clock})</span>
      </div>`;
  });
  
  // Duplicate for seamless loop
  scroll.innerHTML = html + html + html;
}

// ==========================================================================
// MODAL & DEEP DATA LOGIC
// ==========================================================================
function handleCardClick(uid) {
  const g = APP_STATE.liveData[uid];
  if (!g) return;
  
  APP_STATE.modalOpen = uid;
  updateModalHeader(g);
  
  document.getElementById('detailModal').classList.add('active');
  
  // Reset Tabs
  document.querySelectorAll('.m-nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.m-nav-btn[data-tab="box"]').classList.add('active');
  APP_STATE.activeTab = 'box';
  
  document.getElementById('modBody').innerHTML = `
    <div class="loader-box">
      <div class="spinner"></div>
      <div class="loader-text">COMPILING DEEP TELEMETRY...</div>
    </div>`;
    
  fetchDeepData(g);
}

function forceCloseModal() {
  document.getElementById('detailModal').classList.remove('active');
  APP_STATE.modalOpen = null;
}

function closeModal(e) {
  if (e.target.id === 'detailModal') forceCloseModal();
}

function updateModalHeader(g) {
  document.getElementById('modLeague').innerText = g.league;
  document.getElementById('modVenue').innerText = g.venue;
  
  document.getElementById('modAwayLogo').src = g.away.logo;
  document.getElementById('modAwayName').innerText = g.away.name.toUpperCase();
  document.getElementById('modAwayRec').innerText = g.away.record;
  document.getElementById('modAwayScore').innerText = g.away.score;
  
  document.getElementById('modHomeLogo').src = g.home.logo;
  document.getElementById('modHomeName').innerText = g.home.name.toUpperCase();
  document.getElementById('modHomeRec').innerText = g.home.record;
  document.getElementById('modHomeScore').innerText = g.home.score;
  
  document.getElementById('modClock').innerText = g.clock;
}

async function fetchDeepData(game) {
  try {
    const res = await fetch(game.endpoint.sum + game.espnId);
    const data = await res.json();
    
    let deep = { boxscore: [], teamstats: {}, pbp: [] };

    // Process Boxscore
    if (data.boxscore && data.boxscore.players) {
      data.boxscore.players.forEach(teamBlock => {
        const tName = teamBlock.team ? teamBlock.team.shortDisplayName : "TEAM";
        if (teamBlock.statistics && teamBlock.statistics[0]) {
          const keys = teamBlock.statistics[0].labels || [];
          const aths = teamBlock.statistics[0].athletes || [];
          
          let tRoster = [];
          aths.forEach(a => {
            let pObj = {
              name: a.athlete.shortName || a.athlete.displayName,
              pic: a.athlete.headshot ? a.athlete.headshot.href : '',
              stats: {}
            };
            (a.stats || []).forEach((v, i) => { if(keys[i]) pObj.stats[keys[i]] = v; });
            tRoster.push(pObj);
          });
          deep.boxscore.push({ team: tName, logo: teamBlock.team.logo, players: tRoster });
        }
      });
    }

    // Process Team Stats
    if (data.boxscore && data.boxscore.teams) {
      data.boxscore.teams.forEach(t => {
        const side = t.homeAway === 'home' ? 'home' : 'away';
        let sMap = {};
        if (t.statistics) {
          t.statistics.forEach(s => { sMap[s.name || s.label] = s.displayValue || s.value; });
        }
        deep.teamstats[side] = sMap;
      });
    }

    // Process PBP
    if (data.plays) {
      deep.pbp = data.plays.slice(-40).reverse(); // Last 40 plays
    }

    APP_STATE.deepData[game.uid] = deep;
    
    if (APP_STATE.modalOpen === game.uid) {
      renderModalTab();
    }
    
  } catch(e) {
    if (APP_STATE.modalOpen === game.uid) {
      document.getElementById('modBody').innerHTML = `
        <div class="loader-box">
          <div class="loader-text" style="color:var(--danger)">TELEMETRY UPLINK FAILED</div>
        </div>`;
    }
  }
}

function renderModalTab() {
  if (!APP_STATE.modalOpen) return;
  const uid = APP_STATE.modalOpen;
  const game = APP_STATE.liveData[uid];
  const deep = APP_STATE.deepData[uid];
  const body = document.getElementById('modBody');
  
  if (!deep) return; // Still loading

  let html = `<div class="tab-pane active">`;

  // --- TAB: BOX SCORE ---
  if (APP_STATE.activeTab === 'box') {
    if (deep.boxscore.length === 0) {
      html += `<div class="empty-state"><div class="empty-text">BOX SCORE UNAVAILABLE</div></div>`;
    } else {
      const isBskt = game.league === 'NBA' || game.league === 'NCAA';
      const isMlb = game.league === 'MLB';
      const cols = isMlb ? ['AB','R','H','RBI','BB','SO'] : isBskt ? ['MIN','PTS','REB','AST','STL','BLK','TO'] : ['G','A','SH','SOG'];
      
      deep.boxscore.forEach(tb => {
        html += `
          <div class="table-section">
            <div class="table-header-row">
              <img class="th-logo" src="${tb.logo || game.away.logo}" onerror="this.style.display='none'">
              <div class="th-name">${tb.team.toUpperCase()}</div>
            </div>
            <table class="data-table">
              <thead>
                <tr><th>PLAYER</th>${cols.map(c => `<th>${c}</th>`).join('')}</tr>
              </thead>
              <tbody>`;
        
        tb.players.forEach(p => {
          // Check if it's a totals row
          const isTotal = p.name.toLowerCase() === 'team' || p.name.toLowerCase() === 'totals';
          let imgTag = p.pic ? `<img class="player-avatar" src="${p.pic}">` : `<div class="player-avatar"></div>`;
          if (isTotal) imgTag = '';
          
          html += `<tr class="${isTotal ? 'totals-row' : ''}">
                    <td>${imgTag} <span>${p.name}</span></td>
                    ${cols.map(c => `<td>${p.stats[c] || '-'}</td>`).join('')}
                   </tr>`;
        });
        html += `</tbody></table></div>`;
      });
    }
  }
  
  // --- TAB: TEAM STATS ---
  else if (APP_STATE.activeTab === 'team') {
    const ts = deep.teamstats;
    if (!ts.away || !ts.home) {
      html += `<div class="empty-state"><div class="empty-text">TEAM STATS UNAVAILABLE</div></div>`;
    } else {
      const isBskt = game.league === 'NBA' || game.league === 'NCAA';
      const statKeys = isBskt ? 
        [['fieldGoalPct','FG %'],['threePointFieldGoalPct','3PT %'],['freeThrowPct','FT %'],['rebounds','REBOUNDS'],['assists','ASSISTS'],['turnovers','TURNOVERS']] : 
        [['hits','HITS'],['errors','ERRORS'],['walks','WALKS']]; // simplified fallback
        
      html += `<div class="comparison-wrap">`;
      
      statKeys.forEach(sk => {
        const key = sk[0];
        const label = sk[1];
        let aVal = parseFloat((ts.away[key] || "0").toString().replace('%','')) || 0;
        let hVal = parseFloat((ts.home[key] || "0").toString().replace('%','')) || 0;
        let total = aVal + hVal;
        if (total === 0) total = 1; // avoid /0
        
        let aPct = (aVal / total) * 100;
        let hPct = (hVal / total) * 100;
        
        let displayA = ts.away[key] || "0";
        let displayH = ts.home[key] || "0";

        html += `
          <div class="comp-row">
            <div class="comp-val away">${displayA}</div>
            <div class="comp-center">
              <div class="comp-label">${label}</div>
              <div class="comp-bar-bg">
                <div class="comp-bar-fill-away" style="width:${aPct}%"></div>
                <div class="comp-bar-fill-home" style="width:${hPct}%"></div>
              </div>
            </div>
            <div class="comp-val home">${displayH}</div>
          </div>`;
      });
      html += `</div>`;
    }
  }

  // --- TAB: PLAY BY PLAY ---
  else if (APP_STATE.activeTab === 'pbp') {
    if (deep.pbp.length === 0) {
      html += `<div class="empty-state"><div class="empty-text">FEED UNAVAILABLE</div></div>`;
    } else {
      html += `<div class="pbp-container">`;
      deep.pbp.forEach(p => {
        const time = p.clock ? p.clock.displayValue : '0:00';
        const text = p.text || p.description || '';
        const score = (p.awayScore != null && p.homeScore != null) ? `${p.awayScore} - ${p.homeScore}` : '';
        
        let isScoring = p.scoringPlay || text.toLowerCase().match(/score|goal|basket|three pointer|run/);
        let isFoul = text.toLowerCase().match(/foul|turnover|error/);
        
        let iconClass = isScoring ? 'icon-score' : isFoul ? 'icon-foul' : 'icon-normal';
        let iconTxt = isScoring ? '🔥' : isFoul ? '⚠️' : '⚡';

        // Bold player names roughly by capitalizing the first few words if they look like names
        // simpler approach: just render text, but highlight if scoring
        
        html += `
          <div class="pbp-item">
            <div class="pbp-clock">${time}</div>
            <div class="pbp-icon ${iconClass}">${iconTxt}</div>
            <div class="pbp-desc">${text}</div>
            <div class="pbp-score-tag">${score}</div>
          </div>`;
      });
      html += `</div>`;
    }
  }

  html += `</div>`;
  body.innerHTML = html;
}

// ==========================================================================
// START
// ==========================================================================
window.onload = bootEngine;

</script>
</body>
</html>
