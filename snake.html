<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRADASH // LIQUID GLASS EDITION</title>
    <style>
        /* =======================================================================
           1. CSS VARIABLES & AMBIENT BACKGROUND
           ======================================================================= */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --neon-blue: #00f3ff;
            --neon-purple: #bd00ff;
            --neon-green: #00ff66;
            --text-main: #f0f0f0;
            --text-dim: #888899;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        
        body, html {
            width: 100vw; height: 100vh; overflow: hidden;
            background-color: #050508; color: var(--text-main);
            position: relative;
        }

        /* --- AMBIENT GLOWING ORBS (BEHIND THE GLASS) --- */
        .ambient-orb {
            position: absolute; border-radius: 50%; filter: blur(80px); z-index: 1;
            animation: floatOrb 20s infinite alternate ease-in-out; opacity: 0.5;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--neon-blue); top: -100px; left: -100px; }
        .orb-2 { width: 500px; height: 500px; background: var(--neon-purple); bottom: -150px; right: -100px; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: var(--neon-green); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -10s; opacity: 0.2; }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 50px) scale(1.1); }
            100% { transform: translate(-50px, 20px) scale(0.9); }
        }

        /* =======================================================================
           2. LIQUID GLASS MASTER LAYOUT
           ======================================================================= */
        .glass-wrapper {
            display: flex; width: 100vw; height: 100vh; position: relative; z-index: 10;
            padding: 20px; gap: 20px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- LEFT COLUMN: PROFESSIONAL BROADCAST CHAT --- */
        .left-col { width: 35%; padding: 30px; position: relative; }
        
        .header-container { margin-bottom: 30px; }
        .header-title { font-size: 1.8rem; font-weight: 800; background: linear-gradient(90deg, #fff, var(--text-dim)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
        .header-sub { font-size: 0.85rem; color: var(--neon-blue); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }

        /* Liquid Glass Input Form */
        .input-group { display: flex; flex-direction: column; gap: 15px; position: relative; }
        
        .glass-input {
            width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border);
            color: #fff; padding: 20px 24px; font-size: 1.1rem; border-radius: 16px;
            outline: none; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        .glass-input:focus {
            border-color: var(--neon-blue); background: rgba(0, 0, 0, 0.4);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3), 0 0 20px rgba(0, 243, 255, 0.2);
        }
        .glass-input::placeholder { color: rgba(255, 255, 255, 0.3); }

        .glass-btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.0));
            border: 1px solid var(--glass-highlight); color: #fff;
            padding: 20px; font-size: 1.1rem; font-weight: 700; border-radius: 16px;
            cursor: pointer; transition: all 0.3s ease;
            backdrop-filter: blur(10px); text-transform: uppercase; letter-spacing: 1px;
            position: relative; overflow: hidden;
        }
        .glass-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        .glass-btn:hover:not(:disabled) { border-color: var(--neon-blue); box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3); transform: translateY(-2px); }
        .glass-btn:hover:not(:disabled)::before { left: 150%; }
        .glass-btn:active:not(:disabled) { transform: translateY(1px); }
        .glass-btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: var(--alert-red); }

        /* Status & Buffer Visuals */
        .status-container { margin-top: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; font-weight: 600; }
        .buffer-track { width: 100%; height: 6px; background: rgba(0,0,0,0.3); border-radius: 10px; margin-top: 15px; overflow: hidden; border: 1px solid var(--glass-border); }
        .buffer-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue)); border-radius: 10px; transition: width 1s linear; }

        .console-glass {
            flex-grow: 1; margin-top: 30px; background: rgba(0,0,0,0.2); border-radius: 16px;
            border: 1px solid var(--glass-border); padding: 20px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 0.85rem;
        }
        .log-entry { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .log-time { color: var(--text-dim); margin-right: 10px; }
        .log-msg.success { color: var(--neon-green); }
        .log-msg.error { color: var(--alert-red); }

        /* --- RIGHT COLUMN: LIVE SPORTS GRID --- */
        .right-col { width: 65%; padding: 30px; overflow-y: auto; }
        
        .live-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .live-title { font-size: 2rem; font-weight: 800; }
        .live-badge { background: rgba(0, 255, 102, 0.1); border: 1px solid var(--neon-green); color: var(--neon-green); padding: 6px 16px; border-radius: 30px; font-size: 0.8rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .pulse-dot { width: 8px; height: 8px; background: var(--neon-green); border-radius: 50%; box-shadow: 0 0 10px var(--neon-green); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .sports-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 24px; position: relative; transition: all 0.3s ease;
        }
        .glass-card:hover { background: rgba(255, 255, 255, 0.05); border-color: var(--glass-highlight); transform: translateY(-3px); }
        
        .league-pill {
            position: absolute; top: -12px; left: 24px; background: #fff; color: #000;
            padding: 4px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 800; letter-spacing: 1px;
        }

        .team-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .team-name { font-size: 1.3rem; font-weight: 700; color: #ddd; }
        .team-score { font-size: 2.2rem; font-weight: 900; color: #fff; transition: color 0.3s; }
        
        .game-clock { text-align: right; font-size: 0.85rem; color: var(--neon-blue); font-weight: 600; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--glass-border); }

        .no-games { grid-column: 1 / -1; text-align: center; padding: 60px; font-size: 1.2rem; color: var(--text-dim); background: rgba(0,0,0,0.2); border-radius: 20px; border: 1px dashed var(--glass-border); }

        /* Hardware Accelerated Score Pop */
        @keyframes scoreGlassPop {
            0% { transform: scale(1); color: #fff; }
            20% { transform: scale(1.5); color: var(--neon-green); text-shadow: 0 0 20px var(--neon-green); }
            100% { transform: scale(1); color: #fff; }
        }
        .anim-score { animation: scoreGlassPop 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>

    <div class="glass-wrapper">
        
        <div class="glass-panel left-col">
            <div class="header-container">
                <h1 class="header-title">Broadcast Array</h1>
                <div class="header-sub" id="sysClock">00:00:00</div>
            </div>

            <div class="input-group">
                <input type="text" id="chatInput" class="glass-input" placeholder="Type transmission payload..." autocomplete="off">
                <button id="sendBtn" class="glass-btn" onclick="executeWebhook()">Broadcast to House</button>
            </div>

            <div class="buffer-track">
                <div id="bufferFill" class="buffer-fill"></div>
            </div>
            
            <div class="status-container">
                <span id="connStatus" style="color: var(--neon-blue);">● SECURE UPLINK</span>
                <span id="bufferStatus" style="color: var(--text-dim);">READY</span>
            </div>

            <div class="console-glass" id="glassConsole">
                <div class="log-entry">
                    <span class="log-time">[SYS_INIT]</span><span class="log-msg">Liquid Glass Core loaded.</span>
                </div>
                <div class="log-entry" id="webhookWarning" style="color: var(--neon-yellow); display: none; font-weight: bold;">
                    ⚠️ WARNING: NO WEBHOOK URL DETECTED. SYSTEM UNARMED.
                </div>
            </div>
        </div>

        <div class="glass-panel right-col">
            <div class="live-header">
                <h2 class="live-title">Live Telemetry</h2>
                <div class="live-badge"><div class="pulse-dot"></div> STRICTLY LIVE</div>
            </div>
            <div class="sports-grid" id="sportsGrid">
                </div>
        </div>

    </div>

    <script>
        /**
         * =======================================================================
         * 1. GOOGLE HOME & SCRYPTED WEBHOOK CONFIGURATION
         * =======================================================================
         * 🔴🔴🔴 YOUR CODE WILL NOT WORK UNTIL YOU PASTE YOUR LINK BELOW 🔴🔴🔴
         */
        const SCRYPTED_WEBHOOK = "YOUR_LINK_GOES_HERE"; 
        
        const COOLDOWN_MS = 60000; 
        let isSystemLocked = false;

        function addLog(msg, type = "normal") {
            const consoleEl = document.getElementById('glassConsole');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            entry.innerHTML = `<span class="log-time">[${time}]</span><span class="log-msg ${type}">${msg}</span>`;
            consoleEl.prepend(entry);
        }

        // Startup Check
        if (SCRYPTED_WEBHOOK === "YOUR_LINK_GOES_HERE" || SCRYPTED_WEBHOOK === "") {
            document.getElementById('webhookWarning').style.display = 'block';
        }

        async function executeWebhook() {
            if (isSystemLocked) return;
            
            const inputEl = document.getElementById('chatInput');
            const text = inputEl.value.trim();
            
            if (!text) { addLog("Payload is empty. Aborted.", "error"); return; }

            // ⚠️ CRITICAL KNOWLEDGE BOMB:
            // A simple Dummy Switch *cannot* pass your custom text string to Google Home via a standard Routine starter. 
            // The switch turns ON, and Google reads the pre-programmed YAML message ("Attention! A new message...").
            // We append the text to the URL here as a parameter (`&payload=...`) just in case your backend is ever upgraded to handle it!
            
            const targetUrl = `${SCRYPTED_WEBHOOK}?state=on&payload=${encodeURIComponent(text)}`;
            
            addLog(`Initializing trigger sequence...`, "normal");

            try {
                // We use mode: 'no-cors' so the browser doesn't throw a cross-origin security block
                await fetch(targetUrl, { method: 'GET', mode: 'no-cors' });
                addLog(`Switch flipped ON. Triggering Google Home.`, "success");
            } catch (error) {
                addLog(`Network Failure: Could not reach Scrypted server.`, "error");
            }

            inputEl.value = "";
            engageCooldown();
        }

        function engageCooldown() {
            isSystemLocked = true;
            const btn = document.getElementById('sendBtn');
            const fill = document.getElementById('bufferFill');
            const statusText = document.getElementById('bufferStatus');
            
            btn.disabled = true;
            btn.innerText = "COOLING DOWN...";
            fill.style.transition = "none";
            fill.style.width = "100%";
            
            void fill.offsetWidth; // Reflow
            fill.style.transition = `width ${COOLDOWN_MS}ms linear`;
            fill.style.width = "0%";

            let msLeft = COOLDOWN_MS;
            const timer = setInterval(() => {
                msLeft -= 100;
                statusText.innerText = `BUFFER: ${(msLeft / 1000).toFixed(1)}s`;
                
                if (msLeft <= 0) {
                    clearInterval(timer);
                    isSystemLocked = false;
                    btn.disabled = false;
                    btn.innerText = "BROADCAST TO HOUSE";
                    statusText.innerText = "READY";
                    addLog("Buffer cleared. System armed.", "success");
                }
            }, 100);
        }

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') executeWebhook();
        });

        /**
         * =======================================================================
         * 2. STRICT-LIVE SPORTS ENGINE
         * =======================================================================
         */
        const SCORE_MEMORY = {};
        const ENDPOINTS = [
            { id: "NBA", url: "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard" },
            { id: "NCAA", url: "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard" },
            { id: "MLB", url: "https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard" },
            { id: "SOCCER", url: "https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard" }
        ];

        async function fetchLiveData() {
            let parsedGames = [];

            for (const api of ENDPOINTS) {
                try {
                    const res = await fetch(api.url);
                    const data = await res.json();
                    
                    if (data.events) {
                        data.events.forEach(event => {
                            // STRICT LIVE CHECK: 'in' state means actively playing
                            if (event.status.type.state === 'in') {
                                const c = event.competitions[0];
                                parsedGames.push({
                                    uid: `${api.id}_${event.id}`,
                                    league: api.id,
                                    clock: event.status.type.detail,
                                    home: { name: c.competitors[0].team.shortDisplayName, score: parseInt(c.competitors[0].score) || 0 },
                                    away: { name: c.competitors[1].team.shortDisplayName, score: parseInt(c.competitors[1].score) || 0 }
                                });
                            }
                        });
                    }
                } catch (e) {
                    console.log("Endpoint skip:", api.id);
                }
            }
            updateGrid(parsedGames);
        }

        function updateGrid(liveGames) {
            const grid = document.getElementById('sportsGrid');
            
            if (liveGames.length === 0) {
                grid.innerHTML = `<div class="no-games">NO ACTIVE GAMES DETECTED</div>`;
                return;
            }

            const activeIds = liveGames.map(g => g.uid);
            Array.from(grid.children).forEach(child => {
                if (!activeIds.includes(child.id) && child.id !== '') child.remove();
            });

            liveGames.forEach(game => {
                let card = document.getElementById(game.uid);
                
                if (!card) {
                    // Create new glass card
                    card = document.createElement('div');
                    card.className = 'glass-card';
                    card.id = game.uid;
                    card.innerHTML = `
                        <div class="league-pill">${game.league}</div>
                        <div class="team-row">
                            <span class="team-name">${game.away.name}</span>
                            <span class="team-score" id="score_${game.uid}_away">${game.away.score}</span>
                        </div>
                        <div class="team-row">
                            <span class="team-name">${game.home.name}</span>
                            <span class="team-score" id="score_${game.uid}_home">${game.home.score}</span>
                        </div>
                        <div class="game-clock" id="clock_${game.uid}">${game.clock}</div>
                    `;
                    grid.appendChild(card);
                    
                    SCORE_MEMORY[`${game.uid}_away`] = game.away.score;
                    SCORE_MEMORY[`${game.uid}_home`] = game.home.score;
                } else {
                    // Update existing
                    document.getElementById(`clock_${game.uid}`).innerText = game.clock;

                    if (game.away.score > SCORE_MEMORY[`${game.uid}_away`]) {
                        fireAnimation(`score_${game.uid}_away`, game.away.score);
                        SCORE_MEMORY[`${game.uid}_away`] = game.away.score;
                    }
                    if (game.home.score > SCORE_MEMORY[`${game.uid}_home`]) {
                        fireAnimation(`score_${game.uid}_home`, game.home.score);
                        SCORE_MEMORY[`${game.uid}_home`] = game.home.score;
                    }
                }
            });
        }

        function fireAnimation(elementId, newScore) {
            const el = document.getElementById(elementId);
            el.innerText = newScore;
            el.classList.remove('anim-score');
            void el.offsetWidth; // Force Reflow
            el.classList.add('anim-score');
        }

        // Boot
        setInterval(() => {
            const d = new Date();
            document.getElementById('sysClock').innerText = d.toLocaleTimeString('en-US', { hour12: false }) + ":" + String(d.getMilliseconds()).padStart(3, '0');
        }, 50);

        setTimeout(fetchLiveData, 1000);
        setInterval(fetchLiveData, 10000); // Poll every 10 seconds for maximum accuracy

    </script>
</body>
</html>
