<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NBA Game Engine</title>

<style>

body{
background:#0d0d0d;
color:white;
font-family:Arial;
text-align:center;
}

#scoreboard{
font-size:34px;
margin-bottom:10px;
}

.logo{
width:70px;
vertical-align:middle;
}

#arena{
width:1000px;
margin:auto;
position:relative;
}

canvas{
background:#c68642;
border:6px solid #222;
border-radius:10px;
}

#playlog{
height:150px;
overflow:auto;
background:#111;
margin-top:10px;
padding:5px;
font-size:14px;
}

button{
padding:10px;
font-size:18px;
margin:10px;
}

.scoreEffect{
position:absolute;
font-size:70px;
color:yellow;
animation:pop 1s forwards;
}

@keyframes pop{
0%{transform:scale(0.2);opacity:1}
100%{transform:scale(2);opacity:0}
}

.flash{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

</style>
</head>

<body>

<h1>🏀 NBA Game Visualizer</h1>

<div id="scoreboard">

<img id="logoA" class="logo">
<span id="scoreA">0</span>

VS

<span id="scoreB">0</span>
<img id="logoB" class="logo">

</div>

<div id="arena">

<canvas id="court" width="1000" height="500"></canvas>

<div id="flash" class="flash"></div>

</div>

<button onclick="simulatePlay()">Simulate Play</button>

<div id="playlog"></div>

<script>

////////////////////////////////////////////////
// TEAM DATA
////////////////////////////////////////////////

const teams={
LAL:{
name:"Lakers",
logo:"https://cdn.nba.com/logos/nba/1610612747/global/L/logo.svg",
players:["LeBron James","Anthony Davis","D'Angelo Russell"]
},
GSW:{
name:"Warriors",
logo:"https://cdn.nba.com/logos/nba/1610612744/global/L/logo.svg",
players:["Stephen Curry","Klay Thompson","Draymond Green"]
}
}

document.getElementById("logoA").src=teams.LAL.logo
document.getElementById("logoB").src=teams.GSW.logo

////////////////////////////////////////////////
// GAME STATE
////////////////////////////////////////////////

let score={
LAL:0,
GSW:0
}

let stats={
players:{},
teams:{
LAL:{points:0,shots:0,threes:0,dunks:0},
GSW:{points:0,shots:0,threes:0,dunks:0}
}
}

////////////////////////////////////////////////
// PLAYER STATS INIT
////////////////////////////////////////////////

function initStats(){

teams.LAL.players.forEach(p=>{
stats.players[p]={pts:0,shots:0,threes:0}
})

teams.GSW.players.forEach(p=>{
stats.players[p]={pts:0,shots:0,threes:0}
})

}

initStats()

////////////////////////////////////////////////
// CANVAS ENGINE
////////////////////////////////////////////////

const canvas=document.getElementById("court")
const ctx=canvas.getContext("2d")

let ball={
x:100,
y:400,
vx:0,
vy:0
}

let players=[]

////////////////////////////////////////////////
// DRAW COURT
////////////////////////////////////////////////

function drawCourt(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#c68642"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="white"
ctx.lineWidth=4

ctx.beginPath()
ctx.arc(500,250,80,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.arc(500,60,240,0,Math.PI)
ctx.stroke()

}

////////////////////////////////////////////////
// DRAW PLAYERS
////////////////////////////////////////////////

function drawPlayers(){

players.forEach(p=>{

ctx.fillStyle=p.team=="LAL"?"purple":"blue"

ctx.beginPath()
ctx.arc(p.x,p.y,15,0,Math.PI*2)
ctx.fill()

})

}

////////////////////////////////////////////////
// DRAW BALL
////////////////////////////////////////////////

function drawBall(){

ctx.fillStyle="orange"

ctx.beginPath()
ctx.arc(ball.x,ball.y,8,0,Math.PI*2)
ctx.fill()

}

////////////////////////////////////////////////
// PHYSICS UPDATE
////////////////////////////////////////////////

function updateBall(){

ball.x+=ball.vx
ball.y+=ball.vy

ball.vy+=0.2

}

////////////////////////////////////////////////
// RENDER LOOP
////////////////////////////////////////////////

function render(){

drawCourt()
drawPlayers()
drawBall()

updateBall()

requestAnimationFrame(render)

}

render()

////////////////////////////////////////////////
// PLAYER SETUP
////////////////////////////////////////////////

function spawnPlayers(){

players=[]

teams.LAL.players.forEach((p,i)=>{

players.push({
name:p,
team:"LAL",
x:200,
y:150+70*i
})

})

teams.GSW.players.forEach((p,i)=>{

players.push({
name:p,
team:"GSW",
x:800,
y:150+70*i
})

})

}

spawnPlayers()

////////////////////////////////////////////////
// PLAY PARSER
////////////////////////////////////////////////

function parsePlay(text){

let player=null

Object.values(teams).forEach(t=>{
t.players.forEach(p=>{
if(text.includes(p)) player=p
})
})

let distance=text.match(/([0-9]+)ft/)
distance=distance?parseInt(distance[1]):10

let type="jumper"
if(text.includes("dunk")) type="dunk"
if(text.includes("layup")) type="layup"

let points=distance>=24?3:2

return{
player,
distance,
type,
points
}

}

////////////////////////////////////////////////
// SHOT ANIMATION
////////////////////////////////////////////////

function shootBall(player){

ball.x=player.x
ball.y=player.y

ball.vx=(500-ball.x)/30
ball.vy=-8

}

////////////////////////////////////////////////
// SCORE UPDATE
////////////////////////////////////////////////

function updateScore(team,points){

score[team]+=points

document.getElementById("scoreA").innerText=score.LAL
document.getElementById("scoreB").innerText=score.GSW

}

////////////////////////////////////////////////
// CROWD FLASH
////////////////////////////////////////////////

function flashCrowd(){

let f=document.getElementById("flash")

f.style.opacity=0.8

setTimeout(()=>{
f.style.opacity=0
},120)

}

////////////////////////////////////////////////
// SCORE EFFECT
////////////////////////////////////////////////

function scoreExplosion(points){

let e=document.createElement("div")

e.className="scoreEffect"
e.innerText="+"+points

e.style.left="450px"
e.style.top="200px"

document.getElementById("arena").appendChild(e)

setTimeout(()=>e.remove(),1000)

}

////////////////////////////////////////////////
// REPLAY SLOW MOTION
////////////////////////////////////////////////

function replay(){

let originalVX=ball.vx
let originalVY=ball.vy

ball.vx*=0.3
ball.vy*=0.3

setTimeout(()=>{
ball.vx=originalVX
ball.vy=originalVY
},1500)

}

////////////////////////////////////////////////
// PLAY LOG
////////////////////////////////////////////////

function log(text){

let log=document.getElementById("playlog")

log.innerHTML=text+"<br>"+log.innerHTML

}

////////////////////////////////////////////////
// PLAY SIMULATION
////////////////////////////////////////////////

function simulatePlay(){

let plays=[

"Stephen Curry 28ft 3PT jumper",
"LeBron James 4ft dunk",
"Anthony Davis 6ft layup",
"Klay Thompson 25ft 3PT jumper"

]

let play=plays[Math.floor(Math.random()*plays.length)]

let parsed=parsePlay(play)

let playerObj=players.find(p=>p.name==parsed.player)

shootBall(playerObj)

let team=teams.LAL.players.includes(parsed.player)?"LAL":"GSW"

setTimeout(()=>{

updateScore(team,parsed.points)

stats.players[parsed.player].pts+=parsed.points
stats.players[parsed.player].shots++

stats.teams[team].points+=parsed.points
stats.teams[team].shots++

if(parsed.points==3) stats.teams[team].threes++

if(parsed.type=="dunk") stats.teams[team].dunks++

scoreExplosion(parsed.points)

flashCrowd()

replay()

log(play)

},1200)

}

</script>

</body>
</html>
