<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>ULTRADASH // APEX MONOLITH</title>
    <style>
        :root {
            --glass: rgba(15, 20, 30, 0.45);
            --border: rgba(255, 255, 255, 0.12);
            --cyan: #00f3ff;
            --purple: #9d00ff;
            --green: #00ff88;
            --amber: #ffb700;
            --red: #ff3333;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --blur: blur(40px) saturate(180%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; user-select: none; }
        body { background: #020305; color: white; overflow: hidden; height: 100vh; position: relative; }

        /* --- AMBIENT PHYSICS --- */
        #particleCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0.5; }
        .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3; z-index: 0; animation: float 25s infinite alternate ease-in-out; }
        .orb-1 { width: 700px; height: 700px; background: #001f4d; top: -10%; left: -10%; }
        .orb-2 { width: 600px; height: 600px; background: #3d004d; bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(100px, 80px) scale(1.1); } }

        /* --- GRID STRUCTURE --- */
        .dash-layout { display: grid; grid-template-columns: 420px 1fr; gap: 25px; padding: 25px; height: 100vh; position: relative; z-index: 10; }
        
        .liquid-panel {
            background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border); border-top: 1px solid rgba(255,255,255,0.2);
            border-radius: 36px; box-shadow: 0 50px 100px rgba(0,0,0,0.7);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .panel-header { padding: 35px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.3); }
        .title { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; background: linear-gradient(90deg, #fff, var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .body { padding: 30px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 25px; }

        /* --- COMMAND CENTER --- */
        .glass-input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            color: #fff; padding: 22px; border-radius: 20px; outline: none; transition: 0.3s;
            font-size: 1.1rem; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        .glass-input:focus { border-color: var(--cyan); box-shadow: 0 0 25px rgba(0,243,255,0.15); }

        .btn-apex {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            border: 1px solid var(--border); color: #fff; padding: 22px;
            border-radius: 20px; font-weight: 900; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.3s;
        }
        .btn-apex:hover { background: var(--cyan); color: #000; box-shadow: 0 0 40px var(--cyan); transform: translateY(-3px); }

        /* --- THE 10 BUTTON SOUNDBOARD --- */
        .soundboard { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .sb-node {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--text-dim);
            padding: 18px 10px; border-radius: 16px; font-size: 0.75rem; font-weight: 800; cursor: pointer;
            transition: 0.3s; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .sb-node span { font-size: 1.4rem; }
        .sb-node:hover { background: rgba(0,243,255,0.1); color: var(--cyan); border-color: var(--cyan); }

        /* --- SPORTS MATRIX --- */
        .matrix-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 25px; }
        .game-card { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 28px; 
            padding: 28px; transition: 0.4s; cursor: pointer; position: relative;
        }
        .game-card:hover { transform: translateY(-8px); border-color: var(--cyan); background: rgba(255,255,255,0.05); }
        
        .league-badge { position: absolute; top: -12px; left: 25px; background: #fff; color: #000; padding: 5px 14px; border-radius: 10px; font-size: 0.75rem; font-weight: 900; }
        
        .team-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .team-info { display: flex; align-items: center; gap: 15px; }
        .logo-frame { width: 50px; height: 50px; background: #fff; border-radius: 50%; padding: 6px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .score-val { font-size: 2.5rem; font-weight: 900; transition: 0.3s; }
        
        .card-footer { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 15px; border-top: 1px dashed var(--border); font-size: 0.85rem; color: var(--cyan); font-weight: 800; }

        /* --- TERMINAL --- */
        #termLog { background: rgba(0,0,0,0.5); border-radius: 20px; padding: 25px; font-family: monospace; font-size: 0.8rem; height: 180px; overflow-y: auto; border: 1px solid var(--border); color: #888; }
        .t-cyan { color: var(--cyan); }
        
        /* --- SCORING ANIMATION --- */
        @keyframes flare { 0% { color: #fff; } 50% { color: var(--green); transform: scale(1.3); } 100% { color: #fff; } }
        .score-pop { animation: flare 1.5s ease-out; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <canvas id="particleCanvas"></canvas>

    <div class="dash-layout">
        <div class="liquid-panel">
            <div class="panel-header">
                <div class="title">Nexus Terminal</div>
                <div id="clock" style="color: var(--cyan); font-weight: 900; margin-top: 5px;">00:00:00.000</div>
            </div>
            <div class="body">
                <input type="text" id="cmdInput" class="glass-input" placeholder="Broadcasting transmission...">
                <button class="btn-apex" onclick="runRelay()">Execute Uplink</button>
                
                <div style="margin-top: 10px;">
                    <label style="font-size: 0.7rem; color: #666; font-weight: 900; letter-spacing: 2px;">OMNI-SOUNDBOARD</label>
                    <div class="soundboard">
                        <button class="sb-node" onclick="macro('Attention, it is now bedtime.')"><span>🌙</span> Bedtime</button>
                        <button class="sb-node" onclick="macro('Dinner is served. Come to the table.')"><span>🍕</span> Dinner</button>
                        <button class="sb-node" onclick="macro('Focus mode. Starting study session.')"><span>📚</span> Study</button>
                        <button class="sb-node" onclick="macro('Wake up, time for Berkeley class!')"><span>☀️</span> Wake Up</button>
                        <button class="sb-node" onclick="macro('Movie night starting. Lights down.')"><span>🎬</span> Movie</button>
                        <button class="sb-node" onclick="macro('Grandpa, do you need anything?')"><span>👴</span> Grandpa</button>
                        <button class="sb-node" onclick="macro('Security Alert: Someone is at the door.')"><span>🚨</span> Door Alert</button>
                        <button class="sb-node" onclick="macro('Big game is on! Go Seahawks!')"><span>🏈</span> Game Time</button>
                        <button class="sb-node" onclick="macro('Nexus system is rebooting now.')"><span>🔄</span> Reboot</button>
                        <button class="sb-node" onclick="macro('Chill mode activated.')"><span>🎵</span> Chill</button>
                    </div>
                </div>

                <div id="termLog">
                    <div>> APEX KERNEL LOADED.</div>
                    <div>> GOOGLE ROUTINE DETECTED.</div>
                </div>
            </div>
        </div>

        <div class="liquid-panel">
            <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center;">
                <div class="title">Strict Telemetry</div>
                <div style="font-size: 0.8rem; color: var(--green); font-weight: 900;">● OMNI-STREAM ACTIVE</div>
            </div>
            <div class="body">
                <div class="matrix-grid" id="matrix">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // 🔴 PASTE LINK HERE 🔴
        const TARGET = "https://pets-hdtv-enormous-objects.trycloudflare.com/endpoint/@scrypted/webhook/public/33/fe2475e0d68cf025/turnOn";
        let scores = {};

        function log(m, c="") {
            const l = document.getElementById('termLog');
            l.innerHTML += `<div class="${c}">> ${new Date().toLocaleTimeString()}: ${m}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        async function runRelay() {
            const val = document.getElementById('cmdInput').value;
            if(!val) return;
            log(`Filing: ${val}`, "t-cyan");
            
            try {
                // RAPID-FIRE BURST: Trigger twice to ensure Google hears it
                await fetch(TARGET, { method: 'GET', mode: 'no-cors' });
                setTimeout(() => fetch(TARGET, { method: 'GET', mode: 'no-cors' }), 400);
                log(`Success: Bridge Pulse Sent.`);
            } catch(e) { log(`Error: Connection Timed Out.`); }
            document.getElementById('cmdInput').value = "";
        }

        function macro(m) { document.getElementById('cmdInput').value = m; runRelay(); }

        const APIS = [
            { id: "NBA", url: "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard" },
            { id: "NCAA", url: "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard" },
            { id: "MLB", url: "https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard" },
            { id: "NHL", url: "https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/scoreboard" },
            { id: "SOC", url: "https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard" }
        ];

        async function updateMatrix() {
            let list = [];
            for (let api of APIS) {
                try {
                    let res = await fetch(api.url); let data = await res.json();
                    data.events.forEach(g => {
                        if(g.status.type.state === 'in') {
                            let c = g.competitions[0];
                            list.push({
                                id: g.id, l: api.id, clock: g.status.type.detail,
                                home: { n: c.competitors[0].team.shortDisplayName, s: c.competitors[0].score, i: c.competitors[0].team.logo, r: c.competitors[0].records[0].summary },
                                away: { n: c.competitors[1].team.shortDisplayName, s: c.competitors[1].score, i: c.competitors[1].team.logo, r: c.competitors[1].records[0].summary }
                            });
                        }
                    });
                } catch(e){}
            }
            render(list);
        }

        function render(data) {
            const m = document.getElementById('matrix');
            if(data.length === 0) { m.innerHTML = "<div style='color:#444'>NO LIVE TRANSMISSIONS.</div>"; return; }
            m.innerHTML = data.map(g => `
                <div class="game-card">
                    <div class="league-badge">${g.l}</div>
                    <div class="team-row">
                        <div class="team-info"><img src="${g.away.i}" class="logo-frame"><strong>${g.away.n}</strong></div>
                        <div class="score-val" id="s_${g.id}_a">${g.away.s}</div>
                    </div>
                    <div class="team-row">
                        <div class="team-info"><img src="${g.home.i}" class="logo-frame"><strong>${g.home.n}</strong></div>
                        <div class="score-val" id="s_${g.id}_h">${g.home.s}</div>
                    </div>
                    <div class="card-footer"><span>${g.away.r} vs ${g.home.r}</span><span>${g.clock}</span></div>
                </div>
            `).join('');
            
            data.forEach(g => {
                if(scores[`${g.id}_a`] && scores[`${g.id}_a`] < g.away.s) pop(`s_${g.id}_a`);
                if(scores[`${g.id}_h`] && scores[`${g.id}_h`] < g.home.s) pop(`s_${g.id}_h`);
                scores[`${g.id}_a`] = g.away.s; scores[`${g.id}_h`] = g.home.s;
            });
        }

        function pop(id) { const el = document.getElementById(id); el.classList.add('score-pop'); setTimeout(() => el.classList.remove('score-pop'), 1500); }

        // Particle Logic
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let pts = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<100; i++) pts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, vx: Math.random()*1-0.5, vy: Math.random()*1-0.5 });
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(0, 243, 255, 0.4)";
            pts.forEach(p => { p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>canvas.width) p.vx*=-1; if(p.y<0||p.y>canvas.height) p.vy*=-1; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(draw);
        }
        init(); draw();
        
        setInterval(() => {
            const d = new Date(); document.getElementById('clock').innerText = d.toLocaleTimeString('en-US', {hour12:false}) + "." + d.getMilliseconds();
        }, 50);
        
        updateMatrix(); setInterval(updateMatrix, 15000);
    </script>
</body>
</html>
