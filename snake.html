<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS APEX BROADCAST ENGINE</title>

<style>

:root{
--glass:rgba(5,8,15,0.88);
--border:rgba(255,255,255,0.2);
--cyan:#00f3ff;
--gold:#ffcf40;
--magenta:#ff007f;
--green:#00ff88;
--red:#ff3333;
--blur:blur(80px) saturate(250%);
--font-mono:'JetBrains Mono',monospace;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'SF Pro Display',sans-serif;
}

body{
background:#000;
color:#fff;
overflow:hidden;
height:100vh;
}

#arenaStage{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
display:none;
z-index:10000;
background:radial-gradient(circle,#00000088,#000);
backdrop-filter:blur(40px);
}

#arenaCanvas{
width:100%;
height:100%;
}

#particleCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
opacity:.6;
pointer-events:none;
}

.nexus-header{
position:fixed;
top:0;
left:0;
width:100%;
height:100px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 60px;
background:#0008;
backdrop-filter:blur(40px);
border-bottom:2px solid var(--border);
z-index:1000;
}

.header-brand{
font-size:2.2rem;
font-weight:950;
letter-spacing:-3px;
}

.sys-clock{
font-family:var(--font-mono);
color:var(--cyan);
}

.master-layout{
display:grid;
grid-template-columns:480px 1fr;
gap:40px;
padding:140px 40px 40px 40px;
height:100vh;
z-index:10;
position:relative;
}

.panel{
background:var(--glass);
border:1px solid var(--border);
border-radius:56px;
backdrop-filter:var(--blur);
box-shadow:0 80px 160px rgba(0,0,0,1);
display:flex;
flex-direction:column;
overflow:hidden;
}

.panel-head{
padding:40px;
border-bottom:2px solid var(--border);
}

.panel-body{
padding:40px;
overflow:auto;
flex-grow:1;
display:flex;
flex-direction:column;
gap:40px;
}

.matrix{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(420px,1fr));
gap:40px;
}

.card{
background:#ffffff08;
border:2px solid var(--border);
border-radius:48px;
padding:40px;
transition:.4s;
}

.card:hover{
border-color:var(--cyan);
transform:translateY(-10px);
}

.score-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.val-large{
font-size:3.6rem;
font-weight:900;
font-family:var(--font-mono);
}

.clock{
font-family:var(--font-mono);
color:var(--cyan);
}

.play{
font-size:.85rem;
color:#888;
max-width:60%;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

</style>
</head>

<body>

<div id="arenaStage">
<canvas id="arenaCanvas"></canvas>
</div>

<header class="nexus-header">
<div class="header-brand">NEXUS APEX</div>
<div id="sysClock" class="sys-clock"></div>
</header>

<div class="master-layout">

<div class="panel">

<div class="panel-head">
Command Terminal
</div>

<div class="panel-body">
<div id="termLog"></div>
</div>

</div>

<div class="panel">

<div class="panel-head">
Arena Telemetry
</div>

<div class="panel-body">

<div id="matrix" class="matrix"></div>

</div>

</div>

</div>

<script>

/* ===============================
DATA SOURCES
=============================== */

const SOURCES=[

{ id:"NBA",
url:"https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard"},

{ id:"NCAA",
url:"https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard"}

]

let scoreVault={}

/* ===============================
SHOT PARSING ENGINE
=============================== */

function parseShotDistance(play){

let match=play.match(/(\d+)[-\s]?foot/i)

if(match) return parseInt(match[1])

if(play.includes("three")) return 24

return 10

}

function detectShotType(play){

play=play.toLowerCase()

if(play.includes("dunk")||play.includes("slam"))
return "dunk"

if(play.includes("layup"))
return "layup"

if(play.includes("three"))
return "three"

return "jumper"

}

/* ===============================
DATA POLLING
=============================== */

async function pollTelemetry(){

let events=[]

for(let src of SOURCES){

try{

let r=await fetch(src.url)
let j=await r.json()

j.events.forEach(g=>{

if(g.status.type.state==="in"){

let c=g.competitions[0]

events.push({

id:g.id,
league:src.id,
clock:g.status.displayClock,
play:c.situation?.lastPlay?.text||"",
athleteId:c.situation?.lastPlay?.athletes?.[0]?.id||null,

h:{
name:c.competitors[0].team.shortDisplayName,
score:+c.competitors[0].score,
logo:c.competitors[0].team.logo
},

a:{
name:c.competitors[1].team.shortDisplayName,
score:+c.competitors[1].score,
logo:c.competitors[1].team.logo
}

})

}

})

}catch(e){}

}

renderMatrix(events)

}

setInterval(pollTelemetry,15000)
pollTelemetry()

/* ===============================
UI RENDER
=============================== */

function renderMatrix(games){

const m=document.getElementById("matrix")

m.innerHTML=games.map(g=>`

<div class="card">

<div class="score-row">
${g.a.name}
<div class="val-large">${g.a.score}</div>
</div>

<div class="score-row">
${g.h.name}
<div class="val-large">${g.h.score}</div>
</div>

<div class="score-row">
<div class="clock">${g.clock}</div>
<div class="play">${g.play}</div>
</div>

</div>

`).join("")

games.forEach(g=>{

if(scoreVault[g.id+"a"]!=null && g.a.score>scoreVault[g.id+"a"])
startArenaAnimation(g)

if(scoreVault[g.id+"h"]!=null && g.h.score>scoreVault[g.id+"h"])
startArenaAnimation(g)

scoreVault[g.id+"a"]=g.a.score
scoreVault[g.id+"h"]=g.h.score

})

}

/* ===============================
ASSETS
=============================== */

const arenaCanvas=document.getElementById("arenaCanvas")
const ctx=arenaCanvas.getContext("2d")

const assets={
court:new Image(),
rim:new Image(),
ball:new Image()
}

assets.court.src="https://i.imgur.com/8Q2Wq4U.jpeg"
assets.rim.src="https://i.imgur.com/vUoO8gV.png"
assets.ball.src="https://i.imgur.com/vHqC6M7.png"

async function loadPlayer(id){

return new Promise(res=>{

let img=new Image()

img.src=id?
`https://a.espncdn.com/i/headshots/nba/players/full/${id}.png`
:
"https://a.espncdn.com/i/teamlogos/default-team-logo-500.png"

img.onload=()=>res(img)

})

}

/* ===============================
ARENA FX ENGINE
=============================== */

let particles=[]

function spawnExplosion(x,y){

for(let i=0;i<120;i++){

particles.push({

x:x,
y:y,
vx:(Math.random()-.5)*14,
vy:(Math.random()-.5)*14,
life:100

})

}

}

function updateParticles(){

particles.forEach(p=>{

p.x+=p.vx
p.y+=p.vy
p.life--

ctx.beginPath()
ctx.arc(p.x,p.y,3,0,Math.PI*2)
ctx.fillStyle="#ffcf40"
ctx.fill()

})

particles=particles.filter(p=>p.life>0)

}

/* ===============================
MAIN ARENA ANIMATION
=============================== */

async function startArenaAnimation(game){

const stage=document.getElementById("arenaStage")
stage.style.display="block"

arenaCanvas.width=innerWidth
arenaCanvas.height=innerHeight

const player=await loadPlayer(game.athleteId)

let play=game.play
let shotType=detectShotType(play)
let dist=parseShotDistance(play)

let hoopX=arenaCanvas.width*.85
let hoopY=arenaCanvas.height*.35

let playerX=arenaCanvas.width*.2
let playerY=arenaCanvas.height*.75

let frame=0

let ball={
x:playerX+120,
y:playerY-100,
vx:(hoopX-playerX)/(90+dist),
vy:-20-(dist/5),
rot:0
}

function animate(){

ctx.clearRect(0,0,arenaCanvas.width,arenaCanvas.height)

ctx.drawImage(assets.court,
0,
arenaCanvas.height*.75,
arenaCanvas.width,
arenaCanvas.height*.25)

ctx.drawImage(assets.rim,hoopX-160,hoopY-80,200,320)

ctx.drawImage(player,playerX,playerY-260,280,280)

if(frame>30){

ball.x+=ball.vx
ball.y+=ball.vy
ball.vy+=0.8
ball.rot+=0.2

ctx.save()

ctx.translate(ball.x,ball.y)
ctx.rotate(ball.rot)

ctx.drawImage(assets.ball,-30,-30,60,60)

ctx.restore()

}

if(frame===80){

spawnExplosion(hoopX,hoopY)

}

updateParticles()

frame++

if(frame<200){

requestAnimationFrame(animate)

}else{

stage.style.display="none"

}

}

animate()

}

/* ===============================
SYSTEM CLOCK
=============================== */

setInterval(()=>{

let d=new Date()

document.getElementById("sysClock").innerText=
d.toLocaleTimeString('en-US',{hour12:false})

},40)

</script>

</body>
</html>
