<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTRADASH // APEX NEXUS v16</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --glass-bg: rgba(12, 15, 22, 0.7);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-shadow: 0 15px 35px rgba(0,0,0,0.5);
  --text-primary: #ffffff;
  --text-secondary: #8b9bb4;
  --accent-cyan: #00e5ff;
  --accent-magenta: #ff0055;
  --accent-green: #00ff88;
  --accent-gold: #ffaa00;
  --tr-fast: all 0.2s ease;
  --tr-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Rajdhani', sans-serif; user-select:none; }
body, html { width:100vw; height:100vh; overflow:hidden; background:#05070a; color:var(--text-primary); }

/* AMBIENT BACKGROUND */
.ambient-bg { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
.ambient-glow { position:absolute; border-radius:50%; filter:blur(120px); opacity:0.3; }
.glow-1 { width:800px; height:800px; background:#002255; top:-20%; left:-10%; }
.glow-2 { width:600px; height:600px; background:#440022; bottom:-20%; right:-10%; }
.grid-overlay { position:absolute; inset:0; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.5; }

/* MAIN LAYOUT */
.app-container { position:relative; z-index:10; display:flex; flex-direction:column; height:100vh; padding:20px; gap:20px; }

/* TOP NAVIGATION / HEADER */
.top-nav { display:flex; justify-content:space-between; align-items:center; background:var(--glass-bg); backdrop-filter:blur(20px); border:1px solid var(--glass-border); border-radius:16px; padding:12px 24px; box-shadow:var(--glass-shadow); flex-shrink:0; }
.nav-brand { display:flex; align-items:center; gap:12px; }
.brand-title { font-family:'Bebas Neue', sans-serif; font-size:2rem; letter-spacing:4px; line-height:1; background:linear-gradient(90deg, #fff, #888); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.brand-status { display:flex; align-items:center; gap:8px; background:rgba(0, 255, 136, 0.1); border:1px solid rgba(0, 255, 136, 0.2); padding:4px 12px; border-radius:20px; }
.status-dot { width:8px; height:8px; background:var(--accent-green); border-radius:50%; animation:pulseLive 1.5s infinite alternate; }
@keyframes pulseLive { from { opacity:0.4; box-shadow:0 0 0 var(--accent-green); } to { opacity:1; box-shadow:0 0 10px var(--accent-green); } }
.status-text { font-family:'Space Mono', monospace; font-size:0.7rem; font-weight:700; color:var(--accent-green); letter-spacing:1px; }

.sport-tabs { display:flex; gap:8px; background:rgba(0,0,0,0.4); padding:6px; border-radius:12px; border:1px solid rgba(255,255,255,0.05); }
.sport-tab { padding:8px 20px; border-radius:8px; font-family:'Space Mono', monospace; font-size:0.75rem; font-weight:700; letter-spacing:2px; color:var(--text-secondary); cursor:pointer; transition:var(--tr-fast); }
.sport-tab:hover { color:#fff; background:rgba(255,255,255,0.05); }
.sport-tab.active { color:var(--accent-cyan); background:rgba(0, 229, 255, 0.1); box-shadow:inset 0 0 0 1px var(--accent-cyan); }

.nav-metrics { display:flex; gap:16px; }
.metric-box { text-align:right; }
.metric-label { font-family:'Space Mono', monospace; font-size:0.55rem; color:var(--text-secondary); letter-spacing:2px; margin-bottom:2px; }
.metric-value { font-family:'Bebas Neue', sans-serif; font-size:1.4rem; line-height:1; color:#fff; }
.metric-value.cyan { color:var(--accent-cyan); }
.metric-value.magenta { color:var(--accent-magenta); }

/* MAIN CONTENT AREA */
.content-area { display:flex; flex:1; gap:20px; overflow:hidden; }

/* SIDEBAR (TERMINAL/LOGS) */
.sidebar { width:300px; display:flex; flex-direction:column; gap:20px; flex-shrink:0; }
.panel { background:var(--glass-bg); backdrop-filter:blur(20px); border:1px solid var(--glass-border); border-radius:16px; box-shadow:var(--glass-shadow); padding:20px; display:flex; flex-direction:column; }
.panel-header { font-family:'Space Mono', monospace; font-size:0.7rem; color:var(--accent-cyan); letter-spacing:2px; margin-bottom:12px; display:flex; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:8px; }

.terminal { flex:1; overflow-y:auto; font-family:'Space Mono', monospace; font-size:0.65rem; line-height:1.5; padding-right:8px; }
.terminal::-webkit-scrollbar { width:4px; }
.terminal::-webkit-scrollbar-track { background:transparent; }
.terminal::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:4px; }
.log-entry { margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.03); }
.log-time { color:var(--text-secondary); margin-right:8px; }
.log-sys { color:rgba(255,255,255,0.7); }
.log-scs { color:var(--accent-green); }
.log-upd { color:var(--accent-gold); }

/* GAMES GRID */
.games-container { flex:1; background:var(--glass-bg); backdrop-filter:blur(20px); border:1px solid var(--glass-border); border-radius:16px; padding:20px; overflow-y:auto; position:relative; }
.games-container::-webkit-scrollbar { width:6px; }
.games-container::-webkit-scrollbar-track { background:transparent; }
.games-container::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:4px; }
.games-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:20px; }

.empty-state { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Space Mono', monospace; font-size:0.9rem; color:var(--text-secondary); letter-spacing:2px; text-transform:uppercase; }

/* ENHANCED GAME CARD */
.game-card { background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.06); border-radius:14px; padding:16px; transition:var(--tr-smooth); position:relative; overflow:hidden; display:flex; flex-direction:column; gap:12px; cursor:pointer; }
.game-card:hover { transform:translateY(-4px); background:rgba(255,255,255,0.03); border-color:rgba(255,255,255,0.15); box-shadow:0 15px 30px rgba(0,0,0,0.6); }

/* Card Header */
.gc-header { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:10px; }
.gc-league { font-family:'Bebas Neue', sans-serif; font-size:1.1rem; letter-spacing:2px; padding:2px 8px; border-radius:4px; line-height:1.2; }
.league-NBA { background:rgba(23,64,139,0.2); color:#4a90d9; border:1px solid rgba(74,144,217,0.3); }
.league-NCAA { background:rgba(0,48,135,0.2); color:#6090ee; border:1px solid rgba(96,144,238,0.3); }
.league-MLB { background:rgba(200,16,46,0.2); color:#e84060; border:1px solid rgba(232,64,96,0.3); }
.league-SOCCER { background:rgba(0,77,44,0.2); color:#00cc77; border:1px solid rgba(0,204,119,0.3); }

.gc-clock { font-family:'Space Mono', monospace; font-size:0.75rem; font-weight:700; color:var(--text-secondary); background:rgba(255,255,255,0.05); padding:4px 10px; border-radius:6px; display:flex; align-items:center; gap:6px; }
.gc-clock.live-pulse { color:var(--accent-green); background:rgba(0,255,136,0.08); border:1px solid rgba(0,255,136,0.2); }
.clock-dot { width:6px; height:6px; background:currentColor; border-radius:50%; animation:pulseLive 1s infinite alternate; }

/* Competitor Rows */
.team-row { display:flex; align-items:center; justify-content:space-between; }
.team-info { display:flex; align-items:center; gap:12px; flex:1; }
.team-logo-wrap { width:48px; height:48px; background:rgba(255,255,255,0.9); border-radius:50%; display:flex; justify-content:center; align-items:center; box-shadow:0 4px 10px rgba(0,0,0,0.5); border:2px solid rgba(255,255,255,0.1); padding:4px; }
.team-logo { width:100%; height:100%; object-fit:contain; }
.team-details { display:flex; flex-direction:column; }
.team-name { font-family:'Bebas Neue', sans-serif; font-size:1.6rem; letter-spacing:1px; line-height:1; color:#fff; }
.team-record { font-family:'Space Mono', monospace; font-size:0.65rem; color:var(--text-secondary); margin-top:2px; }

/* Score Styling */
.score-box { font-family:'Bebas Neue', sans-serif; font-size:3rem; line-height:1; min-width:70px; text-align:right; color:rgba(255,255,255,0.5); transition:var(--tr-smooth); }
.score-box.leading { color:#fff; }
.score-box.flash { color:var(--accent-cyan); text-shadow:0 0 20px rgba(0,229,255,0.6); transform:scale(1.1); }

/* Momentum Bar */
.momentum-container { margin-top:4px; }
.momentum-labels { display:flex; justify-content:space-between; font-family:'Space Mono', monospace; font-size:0.55rem; color:var(--text-secondary); margin-bottom:4px; text-transform:uppercase; }
.momentum-track { height:4px; background:rgba(0,0,0,0.6); border-radius:4px; display:flex; overflow:hidden; }
.mom-away { background:var(--accent-cyan); transition:width 0.5s ease; }
.mom-home { background:var(--accent-magenta); transition:width 0.5s ease; }

/* Linescores */
.linescore-table { width:100%; border-collapse:collapse; margin-top:8px; border-top:1px dashed rgba(255,255,255,0.08); padding-top:8px; }
.linescore-table th, .linescore-table td { font-family:'Space Mono', monospace; font-size:0.6rem; text-align:center; padding:3px 2px; color:var(--text-secondary); }
.linescore-table th { border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:4px; }
.linescore-table td { font-weight:700; color:rgba(255,255,255,0.8); }
.linescore-table .ls-team { text-align:left; font-family:'Bebas Neue', sans-serif; font-size:0.9rem; letter-spacing:1px; color:var(--text-secondary); }
.linescore-table .ls-total { color:var(--accent-gold); font-size:0.8rem; }

/* MODAL OVERLAY */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); z-index:9999; display:flex; justify-content:center; align-items:center; opacity:0; pointer-events:none; transition:var(--tr-smooth); }
.modal-overlay.active { opacity:1; pointer-events:all; }
.modal-content { background:rgba(10,13,20,0.95); border:1px solid rgba(255,255,255,0.1); border-radius:20px; width:90vw; max-width:800px; max-height:85vh; display:flex; flex-direction:column; box-shadow:0 30px 60px rgba(0,0,0,0.8); transform:translateY(30px) scale(0.95); transition:var(--tr-smooth); overflow:hidden; }
.modal-overlay.active .modal-content { transform:translateY(0) scale(1); }

.modal-header { padding:20px 30px; border-bottom:1px solid rgba(255,255,255,0.08); display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.3); }
.modal-title-area { display:flex; align-items:center; gap:16px; }
.modal-close { background:rgba(255,255,255,0.05); border:none; color:#fff; width:36px; height:36px; border-radius:50%; font-size:1.2rem; cursor:pointer; transition:var(--tr-fast); display:flex; justify-content:center; align-items:center; }
.modal-close:hover { background:var(--accent-magenta); }

.modal-matchup { display:flex; justify-content:space-between; align-items:center; padding:30px; background:linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%); }
.modal-team { display:flex; flex-direction:column; align-items:center; gap:12px; width:35%; }
.m-logo-wrap { width:100px; height:100px; background:rgba(255,255,255,0.9); border-radius:50%; display:flex; justify-content:center; align-items:center; padding:10px; box-shadow:0 10px 25px rgba(0,0,0,0.5); }
.m-logo-wrap img { width:100%; height:100%; object-fit:contain; }
.m-team-name { font-family:'Bebas Neue', sans-serif; font-size:2.5rem; letter-spacing:2px; text-align:center; line-height:1; }

.modal-center { display:flex; flex-direction:column; align-items:center; gap:8px; }
.m-score-line { display:flex; align-items:center; gap:16px; font-family:'Bebas Neue', sans-serif; font-size:5rem; line-height:1; }
.m-score-away { color:var(--accent-cyan); }
.m-score-home { color:var(--accent-magenta); }
.m-divider { color:rgba(255,255,255,0.2); font-size:3rem; }
.m-clock { font-family:'Space Mono', monospace; font-size:1rem; color:var(--accent-green); background:rgba(0,255,136,0.1); border:1px solid rgba(0,255,136,0.3); padding:6px 16px; border-radius:8px; }

.modal-tabs-container { display:flex; border-bottom:1px solid rgba(255,255,255,0.08); background:rgba(0,0,0,0.2); }
.m-tab { flex:1; text-align:center; padding:16px 0; font-family:'Space Mono', monospace; font-size:0.8rem; letter-spacing:2px; color:var(--text-secondary); cursor:pointer; border-bottom:2px solid transparent; transition:var(--tr-fast); }
.m-tab:hover { background:rgba(255,255,255,0.02); color:#fff; }
.m-tab.active { color:var(--accent-cyan); border-bottom-color:var(--accent-cyan); background:rgba(0,229,255,0.05); }

.modal-body { flex:1; overflow-y:auto; padding:0; min-height:300px; }
.modal-body::-webkit-scrollbar { width:6px; }
.modal-body::-webkit-scrollbar-track { background:transparent; }
.modal-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:4px; }

/* Box Score Table */
.box-score-wrap { padding:20px 30px; }
.team-table-title { font-family:'Bebas Neue', sans-serif; font-size:1.4rem; letter-spacing:2px; color:var(--accent-cyan); margin-bottom:12px; border-bottom:1px solid rgba(0,229,255,0.3); padding-bottom:4px; display:inline-block;}
.stat-table { width:100%; border-collapse:collapse; margin-bottom:30px; }
.stat-table th { font-family:'Space Mono', monospace; font-size:0.65rem; color:var(--text-secondary); text-align:right; padding:8px; border-bottom:1px solid rgba(255,255,255,0.05); }
.stat-table th:first-child { text-align:left; }
.stat-table td { font-family:'Space Mono', monospace; font-size:0.8rem; text-align:right; padding:10px 8px; border-bottom:1px solid rgba(255,255,255,0.03); color:rgba(255,255,255,0.9); }
.stat-table td:first-child { text-align:left; font-weight:700; color:#fff; display:flex; align-items:center; gap:10px; }
.stat-table tr:hover td { background:rgba(255,255,255,0.02); }
.player-img { width:32px; height:32px; border-radius:50%; object-fit:cover; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.1); }

/* Play by Play */
.pbp-wrap { padding:0; }
.pbp-row { display:flex; padding:16px 30px; border-bottom:1px solid rgba(255,255,255,0.03); gap:20px; align-items:center; }
.pbp-row:hover { background:rgba(255,255,255,0.02); }
.pbp-time { font-family:'Space Mono', monospace; font-size:0.8rem; color:var(--text-secondary); min-width:60px; }
.pbp-desc { font-family:'Rajdhani', sans-serif; font-size:1.1rem; flex:1; color:rgba(255,255,255,0.8); line-height:1.4; }
.pbp-desc.scoring { color:var(--accent-gold); font-weight:600; }
.pbp-score { font-family:'Bebas Neue', sans-serif; font-size:1.6rem; color:#fff; min-width:70px; text-align:right; letter-spacing:1px; }

.loading-data { padding:40px; text-align:center; font-family:'Space Mono', monospace; font-size:0.9rem; color:var(--text-secondary); letter-spacing:2px; }

</style>
</head>
<body>

<div class="ambient-bg">
  <div class="ambient-glow glow-1"></div>
  <div class="ambient-glow glow-2"></div>
  <div class="grid-overlay"></div>
</div>

<div class="app-container">
  <header class="top-nav">
    <div class="nav-brand">
      <div class="brand-title">NEXUS // SPORTS</div>
      <div class="brand-status">
        <div class="status-dot"></div>
        <span class="status-text" id="globalStatus">SYNCING</span>
      </div>
    </div>
    
    <div class="sport-tabs">
      <div class="sport-tab active" onclick="setFilter('ALL', this)">ALL</div>
      <div class="sport-tab" onclick="setFilter('NBA', this)">NBA</div>
      <div class="sport-tab" onclick="setFilter('NCAA', this)">NCAA</div>
      <div class="sport-tab" onclick="setFilter('MLB', this)">MLB</div>
      <div class="sport-tab" onclick="setFilter('SOCCER', this)">SOCCER</div>
    </div>

    <div class="nav-metrics">
      <div class="metric-box">
        <div class="metric-label">ACTIVE GAMES</div>
        <div class="metric-value cyan" id="metGames">0</div>
      </div>
      <div class="metric-box">
        <div class="metric-label">TOTAL PTS</div>
        <div class="metric-value magenta" id="metPts">0</div>
      </div>
      <div class="metric-box">
        <div class="metric-label">LAST UPDATE</div>
        <div class="metric-value" id="metTime" style="font-family:'Space Mono'; font-size:1rem; margin-top:4px;">--:--</div>
      </div>
    </div>
  </header>

  <main class="content-area">
    <aside class="sidebar">
      <div class="panel" style="flex:1;">
        <div class="panel-header">
          <span>SYSTEM LOG</span>
          <span>v16.0</span>
        </div>
        <div class="terminal" id="sysLog">
          <div class="log-entry"><span class="log-time">[INIT]</span><span class="log-sys"> NEXUS Core Online. Establishing telemetry links...</span></div>
        </div>
      </div>
    </aside>

    <section class="games-container" id="gamesWrapper">
      <div class="games-grid" id="gamesGrid">
        <div class="empty-state">INITIALIZING SENSORS...</div>
      </div>
    </section>
  </main>
</div>

<div class="modal-overlay" id="gameModal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title-area">
        <span class="gc-league" id="mLeague">NBA</span>
        <span style="font-family:'Space Mono'; font-size:0.8rem; color:var(--text-secondary); letter-spacing:1px;" id="mVenue">VENUE</span>
      </div>
      <button class="modal-close" onclick="forceCloseModal()">✕</button>
    </div>
    
    <div class="modal-matchup">
      <div class="modal-team">
        <div class="m-logo-wrap"><img id="mAwayLogo" src="" alt=""></div>
        <div class="m-team-name" id="mAwayName">AWAY</div>
        <div style="font-family:'Space Mono'; font-size:0.8rem; color:var(--text-secondary);" id="mAwayRec">0-0</div>
      </div>
      
      <div class="modal-center">
        <div class="m-clock" id="mClock">Q1 12:00</div>
        <div class="m-score-line">
          <span class="m-score-away" id="mAwayScore">0</span>
          <span class="m-divider">-</span>
          <span class="m-score-home" id="mHomeScore">0</span>
        </div>
      </div>
      
      <div class="modal-team">
        <div class="m-logo-wrap"><img id="mHomeLogo" src="" alt=""></div>
        <div class="m-team-name" id="mHomeName">HOME</div>
        <div style="font-family:'Space Mono'; font-size:0.8rem; color:var(--text-secondary);" id="mHomeRec">0-0</div>
      </div>
    </div>
    
    <div class="modal-tabs-container">
      <div class="m-tab active" onclick="switchModalTab('box', this)">BOX SCORE</div>
      <div class="m-tab" onclick="switchModalTab('pbp', this)">PLAY-BY-PLAY</div>
    </div>
    
    <div class="modal-body" id="mBody">
      <div class="loading-data">LOADING TELEMETRY...</div>
    </div>
  </div>
</div>

<script>
// =============================================================================
// NEXUS SPORTS ENGINE v16 - PURE DATA, NO ANIMATION JANK
// =============================================================================

const API_NODES = [
  {id:"NBA",  sport:"Basketball",        url:"https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard",                 sumUrl:"https://site.api.espn.com/apis/site/v2/sports/basketball/nba/summary?event="},
  {id:"NCAA", sport:"College Basketball",url:"https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard", sumUrl:"https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/summary?event="},
  {id:"MLB",  sport:"Baseball",          url:"https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard",                   sumUrl:"https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/summary?event="},
  {id:"SOCCER",sport:"EPL Football",     url:"https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard",                   sumUrl:"https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/summary?event="}
];

const STATE = {
  filter: 'ALL',
  games: {},      // Store raw game objects by UID
  scores: {},     // Track previous scores to detect changes
  modalUID: null,
  modalTab: 'box',
  playerStats: {},
  pbp: {}
};

// =============================================================================
// UTILS
// =============================================================================
function log(msg, type="log-sys") {
  const t = document.getElementById('sysLog');
  const d = new Date().toLocaleTimeString('en-US', {hour12:false});
  const e = document.createElement('div'); e.className = 'log-entry';
  e.innerHTML = `<span class="log-time">[${d}]</span><span class="${type}"> ${msg}</span>`;
  t.prepend(e);
  if(t.children.length > 50) t.removeChild(t.lastChild);
}

// =============================================================================
// DATA INGESTION
// =============================================================================
async function fetchAll() {
  document.getElementById('globalStatus').innerText = "SYNCING";
  let totalLive = 0;
  let totalPoints = 0;
  let currentGamesList = [];

  for (const node of API_NODES) {
    try {
      const res = await fetch(node.url);
      const json = await res.json();
      if (json.events) {
        json.events.forEach(raw => {
          // Only process live games (state === 'in')
          if (raw.status.type.state === 'in') {
            const parsed = parseGame(raw, node);
            STATE.games[parsed.uid] = parsed;
            currentGamesList.push(parsed);
            totalLive++;
            totalPoints += (parsed.away.score + parsed.home.score);
          }
        });
      }
    } catch(e) {
      log(`ERR: ${node.id} Fetch Failed`, "log-sys");
    }
  }

  // Update Metrics
  document.getElementById('metGames').innerText = totalLive;
  document.getElementById('metPts').innerText = totalPoints;
  const now = new Date();
  document.getElementById('metTime').innerText = now.toLocaleTimeString('en-US', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
  document.getElementById('globalStatus').innerText = "LIVE";

  renderGrid(currentGamesList);
  
  // If modal is open, fetch deep stats for that specific game
  if (STATE.modalUID && STATE.games[STATE.modalUID]) {
    fetchGameStats(STATE.games[STATE.modalUID]);
    updateModalHeader(STATE.games[STATE.modalUID]);
  }
}

function parseGame(raw, node) {
  const comp = raw.competitions[0];
  const t1 = comp.competitors[0]; // Usually home, but ESPN ordering varies. Check homeAway
  const t2 = comp.competitors[1];
  
  let homeRaw = t1.homeAway === 'home' ? t1 : t2;
  let awayRaw = t1.homeAway === 'away' ? t1 : t2;

  const extractT = (t) => ({
    id: t.team.id,
    name: t.team.shortDisplayName || t.team.name,
    score: parseInt(t.score) || 0,
    logo: t.team.logo || "https://a.espncdn.com/i/teamlogos/default-team-logo-500.png",
    record: t.records && t.records.length ? t.records[0].summary : "-",
    linescores: (t.linescores || []).map(l => l.value)
  });

  return {
    uid: `${node.id}_${raw.id}`,
    espnId: raw.id,
    league: node.id,
    clock: raw.status.type.detail || "LIVE",
    home: extractT(homeRaw),
    away: extractT(awayRaw),
    venue: comp.venue ? comp.venue.fullName : "Unknown Venue",
    node: node
  };
}

// =============================================================================
// UI RENDERING - GRID
// =============================================================================
function setFilter(league, el) {
  STATE.filter = league;
  document.querySelectorAll('.sport-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  // Re-render immediately from cached state
  const currentLive = Object.values(STATE.games);
  renderGrid(currentLive);
}

function renderGrid(liveGames) {
  const grid = document.getElementById('gamesGrid');
  const filtered = STATE.filter === 'ALL' ? liveGames : liveGames.filter(g => g.league === STATE.filter);

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">NO LIVE ${STATE.filter !== 'ALL' ? STATE.filter : ''} GAMES DETECTED</div>`;
    return;
  }

  // Remove stale cards
  const uids = filtered.map(g => g.uid);
  Array.from(grid.children).forEach(child => {
    if (child.id && !uids.includes(child.id)) child.remove();
  });
  
  const empty = grid.querySelector('.empty-state');
  if (empty) empty.remove();

  // Add/Update cards
  filtered.forEach(game => {
    let card = document.getElementById(game.uid);
    if (!card) {
      card = document.createElement('div');
      card.className = 'game-card';
      card.id = game.uid;
      card.onclick = () => openModal(game.uid);
      card.innerHTML = buildCardHTML(game);
      grid.appendChild(card);
      // Init memory
      STATE.scores[`${game.uid}_away`] = game.away.score;
      STATE.scores[`${game.uid}_home`] = game.home.score;
    } else {
      updateCardDOM(card, game);
    }
  });
}

function buildCardHTML(g) {
  const lsH = buildLinescoreHTML(g);
  return `
    <div class="gc-header">
      <span class="gc-league league-${g.league}">${g.league}</span>
      <span class="gc-clock live-pulse" id="clk_${g.uid}"><div class="clock-dot"></div>${g.clock}</span>
    </div>
    
    <div class="team-row">
      <div class="team-info">
        <div class="team-logo-wrap"><img class="team-logo" src="${g.away.logo}" onerror="this.src='https://a.espncdn.com/i/teamlogos/default-team-logo-500.png'"></div>
        <div class="team-details"><div class="team-name">${g.away.name}</div><div class="team-record">${g.away.record}</div></div>
      </div>
      <div class="score-box ${g.away.score > g.home.score ? 'leading' : ''}" id="scr_a_${g.uid}">${g.away.score}</div>
    </div>

    <div class="team-row">
      <div class="team-info">
        <div class="team-logo-wrap"><img class="team-logo" src="${g.home.logo}" onerror="this.src='https://a.espncdn.com/i/teamlogos/default-team-logo-500.png'"></div>
        <div class="team-details"><div class="team-name">${g.home.name}</div><div class="team-record">${g.home.record}</div></div>
      </div>
      <div class="score-box ${g.home.score > g.away.score ? 'leading' : ''}" id="scr_h_${g.uid}">${g.home.score}</div>
    </div>
    
    <div class="momentum-container">
      <div class="momentum-track">
        <div class="mom-away" id="mom_a_${g.uid}" style="width:50%"></div>
        <div class="mom-home" id="mom_h_${g.uid}" style="width:50%"></div>
      </div>
    </div>

    <div id="ls_${g.uid}">${lsH}</div>
  `;
}

function updateCardDOM(card, g) {
  document.getElementById(`clk_${g.uid}`).innerHTML = `<div class="clock-dot"></div>${g.clock}`;
  
  // Update Scores and trigger flash if changed
  const updateScore = (side, currentScore) => {
    const el = document.getElementById(`scr_${side.charAt(0)}_${g.uid}`);
    const memKey = `${g.uid}_${side}`;
    const prevScore = STATE.scores[memKey];
    
    if (el) {
      el.innerText = currentScore;
      if (currentScore !== prevScore) {
        // Score changed!
        const diff = currentScore - prevScore;
        log(`UPD: ${g[side].name} +${diff} pts`, "log-upd");
        
        el.classList.remove('flash');
        void el.offsetWidth; // trigger reflow
        el.classList.add('flash');
        
        STATE.scores[memKey] = currentScore;
      }
      // Update Leading class
      const otherSide = side === 'away' ? 'home' : 'away';
      el.classList.toggle('leading', currentScore > g[otherSide].score);
    }
  };

  updateScore('away', g.away.score);
  updateScore('home', g.home.score);

  // Update Momentum Bar
  const tot = g.away.score + g.home.score;
  const aPct = tot === 0 ? 50 : (g.away.score / tot) * 100;
  document.getElementById(`mom_a_${g.uid}`).style.width = `${aPct}%`;
  document.getElementById(`mom_h_${g.uid}`).style.width = `${100 - aPct}%`;

  // Update Linescores
  document.getElementById(`ls_${g.uid}`).innerHTML = buildLinescoreHTML(g);
}

function buildLinescoreHTML(g) {
  if (!g.away.linescores.length) return '';
  const isMLB = g.league === 'MLB';
  const cols = g.away.linescores.length;
  
  let hRow = '<th></th>';
  for(let i=1; i<=cols; i++) hRow += `<th>${i}</th>`;
  hRow += `<th>${isMLB ? 'R' : 'T'}</th>`;

  const buildRow = (team, ls, total) => {
    let r = `<tr><td class="ls-team">${team}</td>`;
    for(let i=0; i<cols; i++) r += `<td>${ls[i] !== undefined ? ls[i] : '-'}</td>`;
    r += `<td class="ls-total">${total}</td></tr>`;
    return r;
  };

  return `
    <table class="linescore-table">
      <thead><tr>${hRow}</tr></thead>
      <tbody>
        ${buildRow(g.away.name.substring(0,3).toUpperCase(), g.away.linescores, g.away.score)}
        ${buildRow(g.home.name.substring(0,3).toUpperCase(), g.home.linescores, g.home.score)}
      </tbody>
    </table>
  `;
}

// =============================================================================
// MODAL & DEEP STATS
// =============================================================================
function openModal(uid) {
  const g = STATE.games[uid];
  if (!g) return;
  STATE.modalUID = uid;
  
  updateModalHeader(g);
  
  document.getElementById('gameModal').classList.add('active');
  
  // Set tab
  document.querySelectorAll('.m-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.m-tab').classList.add('active'); // First tab active
  STATE.modalTab = 'box';
  
  // Show loading state then fetch
  document.getElementById('mBody').innerHTML = '<div class="loading-data">REQUESTING TELEMETRY PACKET...</div>';
  fetchGameStats(g);
}

function updateModalHeader(g) {
  document.getElementById('mLeague').innerText = g.league;
  document.getElementById('mLeague').className = `gc-league league-${g.league}`;
  document.getElementById('mVenue').innerText = g.venue.toUpperCase();
  
  document.getElementById('mAwayLogo').src = g.away.logo;
  document.getElementById('mAwayName').innerText = g.away.name;
  document.getElementById('mAwayRec').innerText = g.away.record;
  document.getElementById('mAwayScore').innerText = g.away.score;
  
  document.getElementById('mHomeLogo').src = g.home.logo;
  document.getElementById('mHomeName').innerText = g.home.name;
  document.getElementById('mHomeRec').innerText = g.home.record;
  document.getElementById('mHomeScore').innerText = g.home.score;
  
  document.getElementById('mClock').innerText = g.clock;
}

function closeModal(e) { if(e.target.id === 'gameModal') forceCloseModal(); }
function forceCloseModal() {
  document.getElementById('gameModal').classList.remove('active');
  STATE.modalUID = null;
}

function switchModalTab(tab, el) {
  document.querySelectorAll('.m-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  STATE.modalTab = tab;
  renderModalContent();
}

async function fetchGameStats(game) {
  try {
    const res = await fetch(game.node.sumUrl + game.espnId);
    const json = await res.json();

    // Box Score
    if (json.boxscore && json.boxscore.players) {
      const players = [];
      json.boxscore.players.forEach(teamData => {
        const tname = teamData.team ? teamData.team.shortDisplayName : "TEAM";
        if (teamData.statistics && teamData.statistics[0]) {
          const labels = teamData.statistics[0].labels || [];
          (teamData.statistics[0].athletes || []).forEach(ath => {
            const p = { 
              name: ath.athlete.shortName || ath.athlete.displayName, 
              team: tname, 
              img: ath.athlete.headshot ? ath.athlete.headshot.href : null,
              stats: {} 
            };
            (ath.stats || []).forEach((val, i) => { if (labels[i]) p.stats[labels[i]] = val; });
            players.push(p);
          });
        }
      });
      STATE.playerStats[game.uid] = players;
    }

    // Play by Play
    if (json.plays) {
      STATE.pbp[game.uid] = json.plays.slice(-25).reverse(); // Last 25 plays
    }

    if (STATE.modalUID === game.uid) {
      renderModalContent();
    }
  } catch (e) {
    if (STATE.modalUID === game.uid) {
      document.getElementById('mBody').innerHTML = '<div class="loading-data">DATA STREAM UNAVAILABLE</div>';
    }
  }
}

function renderModalContent() {
  if (!STATE.modalUID) return;
  const game = STATE.games[STATE.modalUID];
  const body = document.getElementById('mBody');

  if (STATE.modalTab === 'box') {
    const players = STATE.playerStats[STATE.modalUID];
    if (!players || !players.length) { body.innerHTML = '<div class="loading-data">NO BOX SCORE AVAILABLE YET</div>'; return; }
    
    const isB = game.league === 'NBA' || game.league === 'NCAA';
    const isMLB = game.league === 'MLB';
    
    const hdrs = isMLB ? ['AB','R','H','RBI','BB','SO'] : isB ? ['MIN','PTS','REB','AST','STL','BLK','TO'] : ['G','A','SH','SOG'];
    
    let html = '<div class="box-score-wrap">';
    // Group by team
    ['away', 'home'].forEach(side => {
      const teamName = game[side].name;
      const roster = players.filter(p => p.team === teamName);
      if(roster.length) {
        html += `<div class="team-table-title">${teamName} ROSTER</div>
                 <table class="stat-table"><thead><tr><th>PLAYER</th>${hdrs.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;
        
        roster.forEach(p => {
          const imgHTML = p.img ? `<img class="player-img" src="${p.img}" onerror="this.src='https://a.espncdn.com/i/headshots/nophoto.png'">` : `<div class="player-img"></div>`;
          html += `<tr><td>${imgHTML} ${p.name}</td>${hdrs.map(h => `<td>${p.stats[h] || '-'}</td>`).join('')}</tr>`;
        });
        html += `</tbody></table>`;
      }
    });
    html += '</div>';
    body.innerHTML = html;

  } else if (STATE.modalTab === 'pbp') {
    const plays = STATE.pbp[STATE.modalUID];
    if (!plays || !plays.length) { body.innerHTML = '<div class="loading-data">NO PLAY-BY-PLAY DATA</div>'; return; }
    
    let html = '<div class="pbp-wrap">';
    plays.forEach(p => {
      const time = p.clock ? p.clock.displayValue : '-';
      const text = p.text || p.description || '-';
      const score = (p.homeScore != null && p.awayScore != null) ? `${p.awayScore} - ${p.homeScore}` : '';
      const isScoring = p.scoringPlay || text.toLowerCase().match(/score|goal|basket|three pointer|run/);
      
      html += `
        <div class="pbp-row">
          <div class="pbp-time">${time}</div>
          <div class="pbp-desc ${isScoring ? 'scoring' : ''}">${text}</div>
          <div class="pbp-score">${score}</div>
        </div>
      `;
    });
    html += '</div>';
    body.innerHTML = html;
  }
}

// =============================================================================
// INIT
// =============================================================================
log("Initializing Nexus Protocol...", "log-scs");
fetchAll();
setInterval(fetchAll, 15000); // Poll every 15 seconds

</script>
